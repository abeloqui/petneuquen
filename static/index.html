<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        
        :root {
            --logo-coral: #E07A5F;
            --logo-celeste: #81B29A;
            --logo-amarillo: #F2CC8F;
            --logo-rojo: #C94C4C;
            --logo-crema: #F4F1DE;
            --dark: #3D405B;
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: var(--logo-crema); 
            color: var(--dark);
            padding-bottom: 120px;
        }

        .glass { 
            background: rgba(244, 241, 222, 0.9); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
        }

        #main-map { 
            height: 380px; 
            width: 100%; 
            border-radius: 2.5rem; 
            border: 6px solid white; 
            box-shadow: 0 20px 40px rgba(61, 64, 91, 0.15); 
            z-index: 10;
        }

        .btn-filter { 
            padding: 12px 22px; 
            border-radius: 30px; 
            font-size: 13px; 
            font-weight: 700; 
            background: white; 
            color: var(--logo-celeste); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(129, 178, 154, 0.2);
            white-space: nowrap;
        }

        .btn-filter.active { 
            background: var(--logo-coral); 
            color: white; 
            box-shadow: 0 8px 20px rgba(224, 122, 95, 0.4);
            border-color: var(--logo-coral);
        }

        .custom-input { 
            background: white; 
            border-radius: 1.5rem; 
            padding: 16px 20px; 
            border: 2px solid transparent; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            width: 100%; 
            outline: none;
            transition: 0.3s;
        }

        .custom-input:focus { border-color: var(--logo-amarillo); }

        .card-pet { 
            background: white; 
            border-radius: 2.5rem; 
            overflow: hidden; 
            box-shadow: 0 12px 30px rgba(61, 64, 91, 0.08); 
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            transition: transform 0.3s ease;
        }
        .card-pet:active { transform: scale(0.97); }

        .status-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #user-menu {
            transform-origin: top right;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden { display: none !important; }
        
        /* Animaciones para secciones */
        .section-container {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20 shadow-sm">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md border-2 border-white overflow-hidden">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter" style="color: var(--dark);">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.2em]" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>

        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-[#C94C4C] text-white text-[8px] font-black px-2 py-1 rounded-md">ADMIN</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white text-slate-400 flex items-center justify-center transition-all shadow-md hover:shadow-lg active:scale-90">
                <i class="fas fa-user text-xl"></i>
            </button>
            
            <div id="user-menu" class="hidden absolute top-16 right-0 w-52 bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden z-[2001]">
                <div class="p-5 border-b border-slate-50 bg-slate-50/50">
                    <p id="menu-email" class="text-[9px] font-black text-slate-400 truncate uppercase tracking-widest"></p>
                </div>
                <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-4 text-xs font-bold hover:bg-orange-50 transition-colors flex items-center gap-3" style="color: var(--logo-coral);">
                    <i class="fas fa-th-large"></i> Mi Panel
                </button>
                <button onclick="logout()" class="w-full text-left p-4 text-xs font-bold border-t border-slate-50 flex items-center gap-3" style="color: var(--logo-rojo);">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            
            <div class="space-y-4">
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="filter-species">
                    <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                    <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                    <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
                    <button onclick="setSpecies('otro', this)" class="btn-filter">✨ Otros</button>
                </div>
                
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" id="search" oninput="renderPets()" placeholder="Barrio o nombre..." class="custom-input pl-12 text-sm">
                    </div>
                    <select id="filter-status" onchange="renderPets()" class="custom-input font-bold text-sm w-auto px-6" style="color: var(--logo-coral);">
                        <option value="todos">Todos</option>
                        <option value="perdido">Perdidos</option>
                        <option value="adopcion">Adopción</option>
                    </select>
                </div>
            </div>

            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl border border-white">
                <h2 class="font-black text-2xl mb-8 uppercase text-center tracking-tighter">Nueva Publicación</h2>
                <form onsubmit="handleUpload(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <select name="especie" id="especie-select" onchange="checkOtroEspecie(this.value)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-sm outline-none border-2 border-transparent focus:border-orange-100">
                                <option value="perro">🐶 Perro</option>
                                <option value="gato">🐱 Gato</option>
                                <option value="otro">✨ Otro...</option>
                            </select>
                        </div>
                        <select name="status" class="p-4 bg-slate-50 rounded-2xl font-bold text-sm outline-none" style="color: var(--logo-coral);">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">Adopción</option>
                        </select>
                    </div>
                    
                    <input type="text" id="especie-otro" placeholder="¿Qué animal es?" class="hidden custom-input border-2 border-orange-50">
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="custom-input" required>
                    <input type="text" name="barrio" placeholder="¿En qué barrio?" class="custom-input" required>
                    
                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-slate-400 uppercase ml-2">Toca el mapa para ubicar la mascota</p>
                        <div id="map-upload" style="height: 250px;" class="rounded-[2rem] border-4 border-slate-50"></div>
                        <input type="hidden" name="latitud" id="lat-in">
                        <input type="hidden" name="longitud" id="lng-in">
                    </div>

                    <div class="p-6 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
                        <i class="fas fa-camera text-2xl text-slate-300 mb-2"></i>
                        <input type="file" name="file" accept="image/*" class="w-full text-xs" required>
                    </div>

                    <button type="submit" id="btn-up" class="w-full py-5 rounded-[2rem] font-black uppercase shadow-xl transition-all active:scale-95 text-white" style="background: var(--logo-coral);">Publicar ahora</button>
                </form>
            </div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <div class="text-center mb-10">
                    <h2 class="font-black text-3xl tracking-tighter uppercase">Hola André</h2>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Identificate para continuar</p>
                </div>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Tu Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Tu Contraseña" class="custom-input" required>
                    <button class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-lg" style="background: var(--dark);">Entrar</button>
                </form>
                <div class="mt-12 pt-8 border-t border-dashed border-slate-200">
                    <p class="text-center text-[10px] font-black text-slate-400 mb-6 uppercase">¿No tenés cuenta? Registrate</p>
                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <input type="email" name="email" placeholder="Email" class="custom-input" required>
                        <input type="password" name="password" placeholder="Contraseña" class="custom-input" required>
                        <input type="tel" name="telefono" placeholder="WhatsApp (Ej: 2991234567)" class="custom-input" required>
                        <button class="w-full border-2 border-slate-200 text-slate-400 py-5 rounded-[2rem] font-black uppercase hover:border-orange-200 hover:text-orange-300 transition-all">Solicitar Acceso</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="sec-profile" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-2xl uppercase tracking-tighter mb-8 flex items-center gap-3">
                    <i class="fas fa-paw text-orange-500"></i> Mis Reportes
                </h2>
                <div id="user-pet-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-2xl mb-8 uppercase tracking-tighter">Administración</h2>
                <div class="grid grid-cols-3 gap-3 mb-10 text-center">
                    <div class="bg-orange-50 p-5 rounded-[1.5rem]"><p class="text-2xl font-black text-orange-500" id="stat-perdidos">0</p><p class="text-[8px] font-black uppercase">Perdidos</p></div>
                    <div class="bg-emerald-50 p-5 rounded-[1.5rem]"><p class="text-2xl font-black text-emerald-500" id="stat-adopcion">0</p><p class="text-[8px] font-black uppercase">Adopción</p></div>
                    <div class="bg-slate-50 p-5 rounded-[1.5rem]"><p class="text-2xl font-black text-slate-400" id="stat-pendientes">0</p><p class="text-[8px] font-black uppercase">Espera</p></div>
                </div>
                <div id="admin-users" class="space-y-4 mb-10"></div>
                <div id="admin-pets" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-300 hover:text-orange-500 transition-colors"><i class="fas fa-map-marked-alt text-2xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center active:scale-90 transition-all text-white" style="background: var(--logo-coral);">
            <i class="fas fa-plus text-2xl"></i>
        </button>
        <button onclick="location.reload()" class="w-14 h-14 text-slate-300 hover:text-orange-500 transition-colors"><i class="fas fa-sync-alt text-2xl"></i></button>
    </nav>



        <script>
        let mainMap, uploadMap, uploadMarker, allPets = [];
        let currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));

        // --- SISTEMA DE UI ---
        function updateAuthUI() {
            const userBtn = document.getElementById('user-anchor');
            const adminBadge = document.getElementById('admin-badge');
            if (user) {
                userBtn.style.backgroundColor = 'var(--logo-coral)';
                userBtn.style.color = 'white';
                if (user.role === 'admin') adminBadge.classList.remove('hidden');
            } else {
                userBtn.style.backgroundColor = 'white';
                userBtn.style.color = '#94a3b8';
                adminBadge.classList.add('hidden');
            }
        }

        function toggleUserMenu() {
            if (!user) { showSection('auth'); return; }
            const menu = document.getElementById('user-menu');
            menu.classList.toggle('hidden');
            document.getElementById('menu-email').innerText = user.email;
        }

        // --- NAVEGACIÓN ---
        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById('sec-' + id);
            if(target) target.classList.remove('hidden');
            
            // Cerrar menú usuario por seguridad al navegar
            document.getElementById('user-menu').classList.add('hidden');

            if(id === 'home') {
                if(!mainMap) initMainMap();
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 300);
            }
            if(id === 'upload') {
                if(!uploadMap) initUploadMap();
                setTimeout(() => uploadMap.invalidateSize(), 300);
            }
        }

        function checkUserPanel() {
            if(!user) showSection('auth');
            else if(user.role === 'admin') { showSection('admin'); loadAdminData(); }
            else { showSection('profile'); loadUserPets(); }
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }

        // --- MAPAS ---
        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        function focusOnPet(lat, lng) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (mainMap) mainMap.flyTo([lat, lng], 16, { animate: true, duration: 1.5 });
        }

        // --- LÓGICA DE MASCOTAS ---
        async function loadPets() {
            try {
                const res = await fetch('/pets');
                allPets = await res.json();
                renderPets();
            } catch (e) { console.error("Error cargando:", e); }
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            list.innerHTML = "";
            
            if(mainMap) mainMap.eachLayer(l => { if(l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            const filtered = allPets.filter(p => 
                (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) &&
                (status === 'todos' || p.status === status) &&
                (currentSpecies === 'todos' || p.especie === currentSpecies)
            );

            filtered.forEach(p => {
                const color = p.status === 'perdido' ? 'var(--logo-rojo)' : 'var(--logo-celeste)';
                const tel = p.users ? p.users.telefono : '2996894360';
                
                if(mainMap) L.circleMarker([p.latitud, p.longitud], {color: color, radius: 9, fillOpacity: 0.8, weight: 3}).addTo(mainMap);

                list.innerHTML += `
                    <div class="card-pet">
                        <span class="status-badge" style="background:${color}">${p.status}</span>
                        <img src="${p.image_url}" onclick="focusOnPet(${p.latitud}, ${p.longitud})" class="w-full h-40 object-cover cursor-pointer hover:scale-105 transition-transform">
                        <div class="p-5 text-center">
                            <p class="font-black text-sm uppercase tracking-tighter" style="color: var(--dark)">${p.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 mb-4 uppercase tracking-widest">${p.barrio}</p>
                            <div class="flex gap-2">
                                <a href="https://wa.me/${tel}" target="_blank" class="flex-1 text-white text-[10px] py-3 rounded-2xl font-black shadow-md" style="background: var(--logo-celeste)">WHATSAPP</a>
                                <button onclick="sharePet('${p.name}', '${p.barrio}')" class="bg-slate-50 text-slate-400 px-4 rounded-2xl"><i class="fas fa-share-alt"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function sharePet(n, b) {
            const txt = `🐾 Ayudanos con ${n} en barrio ${b}. Miralo acá: https://petneuquen.onrender.com`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
        }

        // --- AUTH Y REGISTRO ---
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
            else { const d = await res.json(); alert(d.msg || "Error"); }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { alert("¡André, solicitud enviada! Te avisaremos por mail al activar."); location.reload(); }
            else { alert("Error al registrar."); }
        }

        function logout() { localStorage.removeItem('user'); location.reload(); }

        // --- SUBIDA Y OTROS ---
        function checkOtroEspecie(val) {
            const input = document.getElementById('especie-otro');
            val === 'otro' ? input.classList.remove('hidden') : input.classList.add('hidden');
        }

        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-in').value) return alert("Marcá el lugar en el mapa");
            const btn = document.getElementById('btn-up'); btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const fd = new FormData(e.target);
            if(document.getElementById('especie-select').value === 'otro') {
                fd.set('especie', document.getElementById('especie-otro').value || 'Otro');
            }
            fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', { method: 'POST', body: fd });
            if(res.ok) { alert("¡Excelente André! Ya está en revisión."); location.reload(); }
            else { alert("Error al subir."); btn.innerText = "Publicar"; btn.disabled = false; }
        }

        // --- ADMIN Y PERFIL ---
        async function loadAdminData() {
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('stat-perdidos').innerText = data.stats.perdidos;
            document.getElementById('stat-adopcion').innerText = data.stats.adopcion;
            document.getElementById('stat-pendientes').innerText = data.stats.pendientes;
            
            document.getElementById('admin-users').innerHTML = '<p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nuevos Vecinos</p>' + data.users.map(u => `
                <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border border-slate-100">
                    <span class="text-xs font-bold">${u.email}</span>
                    <button onclick="approve('user', ${u.id})" class="bg-emerald-500 text-white text-[10px] px-5 py-2 rounded-2xl font-black shadow-lg">ADMITIR</button>
                </div>`).join('') || "<p class='text-[10px] text-center p-4 text-slate-300'>Nadie nuevo por aquí.</p>";

            document.getElementById('admin-pets').innerHTML = '<p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Publicaciones en espera</p>' + data.pets.filter(p => !p.is_approved).map(p => `
                <div class="bg-white p-3 rounded-3xl flex items-center gap-4 shadow-sm border border-slate-100">
                    <img src="${p.image_url}" class="w-12 h-12 rounded-2xl object-cover">
                    <span class="flex-1 text-xs font-black">${p.name}</span>
                    <button onclick="approve('pet', ${p.id})" class="bg-orange-500 text-white text-[10px] px-5 py-2 rounded-2xl font-black">APROBAR</button>
                </div>`).join('') || "<p class='text-[10px] text-center p-4 text-slate-300'>No hay reportes pendientes.</p>";
        }

        async function loadUserPets() {
            const res = await fetch(`/my-pets/${user.id}`);
            const pets = await res.json();
            document.getElementById('user-pet-list').innerHTML = pets.map(p => `
                <div class="bg-slate-50 p-4 rounded-[2rem] flex items-center gap-4 border border-slate-100">
                    <img src="${p.image_url}" class="w-14 h-14 rounded-2xl object-cover">
                    <div class="flex-1">
                        <p class="font-black text-sm">${p.name}</p>
                        <p class="text-[9px] font-black uppercase ${p.is_approved ? 'text-emerald-500':'text-orange-400'}">${p.is_approved ? 'Visible en Mapa':'En Revisión'}</p>
                    </div>
                    <button onclick="deletePet(${p.id})" class="text-red-400 p-3 bg-white rounded-full shadow-sm"><i class="fas fa-trash"></i></button>
                </div>`).join('') || "<p class='text-[10px] text-center text-slate-300 p-10'>Todavía no tenés reportes.</p>";
        }

        async function approve(t, id) { await fetch(`/admin/approve/${t}/${id}`, {method:'POST'}); loadAdminData(); }
        async function deletePet(id) { if(confirm("¿Borrar permanentemente?")) { await fetch(`/pets/user-delete/${id}`, {method:'DELETE'}); loadUserPets(); } }

        function setSpecies(sp, btn) {
            currentSpecies = sp;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPets();
        }

        window.onload = () => {
            updateAuthUI();
            showSection('home');
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('user-menu');
                const anchor = document.getElementById('user-anchor');
                if (user && menu && !menu.contains(e.target) && !anchor.contains(e.target)) {
                    menu.classList.add('hidden');
                }
            });
        };
    </script>
</body>
</html>
