<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #F4F1DE; color: #3D405B; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(10px); }
        #map { height: 350px; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-pet { background: white; border-radius: 2rem; overflow: hidden; transition: 0.3s; }
        .active-filter { background: #E07A5F !important; color: white !important; }
    </style>
</head>
<body class="pb-32">

    <nav class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div class="flex items-center gap-3">
            <img src="/static/logo.png" class="w-10 h-10 object-contain">
            <h1 class="font-black text-xl tracking-tighter">Huellitas<span class="text-[#E07A5F]">NQN</span></h1>
        </div>
        <button onclick="toggleMenu()" id="userBtn" class="w-12 h-12 rounded-full bg-white shadow-md flex items-center justify-center">
            <i class="fas fa-user text-slate-300"></i>
        </button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        <div id="map"></div>

        <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
            <button onclick="filter('todos', this)" class="active-filter px-6 py-3 bg-white rounded-full font-bold text-sm shadow-sm">Todos</button>
            <button onclick="filter('perro', this)" class="px-6 py-3 bg-white rounded-full font-bold text-sm shadow-sm">Perros</button>
            <button onclick="filter('gato', this)" class="px-6 py-3 bg-white rounded-full font-bold text-sm shadow-sm">Gatos</button>
        </div>

        <div class="relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" id="search" oninput="render()" placeholder="Buscar por barrio..." 
                   class="w-full p-5 pl-14 rounded-[1.5rem] bg-white outline-none shadow-sm focus:ring-2 ring-[#E07A5F] transition-all">
        </div>

        <div id="grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[1000]">
        <div class="glass p-4 rounded-[2.5rem] flex justify-around items-center border-2 border-white shadow-2xl">
            <button onclick="window.scrollTo(0,0)" class="text-slate-400"><i class="fas fa-home text-xl"></i></button>
            <button onclick="checkAuth()" class="w-16 h-16 bg-[#E07A5F] text-white rounded-full -mt-14 border-[6px] border-[#F4F1DE] shadow-xl flex items-center justify-center">
                <i class="fas fa-plus text-2xl"></i>
            </button>
            <button onclick="location.reload()" class="text-slate-400"><i class="fas fa-sync-alt text-xl"></i></button>
        </div>
    </div>

    <script>
        let pets = [];
        let map;
        let currentEspecie = 'todos';
        const user = JSON.parse(localStorage.getItem('user'));

        async function load() {
            const res = await fetch('/pets');
            pets = await res.json();
            render();
            initMap();
            if(user) document.getElementById('userBtn').innerHTML = `<i class="fas fa-user text-[#E07A5F]"></i>`;
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([-38.95, -68.06], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            pets.forEach(p => {
                L.circleMarker([p.latitud, p.longitud], {radius: 8, color: '#E07A5F', fillOpacity: 1}).addTo(map)
                 .bindPopup(`<b>${p.name}</b><br>${p.barrio}`);
            });
        }

        function render() {
            const grid = document.getElementById('grid');
            const term = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = "";
            
            pets.filter(p => {
                return (currentEspecie === 'todos' || p.especie === currentEspecie) && 
                       (p.barrio.toLowerCase().includes(term));
            }).forEach(p => {
                const badgeColor = p.status === 'perdido' ? '#C94C4C' : '#81B29A';
                grid.innerHTML += `
                    <div class="card-pet shadow-sm relative">
                        <span class="absolute top-3 left-3 text-[8px] font-black text-white px-2 py-1 rounded-full uppercase" style="background:${badgeColor}">${p.status}</span>
                        <img src="${p.image_url}" class="w-full h-32 object-cover" onclick="map.flyTo([${p.latitud}, ${p.longitud}], 15)">
                        <div class="p-3 text-center">
                            <p class="font-black text-[11px] uppercase truncate mb-2">${p.name}</p>
                            <div class="flex gap-1">
                                <a href="/generate_plate/${p.id}" class="flex-1 bg-slate-50 text-slate-400 p-2 rounded-lg text-[9px] font-black">PLACA</a>
                                <a href="https://wa.me/2996894360" class="w-8 h-8 bg-emerald-400 text-white rounded-lg flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filter(esp, btn) {
            currentEspecie = esp;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-filter'));
            btn.classList.add('active-filter');
            render();
        }

        function checkAuth() { window.location.href = user ? '/upload' : '/login'; }
        function toggleMenu() { if(user) { if(confirm("¿Cerrar sesión?")) { localStorage.clear(); location.reload(); } } else { location.href='/login'; } }

        window.onload = load;
    </script>
</body>
</html>
