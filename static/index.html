<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN | Mascotas Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f8fafc; color: #1e293b; }
        .hidden { display: none !important; }
        #main-map { border-radius: 1.5rem; border: 4px solid white; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .nav-btn { transition: 0.3s; }
        .nav-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="pb-24">

    <nav class="p-4 bg-white/80 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-2" onclick="location.reload()">
            <div class="bg-orange-500 p-2 rounded-xl text-white shadow-lg shadow-orange-200"><i class="fas fa-paw"></i></div>
            <h1 class="font-extrabold text-xl tracking-tight">Huellitas<span class="text-orange-500">NQN</span></h1>
        </div>
        <button onclick="showSection('auth')" class="text-slate-400 text-3xl nav-btn"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        
        <section id="sec-home" class="space-y-4">
            <div id="main-map" class="w-full h-64 z-0"></div>
            <div class="flex gap-2">
                <input type="text" id="search" oninput="applyFilters()" placeholder="Buscar barrio..." class="flex-1 p-4 rounded-2xl bg-white shadow-sm border-none focus:ring-2 focus:ring-orange-500">
                <select id="filter-status" onchange="applyFilters()" class="p-4 rounded-2xl bg-white shadow-sm font-bold text-orange-500 border-none">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="hidden animate-bottom">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-50 space-y-4">
                <h2 class="font-extrabold text-2xl text-center">Nueva Publicación</h2>
                <form id="form-upload" onsubmit="handleUpload(event)" class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" name="name" placeholder="Nombre" class="w-2/3 p-4 bg-slate-50 rounded-2xl" required>
                        <select name="status" class="w-1/3 p-4 bg-slate-50 rounded-2xl font-bold text-orange-500">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">Adopción</option>
                        </select>
                    </div>
                    <input type="text" name="barrio" placeholder="Barrio (Ej: San Lorenzo)" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <p class="text-[10px] text-slate-400 font-bold ml-2">TOCÁ EL MAPA PARA UBICAR</p>
                    <div id="map-upload" class="w-full h-40 rounded-2xl"></div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <div class="p-4 border-2 border-dashed border-slate-200 rounded-2xl text-center">
                        <input type="file" name="file" accept="image/*" class="text-xs" required>
                    </div>
                    <button id="btn-up" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-extrabold shadow-lg shadow-orange-200">PUBLICAR AHORA</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-6">
            <div class="bg-slate-900 p-6 rounded-[2rem] text-white">
                <h2 class="text-xl font-bold">Panel de Control</h2>
                <p class="text-xs text-slate-400">Gestionar aprobaciones pendientes</p>
            </div>
            <div id="admin-content" class="space-y-4"></div>
        </section>

        <section id="sec-auth" class="hidden">
            <div id="auth-forms" class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-8">
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <h3 class="font-extrabold text-2xl">Ingresar</h3>
                    <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Entrar</button>
                </form>
                <hr>
                <form onsubmit="handleRegister(event)" class="space-y-4">
                    <h3 class="font-bold text-slate-400">Solicitar una cuenta</h3>
                    <input type="email" name="email" placeholder="Tu Email" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="text" name="telefono" placeholder="WhatsApp (Ej: 2991234567)" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold border border-slate-200">Registrarme</button>
                </form>
            </div>
            <div id="user-info" class="hidden bg-white p-8 rounded-[2.5rem] text-center border">
                <div class="w-20 h-20 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                    <i class="fas fa-user"></i>
                </div>
                <p id="u-mail" class="font-extrabold text-xl"></p>
                <p class="text-slate-400 text-sm mb-6">Usuario Activo</p>
                <button onclick="logout()" class="w-full py-4 text-red-500 font-bold border border-red-50 rounded-2xl">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-2xl rounded-full p-3 flex justify-around items-center shadow-2xl border border-white/50 z-[2000]">
        <button onclick="showSection('home')" class="p-3 text-slate-400 nav-btn"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-16 h-16 rounded-3xl shadow-xl shadow-orange-200 -mt-12 flex items-center justify-center nav-btn"><i class="fas fa-plus text-xl"></i></button>
        <button id="nav-admin" onclick="showAdmin()" class="hidden p-3 text-indigo-500 nav-btn"><i class="fas fa-shield-cat text-2xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') setTimeout(initMainMap, 300);
            if(id === 'upload') setTimeout(initUploadMap, 300);
        }

        function initMainMap() {
            if(!mainMap) {
                mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            }
            loadPets();
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            mainMap.eachLayer(l => { if(l instanceof L.Marker) mainMap.removeLayer(l); });

            allPets.filter(p => (status === 'todos' || p.status === status) && p.barrio.toLowerCase().includes(term)).forEach(p => {
                const color = p.status === 'perdido' ? '#ef4444' : '#10b981';
                L.circleMarker([p.latitud, p.longitud], {color: color, radius: 8, fillOpacity: 0.8}).addTo(mainMap).bindPopup(`<b>${p.name}</b><br>${p.barrio}`);
                
                list.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-50">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-extrabold text-xs uppercase text-slate-400 mb-1">${p.status}</p>
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-[10px] text-slate-400 mb-2">${p.barrio}</p>
                            <a href="https://wa.me/${p.telefono}" class="block bg-green-50 text-green-600 py-2 rounded-xl text-[10px] font-extrabold">CONTACTAR</a>
                        </div>
                    </div>`;
            });
        }

        function initUploadMap() {
            if(!uploadMap) {
                uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-in').value = e.latlng.lat;
                    document.getElementById('lng-in').value = e.latlng.lng;
                });
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            if(res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else alert("Error: Cuenta pendiente de aprobación o datos incorrectos.");
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            alert(data.msg);
            if(res.ok) location.reload();
        }

        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-in').value) return alert("Marcá la ubicación en el mapa");
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            document.getElementById('btn-up').innerText = "SUBIENDO...";
            const res = await fetch('/pets/upload', {method:'POST', body:fd});
            if(res.ok) { alert("¡Publicado! Se verá cuando el admin lo apruebe."); location.reload(); }
            else alert("Error al subir.");
        }

        async function showAdmin() {
            showSection('admin');
            const res = await fetch('/admin/pending');
            const data = await res.json();
            const container = document.getElementById('admin-content');
            container.innerHTML = `<h4 class="font-bold text-slate-400 uppercase text-xs">Mascotas Pendientes (${data.pets.length})</h4>`;
            data.pets.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex items-center gap-4 border border-slate-100">
                        <img src="${p.image_url}" class="w-14 h-14 rounded-2xl object-cover">
                        <div class="flex-1 text-sm"><p class="font-bold">${p.name}</p><p class="text-xs text-slate-400">${p.barrio}</p></div>
                        <div class="flex gap-2">
                            <button onclick="approvePet(${p.id})" class="bg-green-500 text-white p-3 rounded-xl"><i class="fas fa-check"></i></button>
                            <button onclick="deletePet(${p.id})" class="bg-red-50 text-red-400 p-3 rounded-xl"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
            container.innerHTML += `<h4 class="font-bold text-slate-400 uppercase text-xs mt-6">Usuarios Pendientes (${data.users.length})</h4>`;
            data.users.forEach(u => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex items-center justify-between border border-slate-100">
                        <div class="text-sm"><p class="font-bold">${u.email}</p><p class="text-xs text-slate-400">${u.telefono}</p></div>
                        <button onclick="approveUser(${u.id})" class="bg-indigo-500 text-white py-2 px-4 rounded-xl font-bold text-xs text-white">APROBAR</button>
                    </div>`;
            });
        }

        async function approvePet(id) { await fetch(`/admin/approve/pet/${id}`, {method:'POST'}); showAdmin(); }
        async function approveUser(id) { await fetch(`/admin/approve/user/${id}`, {method:'POST'}); showAdmin(); }
        async function deletePet(id) { if(confirm("¿Eliminar publicación?")) { await fetch(`/admin/delete/pet/${id}`, {method:'DELETE'}); showAdmin(); } }
        async function approvePet(id) {
    const res = await fetch(`/admin/approve/pet/${id}`, { method: 'POST' });
    if (res.ok) {
        alert("¡Mascota aprobada!");
        // Cargamos los datos de nuevo antes de volver al home
        await loadPets(); 
        showAdmin(); // Refresca la vista de admin
    }
        }
        

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('u-mail').innerText = user.email;
                if(user.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
