<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f8fafc; color: #1e293b; }
        .hidden { display: none !important; }
        #main-map { border-radius: 2rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .nav-active { color: #f97316; }
    </style>
</head>
<body class="pb-28">

    <nav class="p-5 bg-white/90 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-3" onclick="location.reload()">
            <div class="bg-orange-500 p-2.5 rounded-2xl text-white shadow-lg shadow-orange-200"><i class="fas fa-paw"></i></div>
            <h1 class="font-extrabold text-2xl tracking-tight">Huellitas<span class="text-orange-500">NQN</span></h1>
        </div>
        <button onclick="showSection('auth')" class="text-slate-300 text-4xl"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-xl mx-auto space-y-8">
        <section id="sec-home" class="space-y-6">
            <div id="main-map" class="w-full h-72 z-0"></div>
            <div class="flex gap-3">
                <input type="text" id="search" oninput="applyFilters()" placeholder="Buscar barrio..." class="flex-1 p-5 rounded-[1.5rem] bg-white shadow-sm border-none focus:ring-2 focus:ring-orange-500 outline-none">
                <select id="filter-status" onchange="applyFilters()" class="p-5 rounded-[1.5rem] bg-white shadow-sm font-bold text-orange-500 border-none outline-none">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 space-y-6">
                <h2 class="font-extrabold text-2xl text-center">Subir Mascota</h2>
                <form id="form-upload" onsubmit="handleUpload(event)" class="space-y-5">
                    <div class="flex gap-2">
                        <input type="text" name="name" placeholder="Nombre" class="w-2/3 p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <select name="status" class="w-1/3 p-4 bg-slate-50 rounded-2xl font-bold text-orange-500 outline-none">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">Adopción</option>
                        </select>
                    </div>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                    <p class="text-[10px] text-slate-400 font-bold ml-2">MARCÁ EN EL MAPA DÓNDE SE VIO</p>
                    <div id="map-upload" class="w-full h-44 rounded-2xl"></div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <div class="p-5 border-2 border-dashed border-slate-200 rounded-3xl text-center">
                        <input type="file" name="file" accept="image/*" class="text-xs" required>
                    </div>
                    <button id="btn-up" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-extrabold shadow-lg shadow-orange-200">PUBLICAR AHORA</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-6">
            <div class="bg-slate-900 p-7 rounded-[2.5rem] text-white flex justify-between items-center">
                <div><h2 class="text-2xl font-bold">Panel Admin</h2><p class="text-xs text-slate-400">Gestión de contenidos</p></div>
                <i class="fas fa-shield-halved text-3xl opacity-20"></i>
            </div>
            <div id="admin-content" class="space-y-4"></div>
        </section>

        <section id="sec-auth" class="hidden">
            <div id="auth-forms" class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-8">
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <h3 class="font-extrabold text-2xl">Ingresar</h3>
                    <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Entrar</button>
                </form>
                <hr class="border-slate-50">
                <form onsubmit="handleRegister(event)" class="space-y-4">
                    <h3 class="font-bold text-slate-400">Crear Cuenta</h3>
                    <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="text" name="telefono" placeholder="WhatsApp (299...)" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold border">Solicitar Acceso</button>
                </form>
            </div>
            <div id="user-info" class="hidden bg-white p-10 rounded-[3rem] text-center border">
                <div class="w-20 h-20 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-5 text-4xl"><i class="fas fa-user"></i></div>
                <p id="u-mail" class="font-extrabold text-xl mb-1"></p>
                <p class="text-slate-400 text-sm mb-8 italic">Sesión iniciada</p>
                <button onclick="logout()" class="w-full py-4 text-red-500 font-bold border border-red-50 rounded-2xl">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] bg-white/80 backdrop-blur-2xl rounded-[2.5rem] p-4 flex justify-around items-center shadow-2xl border border-white/50 z-[2000]">
        <button onclick="showSection('home')" id="nav-home" class="p-3 text-slate-300 nav-active"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-16 h-16 rounded-[2rem] shadow-xl shadow-orange-200 -mt-14 flex items-center justify-center border-4 border-white"><i class="fas fa-plus text-2xl"></i></button>
        <button id="nav-admin-btn" onclick="showAdmin()" class="hidden p-3 text-indigo-400"><i class="fas fa-shield-halved text-2xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            if(id === 'home') {
                document.getElementById('nav-home').classList.add('nav-active');
                setTimeout(() => { if(mainMap) mainMap.invalidateSize(); loadPets(); }, 400);
            }
            if(id === 'upload') setTimeout(() => { initUploadMap(); if(uploadMap) uploadMap.invalidateSize(); }, 400);
        }

        function initMainMap() {
            if(!mainMap) {
                mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            }
        }

        async function loadPets() {
            initMainMap();
            try {
                const res = await fetch('/pets');
                allPets = await res.json();
                applyFilters();
            } catch (e) { console.error(e); }
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            mainMap.eachLayer(l => { if(l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            allPets.filter(p => (status === 'todos' || p.status === status) && p.barrio.toLowerCase().includes(term)).forEach(p => {
                const color = p.status === 'perdido' ? '#ef4444' : '#10b981';
                L.circleMarker([p.latitud, p.longitud], {color: color, radius: 9, fillOpacity: 0.8, weight: 3}).addTo(mainMap).bindPopup(`<b>${p.name}</b>`);
                
                list.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-50">
                        <img src="${p.image_url}" class="w-full h-40 object-cover">
                        <div class="p-4 text-center">
                            <p class="font-bold text-slate-800">${p.name}</p>
                            <p class="text-[10px] text-slate-400 mb-4 uppercase font-bold">${p.barrio}</p>
                            <a href="https://wa.me/${p.telefono}" target="_blank" class="block bg-green-50 text-green-600 py-3 rounded-2xl text-xs font-extrabold">CONTACTAR</a>
                        </div>
                    </div>`;
            });
        }

        function initUploadMap() {
            if(!uploadMap) {
                uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-in').value = e.latlng.lat;
                    document.getElementById('lng-in').value = e.latlng.lng;
                });
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            if(res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else alert("Error: Cuenta pendiente o datos incorrectos.");
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            alert(data.msg);
            if(res.ok) location.reload();
        }

        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-in').value) return alert("Marcá la ubicación en el mapa.");
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            const btn = document.getElementById('btn-up');
            btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const res = await fetch('/pets/upload', {method:'POST', body:fd});
            if(res.ok) { alert("¡Recibido! Esperando aprobación."); location.reload(); }
            else { alert("Error al subir."); btn.innerText = "PUBLICAR AHORA"; btn.disabled = false; }
        }

        async function showAdmin() {
            showSection('admin');
            const res = await fetch('/admin/data');
            const data = await res.json();
            const container = document.getElementById('admin-content');
            container.innerHTML = '';

            if(data.users.length > 0) {
                container.innerHTML += '<h4 class="text-xs font-bold text-slate-400 mb-3">USUARIOS PENDIENTES</h4>';
                data.users.forEach(u => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-[1.8rem] flex items-center justify-between shadow-sm border border-slate-50">
                            <div><p class="font-bold text-sm">${u.email}</p><p class="text-[10px] text-slate-400">${u.telefono}</p></div>
                            <button onclick="approveAction('user', ${u.id})" class="bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold">APROBAR</button>
                        </div>`;
                });
            }

            container.innerHTML += '<h4 class="text-xs font-bold text-slate-400 mb-3 mt-8">TODAS LAS MASCOTAS</h4>';
            data.pets.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-[1.8rem] flex items-center gap-4 shadow-sm border border-slate-50">
                        <img src="${p.image_url}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1">
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-[10px] ${p.is_approved ? 'text-green-500' : 'text-orange-500'} font-bold uppercase">${p.is_approved ? 'Publicada' : 'Pendiente'}</p>
                        </div>
                        <div class="flex gap-2">
                            ${!p.is_approved ? `<button onclick="approveAction('pet', ${p.id})" class="bg-green-500 text-white p-3 rounded-xl"><i class="fas fa-check"></i></button>` : ''}
                            <button onclick="deletePet(${p.id})" class="bg-red-50 text-red-500 p-3 rounded-xl"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function approveAction(type, id) {
            const res = await fetch(`/admin/approve/${type}/${id}`, {method:'POST'});
            if(res.ok) showAdmin();
        }

        async function deletePet(id) {
            if(!confirm("¿Borrar definitivamente?")) return;
            const res = await fetch(`/admin/delete/pet/${id}`, {method:'DELETE'});
            if(res.ok) showAdmin();
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('u-mail').innerText = user.email;
                if(user.role === 'admin') document.getElementById('nav-admin-btn').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
