<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .hidden { display: none !important; }
        #main-map { border-radius: 1.5rem; border: 4px solid white; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <nav class="p-4 bg-white/80 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-2" onclick="location.reload()">
            <div class="bg-orange-500 p-2 rounded-xl text-white shadow-lg"><i class="fas fa-paw"></i></div>
            <h1 class="font-extrabold text-xl">Huellitas<span class="text-orange-500">NQN</span></h1>
        </div>
        <button onclick="showSection('auth')" class="text-slate-400 text-3xl"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <section id="sec-home" class="space-y-4">
            <div id="main-map" class="w-full h-64"></div>
            <div class="flex gap-2">
                <input type="text" id="search" oninput="applyFilters()" placeholder="Buscar barrio..." class="flex-1 p-4 rounded-2xl bg-white shadow-sm outline-none">
                <select id="filter-status" onchange="applyFilters()" class="p-4 rounded-2xl bg-white shadow-sm font-bold text-orange-500">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-50 space-y-4">
                <h2 class="font-extrabold text-2xl text-center">Publicar Mascota</h2>
                <form id="form-upload" onsubmit="handleUpload(event)" class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" name="name" placeholder="Nombre" class="w-2/3 p-4 bg-slate-50 rounded-2xl" required>
                        <select name="status" class="w-1/3 p-4 bg-slate-50 rounded-2xl font-bold text-orange-500">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">Adopción</option>
                        </select>
                    </div>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <div id="map-upload" class="w-full h-40 rounded-2xl"></div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="text-xs" required>
                    <button id="btn-up" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-extrabold shadow-lg">PUBLICAR</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-[2rem] text-white">
                <h2 class="text-xl font-bold">Panel de Control</h2>
            </div>
            <div id="admin-content" class="space-y-4"></div>
        </section>

        <section id="sec-auth" class="hidden">
            <div id="auth-forms" class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <h3 class="font-extrabold text-2xl">Ingresar</h3>
                    <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Entrar</button>
                </form>
                <hr>
                <form onsubmit="handleRegister(event)" class="space-y-4">
                    <h3 class="font-bold text-slate-400">Registrarse</h3>
                    <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="text" name="telefono" placeholder="WhatsApp (Ej: 2991234567)" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold">Solicitar Cuenta</button>
                </form>
            </div>
            <div id="user-info" class="hidden text-center p-8 bg-white rounded-[2.5rem] border">
                <p id="u-mail" class="font-extrabold text-xl mb-4"></p>
                <button onclick="logout()" class="text-red-500 font-bold">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-xl rounded-full p-3 flex justify-around items-center shadow-2xl border border-white z-[2000]">
        <button onclick="showSection('home')" class="p-3 text-slate-400"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-14 h-14 rounded-2xl shadow-lg -mt-10 flex items-center justify-center"><i class="fas fa-plus text-xl"></i></button>
        <button id="nav-admin" onclick="showAdmin()" class="hidden p-3 text-indigo-500"><i class="fas fa-shield-alt text-2xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') setTimeout(() => { if(mainMap) mainMap.invalidateSize(); loadPets(); }, 400);
            if(id === 'upload') setTimeout(initUploadMap, 400);
        }

        function initMainMap() {
            if(!mainMap) {
                mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            }
        }

        async function loadPets() {
            initMainMap();
            const res = await fetch('/pets');
            allPets = await res.json();
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            
            mainMap.eachLayer(l => { if(l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            allPets.filter(p => (status === 'todos' || p.status === status) && p.barrio.toLowerCase().includes(term)).forEach(p => {
                const color = p.status === 'perdido' ? '#ef4444' : '#10b981';
                L.circleMarker([p.latitud, p.longitud], {color: color, radius: 8, fillOpacity: 0.8}).addTo(mainMap).bindPopup(`<b>${p.name}</b>`);
                
                list.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-50">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-[10px] text-slate-400 mb-2">${p.barrio}</p>
                            <a href="https://wa.me/${p.telefono}" class="block bg-green-50 text-green-600 py-2 rounded-xl text-[10px] font-extrabold">CONTACTAR</a>
                        </div>
                    </div>`;
            });
        }

        function initUploadMap() {
            if(!uploadMap) {
                uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-in').value = e.latlng.lat;
                    document.getElementById('lng-in').value = e.latlng.lng;
                });
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            if(res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else alert("Error en el acceso.");
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            alert(data.msg);
            if(res.ok) location.reload();
        }

        async function handleUpload(e) {
            e.preventDefault();
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            document.getElementById('btn-up').innerText = "SUBIENDO...";
            const res = await fetch('/pets/upload', {method:'POST', body:fd});
            if(res.ok) { alert("¡Enviado! Esperando aprobación."); location.reload(); }
            else alert("Error al subir.");
        }
// Reemplaza tu función showAdmin y agrega deletePet en el script del index.html

async function showAdmin() {
    showSection('admin');
    const res = await fetch('/admin/pending');
    const data = await res.json();
    const container = document.getElementById('admin-content');
    
    container.innerHTML = '';

    // SECCIÓN DE USUARIOS PENDIENTES
    if(data.users.length > 0) {
        container.innerHTML += '<h4 class="text-xs font-bold text-slate-400 mb-2 mt-4">USUARIOS PENDIENTES</h4>';
        data.users.forEach(u => {
            container.innerHTML += `
                <div class="bg-white p-4 rounded-3xl flex items-center justify-between shadow-sm mb-2">
                    <p class="text-xs font-bold">${u.email}</p>
                    <button onclick="approveAction('user', ${u.id})" class="bg-indigo-500 text-white px-4 py-2 rounded-xl text-[10px]">APROBAR</button>
                </div>`;
        });
    }

    // SECCIÓN DE TODAS LAS MASCOTAS
    container.innerHTML += '<h4 class="text-xs font-bold text-slate-400 mb-2 mt-6">GESTIONAR PUBLICACIONES</h4>';
    data.pets.forEach(p => {
        const statusColor = p.is_approved ? 'text-green-500' : 'text-orange-500';
        const statusText = p.is_approved ? 'Publicado' : 'Pendiente';
        
        container.innerHTML += `
            <div class="bg-white p-4 rounded-3xl flex items-center gap-4 shadow-sm mb-3">
                <img src="${p.image_url}" class="w-14 h-14 rounded-2xl object-cover">
                <div class="flex-1">
                    <p class="font-bold text-sm">${p.name}</p>
                    <p class="text-[10px] ${statusColor} font-bold uppercase">${statusText}</p>
                </div>
                <div class="flex gap-2">
                    ${!p.is_approved ? `
                        <button onclick="approveAction('pet', ${p.id})" class="bg-green-500 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                            <i class="fas fa-check"></i>
                        </button>
                    ` : ''}
                    <button onclick="deletePet(${p.id})" class="bg-red-100 text-red-500 w-10 h-10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>`;
    });
}

async function deletePet(id) {
    if(!confirm("¿Estás seguro de que quieres borrar esta publicación?")) return;
    
    try {
        const res = await fetch(`/admin/delete/pet/${id}`, { method: 'DELETE' });
        if(res.ok) {
            alert("Publicación eliminada correctamente.");
            showAdmin(); // Refresca la lista
            loadPets();  // Actualiza el home en segundo plano
        } else {
            alert("No se pudo eliminar.");
        }
    } catch (err) {
        console.error(err);
    }
}
        
        async function approveAction(type, id) {
            await fetch(`/admin/approve/${type}/${id}`, {method:'POST'});
            showAdmin();
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('u-mail').innerText = user.email;
                if(user.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
