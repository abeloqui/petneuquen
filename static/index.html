<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-amarillo: #F2CC8F; --logo-rojo: #C94C4C; --logo-crema: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 140px; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #main-map { height: 360px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 40px rgba(61, 64, 91, 0.12); z-index: 10; }
        .btn-filter { padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 700; background: white; color: var(--logo-celeste); transition: 0.3s; border: 1px solid rgba(129, 178, 154, 0.2); white-space: nowrap; }
        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 8px 20px rgba(224, 122, 95, 0.3); border-color: var(--logo-coral); }
        .custom-input { background: white; border-radius: 1.5rem; padding: 16px 20px; border: 2px solid transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.03); width: 100%; outline: none; transition: 0.3s; }
        .card-pet { background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 10px 25px rgba(61, 64, 91, 0.06); border: 1px solid rgba(255,255,255,0.6); position: relative; }
        .status-badge { position: absolute; top: 14px; left: 14px; padding: 6px 14px; border-radius: 20px; font-size: 8px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 1px; z-index: 20; }
        .section-container { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Altos del Limay"><option value="Área Centro"><option value="Belgrano"><option value="Canal V"><option value="Confluencia"><option value="Cuenca XV"><option value="Don Bosco"><option value="Huilliches"><option value="Islas Malvinas"><option value="La Sirena"><option value="Mariano Moreno"><option value="Melipal"><option value="Parque Industrial"><option value="Progreso"><option value="Provinciales Unidas"><option value="Rincón de Emilio"><option value="Río Grande"><option value="San Lorenzo"><option value="Santa Genoveva"><option value="Sapere"><option value="Terrazas del Neuquén"><option value="Unión de Mayo"><option value="Valentina Norte"><option value="Valentina Sur"><option value="Villa Ceferino"><option value="Villa Florencia"><option value="Villa María">
    </datalist>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md border-2 border-white overflow-hidden">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.2em]" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>

        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-[#C94C4C] text-white text-[8px] font-black px-2 py-1 rounded-md">ADMIN</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white text-slate-400 flex items-center justify-center shadow-md active:scale-90">
                <i class="fas fa-user text-xl"></i>
            </button>
            <div id="user-menu" class="hidden absolute top-16 right-0 w-52 bg-white rounded-[2.2rem] shadow-2xl border border-slate-100 overflow-hidden z-[2001]">
                <div class="p-5 border-b border-slate-50">
                    <p id="menu-email" class="text-[9px] font-black text-slate-400 truncate tracking-widest uppercase"></p>
                </div>
                <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-5 text-xs font-bold hover:bg-orange-50 transition-colors" style="color: var(--logo-coral);">
                    <i class="fas fa-th-large mr-2"></i> Mi Panel
                </button>
                <button onclick="logout()" class="w-full text-left p-5 text-xs font-bold border-t border-slate-50" style="color: var(--logo-rojo);">
                    <i class="fas fa-sign-out-alt mr-2"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <div class="flex gap-3">
                <input type="text" id="search" list="lista-barrios" oninput="renderPets()" placeholder="Buscar barrio..." class="custom-input flex-1">
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <form onsubmit="handleUpload(event)" class="space-y-6">
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="custom-input" required>
                    <input type="text" name="barrio" list="lista-barrios" onchange="autoZoomMap(this.value, 'upload')" placeholder="Barrio" class="custom-input" required>
                    <div id="map-upload" style="height: 200px; border-radius: 2rem;" class="border-2 border-slate-100"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" class="text-xs" required>
                    <button type="submit" id="btn-up" class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-xl" style="background: var(--logo-coral);">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <div id="admin-users" class="mb-6"></div>
                <div id="admin-pets"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-300"><i class="fas fa-map-marked-alt text-2xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center text-white bg-[#E07A5F]">
            <i class="fas fa-plus text-2xl"></i>
        </button>
        <button onclick="location.reload()" class="w-14 h-14 text-slate-300"><i class="fas fa-sync-alt text-2xl"></i></button>
                        </nav>
                        <script>
    // --- VARIABLES GLOBALES ---
    let mainMap, uploadMap, uploadMarker, allPets = [];
    let currentSpecies = 'todos';
    let user = JSON.parse(localStorage.getItem('user'));

    // --- DICCIONARIO DE BARRIOS (Coordenadas Neuquén Capital) ---
    const coordsBarrios = {
        "Alta Barda": [-38.932, -68.077], "Altos del Limay": [-38.981, -68.083],
        "Área Centro": [-38.951, -68.059], "Belgrano": [-38.961, -68.046],
        "Canal V": [-38.957, -68.125], "Confluencia": [-38.974, -68.028],
        "Cuenca XV": [-38.936, -68.136], "Don Bosco": [-38.971, -68.068],
        "Huilliches": [-38.959, -68.106], "Islas Malvinas": [-38.942, -68.069],
        "La Sirena": [-38.974, -68.093], "Mariano Moreno": [-38.958, -68.032],
        "Melipal": [-38.937, -68.097], "Parque Industrial": [-38.905, -68.069],
        "Progreso": [-38.954, -68.088], "Provinciales Unidas": [-38.943, -68.046],
        "Rincón de Emilio": [-38.919, -68.048], "Río Grande": [-38.975, -68.054],
        "San Lorenzo": [-38.948, -68.118], "Santa Genoveva": [-38.946, -68.041],
        "Sapere": [-38.951, -68.025], "Terrazas del Neuquén": [-38.911, -68.079],
        "Unión de Mayo": [-38.944, -68.101], "Valentina Norte": [-38.941, -68.163],
        "Valentina Sur": [-38.988, -68.137], "Villa Ceferino": [-38.936, -68.088],
        "Villa Florencia": [-38.966, -68.076], "Villa María": [-38.966, -68.056]
    };

    // --- NAVEGACIÓN Y UI ---
    function showSection(id) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        
        if (id === 'home') {
            if (!mainMap) initMainMap();
            setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 300);
        }
        if (id === 'upload') {
            if (!uploadMap) initUploadMap();
            setTimeout(() => uploadMap.invalidateSize(), 300);
        }
        if (id === 'admin') loadAdminData();
    }

    function toggleUserMenu() {
        if (!user) { showSection('auth'); return; }
        const menu = document.getElementById('user-menu');
        menu.classList.toggle('hidden');
        document.getElementById('menu-email').innerText = user.email;
    }

    function checkAuth() { user ? showSection('upload') : showSection('auth'); }

    function updateAuthUI() {
        if (user) {
            document.getElementById('user-anchor').style.backgroundColor = 'var(--logo-coral)';
            document.getElementById('user-anchor').style.color = 'white';
            if (user.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
        }
    }

    // --- SISTEMA DE MAPAS ---
    function initMainMap() {
        mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
    }

    function initUploadMap() {
        uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
        uploadMap.on('click', e => {
            if (uploadMarker) uploadMarker.setLatLng(e.latlng);
            else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
            document.getElementById('lat-in').value = e.latlng.lat;
            document.getElementById('lng-in').value = e.latlng.lng;
        });
    }

    function autoZoomMap(barrio, mapaDestino) {
        if (coordsBarrios[barrio]) {
            const targetMap = mapaDestino === 'main' ? mainMap : uploadMap;
            targetMap.flyTo(coordsBarrios[barrio], 15, { duration: 1.5 });
            
            if (mapaDestino === 'upload') {
                const latlng = coordsBarrios[barrio];
                if (uploadMarker) uploadMarker.setLatLng(latlng);
                else uploadMarker = L.marker(latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = latlng[0];
                document.getElementById('lng-in').value = latlng[1];
            }
        }
    }

    // --- GESTIÓN DE MASCOTAS ---
    async function loadPets() {
        const res = await fetch('/pets');
        allPets = await res.json();
        renderPets();
    }

    function renderPets() {
        const list = document.getElementById('pet-list');
        const term = document.getElementById('search').value.toLowerCase();
        list.innerHTML = "";
        
        if (mainMap) {
            mainMap.eachLayer(l => { if (l instanceof L.CircleMarker) mainMap.removeLayer(l); });
        }

        allPets.filter(p => 
            (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) &&
            (currentSpecies === 'todos' || p.especie === currentSpecies)
        ).forEach(p => {
            const color = p.status === 'perdido' ? 'var(--logo-rojo)' : 'var(--logo-celeste)';
            const tel = p.users ? p.users.telefono : '2996894360';

            if (mainMap) {
                const marker = L.circleMarker([p.latitud, p.longitud], {color: color, radius: 9, fillOpacity: 0.8, weight: 3}).addTo(mainMap);
                marker.bindPopup(`<strong>${p.name.toUpperCase()}</strong><br>${p.barrio}`);
            }

            list.innerHTML += `
                <div class="card-pet">
                    <span class="status-badge" style="background:${color}">${p.status}</span>
                    <img src="${p.image_url}" onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)" class="w-full h-40 object-cover cursor-pointer">
                    <div class="p-5 text-center">
                        <p class="font-black text-sm uppercase">${p.name}</p>
                        <p class="text-[9px] font-bold text-slate-400 mb-4 uppercase">${p.barrio}</p>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${tel}" target="_blank" class="flex-1 text-white text-[10px] py-3 rounded-2xl font-black shadow-md" style="background: var(--logo-celeste)">WA</a>
                            <button onclick="sharePet('${p.name}', '${p.barrio}')" class="bg-slate-50 text-slate-400 px-4 rounded-2xl"><i class="fas fa-share-alt"></i></button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function setSpecies(sp, btn) {
        currentSpecies = sp;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPets();
    }

    function sharePet(n, b) {
        const txt = `🐾 Ayudanos con ${n} en barrio ${b}. Miralo acá: https://petneuquen.onrender.com`;
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
    }

    // --- ACCIONES DE FORMULARIO ---
    async function handleLogin(e) {
        e.preventDefault();
        const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
        if (res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
        else { const err = await res.json(); alert(err.msg || "Error"); }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const res = await fetch('/register', { method: 'POST', body: new FormData(e.target) });
        if (res.ok) alert("Solicitud enviada. ¡Pronto te avisaremos por mail!");
        else alert("Error en el registro");
    }

    async function handleUpload(e) {
        e.preventDefault();
        if (!document.getElementById('lat-in').value) return alert("Ubicá la mascota en el mapa haciendo clic.");
        
        const btn = document.getElementById('btn-up');
        btn.innerText = "Subiendo..."; btn.disabled = true;
        
        const fd = new FormData(e.target);
        fd.append('user_id', user.id);
        
        const res = await fetch('/pets/upload', { method: 'POST', body: fd });
        if (res.ok) location.reload();
        else { alert("Error al subir el reporte"); btn.disabled = false; btn.innerText = "Publicar Reporte"; }
    }

    // --- PANEL DE SUPERUSUARIO (ADMIN) ---
    async function loadAdminData() {
        if (!user || user.role !== 'admin') return;
        const res = await fetch('/admin/data');
        const data = await res.json();
        
        // Usuarios pendientes
        document.getElementById('admin-users').innerHTML = data.users.map(u => `
            <div class="bg-white p-4 rounded-3xl flex justify-between items-center mb-2 shadow-sm border border-emerald-100">
                <span class="text-xs font-black">${u.email}</span>
                <div class="flex gap-2">
                    <button onclick="adminAction('user', 'approve', ${u.id})" class="text-emerald-500"><i class="fas fa-check-circle text-xl"></i></button>
                    <button onclick="adminAction('user', 'delete', ${u.id})" class="text-red-300"><i class="fas fa-trash text-xl"></i></button>
                </div>
            </div>`).join('');

        // Mascotas (Moderar / Borrar)
        document.getElementById('admin-pets').innerHTML = data.pets.map(p => `
            <div class="bg-white p-3 rounded-3xl flex items-center gap-4 mb-2 shadow-sm">
                <img src="${p.image_url}" class="w-12 h-12 rounded-2xl object-cover">
                <span class="flex-1 text-xs font-black">${p.name} ${!p.is_approved ? '(⏳)':''}</span>
                <div class="flex gap-3">
                    ${!p.is_approved ? `<button onclick="adminAction('pet', 'approve', ${p.id})" class="text-orange-500"><i class="fas fa-plus-circle text-xl"></i></button>` : ''}
                    <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-300"><i class="fas fa-times-circle text-xl"></i></button>
                </div>
            </div>`).join('');
    }

    async function adminAction(type, action, id) {
        if (!confirm(`¿Estás seguro de realizar esta acción?`)) return;
        const method = action === 'delete' ? 'DELETE' : 'POST';
        const url = action === 'delete' ? `/admin/delete/${type}/${id}` : `/admin/approve/${type}/${id}`;
        
        const res = await fetch(url, { method: method });
        if (res.ok) loadAdminData();
    }

    function logout() { localStorage.removeItem('user'); location.reload(); }

    function checkUserPanel() {
        if (user && user.role === 'admin') showSection('admin');
        else showSection('home');
    }

    // --- INICIO ---
    window.onload = () => {
        updateAuthUI();
        showSection('home');
    };
                        
                            </script> 

</body>
</html>
