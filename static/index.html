<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hidden { display: none; }
        .container-custom { max-width: 1200px; margin: 0 auto; }
        
        /* Tarjetas estilo App */
        .pet-card { background: white; border-radius: 32px; overflow: hidden; transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .pet-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        
        .img-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* Mapa Principal */
        #main-map { border-radius: 32px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 10; }
        
        /* Marcadores */
        .pet-marker { width: 34px; height: 34px; border-radius: 50% 50% 50% 0; border: 3px solid white; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .pet-marker i { transform: rotate(45deg); font-size: 14px; }
    </style>
</head>
<body class="pb-24">
    <nav class="p-4 bg-white/80 backdrop-blur-md sticky top-0 z-[1000] border-b border-slate-100">
        <div class="container-custom flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('home')">
                <div class="bg-orange-500 p-2.5 rounded-xl text-white shadow-lg shadow-orange-200"><i class="fas fa-paw"></i></div>
                <h1 class="font-bold text-slate-800 text-xl tracking-tight">Huellitas<span class="text-orange-500">NQN</span></h1>
            </div>
            <button id="auth-btn" onclick="showSection('auth')" class="text-slate-400 hover:text-orange-500 transition-colors text-2xl"><i class="fas fa-user-circle"></i></button>
        </div>
    </nav>

    <main class="container-custom px-4 pt-6">
        <section id="sec-home" class="space-y-8">
            <div id="main-map" class="w-full h-[300px] md:h-[450px]"></div>
            
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-slate-800">Mascotas activas</h2>
                <span class="bg-slate-100 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Neuquén Capital</span>
            </div>

            <div id="pet-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-upload" class="hidden max-w-xl mx-auto py-4">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 space-y-6">
                <h2 class="text-2xl font-bold text-center">Subir mascota</h2>
                <form id="form-upload" onsubmit="handleUpload(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" name="name" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-orange-300" required>
                        <select name="status" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                            <option value="perdido">🚨 Perdido</option>
                            <option value="adopcion">🎁 Adopción</option>
                        </select>
                    </div>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                    <p class="text-[10px] font-bold text-orange-500 uppercase ml-2">Marcá la ubicación en el mapa:</p>
                    <div id="map-upload" class="w-full h-48 rounded-3xl border border-slate-100"></div>
                    <input type="hidden" name="latitud" id="lat-input">
                    <input type="hidden" name="longitud" id="lng-input">
                    <input type="file" name="file" class="text-sm block w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-orange-50 file:text-orange-600" required>
                    <button id="btn-submit" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-100 transition-transform active:scale-95">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-8">
            <div class="bg-indigo-600 p-8 rounded-[40px] text-white">
                <h2 class="text-2xl font-bold">Panel de Moderación</h2>
            </div>
            <div id="admin-user-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <div id="admin-pet-management" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <section id="sec-auth" class="hidden max-w-sm mx-auto py-10">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                <div id="auth-forms">
                    <div class="flex gap-2 mb-6 bg-slate-50 p-1.5 rounded-2xl">
                        <button onclick="toggleAuth('login')" id="t-login" class="flex-1 py-2.5 rounded-xl bg-white shadow-sm font-bold text-orange-600">Entrar</button>
                        <button onclick="toggleAuth('reg')" id="t-reg" class="flex-1 py-2.5 rounded-xl text-slate-400 font-bold">Registro</button>
                    </div>
                    <form id="f-login" onsubmit="handleLogin(event)" class="space-y-4">
                        <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <button class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-100">Ingresar</button>
                    </form>
                    <form id="f-reg" onsubmit="handleReg(event)" class="space-y-4 hidden">
                        <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="tel" name="telefono" placeholder="WhatsApp" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <button class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold">Registrarme</button>
                    </form>
                </div>
                <div id="user-info" class="hidden text-center space-y-4">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto text-slate-400"><i class="fas fa-user text-2xl"></i></div>
                    <p id="u-mail" class="font-bold text-slate-700"></p>
                    <button onclick="logout()" class="text-red-400 text-sm font-bold">Cerrar Sesión</button>
                </div>
            </div>
        </section>
    </main>

    <div id="admin-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] overflow-hidden shadow-2xl">
            <div id="modal-content"></div>
            <div class="p-6 flex gap-3" id="modal-actions"></div>
            <button onclick="closeAdminModal()" class="w-full p-4 text-slate-400 font-bold text-xs uppercase">Cerrar</button>
        </div>
    </div>

    <nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] bg-white/90 backdrop-blur-lg rounded-[30px] p-4 flex justify-around items-center z-[1000] shadow-xl border border-white/50">
        <button onclick="showSection('home')" class="text-slate-400 p-2"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-14 h-14 rounded-2xl -mt-14 shadow-lg shadow-orange-200 flex items-center justify-center transition-transform active:scale-90"><i class="fas fa-plus text-xl"></i></button>
        <button id="nav-admin" onclick="showAdmin()" class="hidden text-indigo-500 p-2"><i class="fas fa-shield-alt text-xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') setTimeout(initMainMap, 100);
            if (id === 'upload') setTimeout(initUploadMap, 100);
        }

        function initMainMap() {
            if (!mainMap) {
                mainMap = L.map('main-map', {zoomControl: false}).setView([-38.9517, -68.0611], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            }
            loadPets();
        }

        function initUploadMap() {
            if (!uploadMap) {
                uploadMap = L.map('map-upload').setView([-38.9517, -68.0611], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if (uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-input').value = e.latlng.lat;
                    document.getElementById('lng-input').value = e.latlng.lng;
                });
            }
        }

        async function loadPets() {
    const res = await fetch('/pets');
    const pets = await res.json();
    const list = document.getElementById('pet-list');
    list.innerHTML = '';
    
    mainMap.eachLayer(l => { if(l instanceof L.Marker) mainMap.removeLayer(l); });

    pets.forEach(p => {
        if(p.latitud) {
            const color = p.status === 'perdido' ? '#ef4444' : '#22c55e';
            const icon = L.divIcon({
                className: 'custom',
                html: `<div class="pet-marker" style="background-color:${color}"><i class="fas fa-paw"></i></div>`,
                iconSize: [34,34], iconAnchor: [17,34]
            });
            L.marker([p.latitud, p.longitud], {icon}).addTo(mainMap)
             .on('click', () => openPublicModal(p)); // Al tocar el icono del mapa también abre el modal
        }

        // La tarjeta ahora abre el modal al hacer clic
        list.innerHTML += `
            <div class="pet-card shadow-sm cursor-pointer" onclick='openPublicModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                <div class="img-wrapper">
                    <img src="${p.image_url}" loading="lazy">
                    <div class="absolute top-3 left-3 ${p.status==='perdido'?'bg-red-500':'bg-green-500'} text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">
                        ${p.status}
                    </div>
                </div>
                <div class="p-5">
                    <h3 class="font-bold text-lg text-slate-800">${p.name}</h3>
                    <p class="text-xs text-slate-400 font-bold mb-4"><i class="fas fa-map-marker-alt text-orange-400 mr-1"></i> ${p.barrio}</p>
                    <button class="w-full bg-slate-50 text-slate-400 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest group-hover:bg-orange-500 group-hover:text-white transition-all">Ver Detalles</button>
                </div>
            </div>`;
    });
}

function openPublicModal(p) {
    document.getElementById('p-modal-img').src = p.image_url;
    document.getElementById('p-modal-name').innerText = p.name;
    document.getElementById('p-modal-location').innerHTML = `<i class="fas fa-map-marker-alt text-orange-500 mr-1"></i> ${p.barrio}, Neuquén`;
    document.getElementById('p-modal-raza').innerText = p.raza || 'No especificada';
    document.getElementById('p-modal-edad').innerText = p.edad || 'No especificada';
    
    const statusEl = document.getElementById('p-modal-status');
    statusEl.innerText = p.status;
    statusEl.className = `absolute bottom-6 left-6 text-white text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest shadow-xl ${p.status==='perdido'?'bg-red-500':'bg-green-500'}`;
    
    document.getElementById('p-modal-wa-btn').href = `https://wa.me/${p.telefono}?text=Hola! Vi a ${p.name} en HuellitasNQN y quería contactarte.`;
    
    document.getElementById('p-modal-map-btn').onclick = () => {
        closePublicModal();
        mainMap.flyTo([p.latitud, p.longitud], 16);
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    document.getElementById('public-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden'; // Bloquea el scroll de fondo
}

function closePublicModal() {
    document.getElementById('public-modal').classList.add('hidden');
    document.body.style.overflow = 'auto'; // Libera el scroll
}

function copyShareLink() {
    navigator.clipboard.writeText(window.location.href);
    alert("¡Link de HuellitasNQN copiado! Compartilo en tus redes para ayudar.");
}
        
        
// --- NUEVAS FUNCIONES DE GESTIÓN ---

async function showAdmin() {
    showSection('admin');
    
    // 1. Usuarios por Aprobar
    const resU = await fetch('/admin/users/pending');
    const users = await resU.json();
    document.getElementById('admin-user-list').innerHTML = users.map(u => `
        <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border border-slate-100">
            <div><p class="font-bold text-sm text-slate-700">${u.email}</p></div>
            <div class="flex gap-2">
                <button onclick="approveUser(${u.id})" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">APROBAR</button>
                <button onclick="deleteUser(${u.id})" class="text-red-400 p-2"><i class="fas fa-user-times"></i></button>
            </div>
        </div>`).join('');

    // 2. Mascotas (Todas)
    const resP = await fetch('/pets?all_pets=true');
    const pets = await resP.json();
    document.getElementById('admin-pet-management').innerHTML = pets.map(p => `
        <div class="bg-white p-3 rounded-3xl shadow-sm border border-slate-50 flex gap-3 items-center">
            <img src="${p.image_url}" class="w-10 h-10 rounded-xl object-cover">
            <div class="flex-1 min-w-0">
                <p class="font-bold text-xs truncate">${p.name}</p>
                <p class="text-[9px] font-bold ${p.is_approved?'text-green-500':'text-orange-500'} uppercase">
                    ${p.is_approved ? '✅ Activa' : '⏳ Pendiente'}
                </p>
            </div>
            <button onclick='openPreview(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="bg-slate-50 text-slate-400 p-3 rounded-xl hover:text-indigo-500">
                <i class="fas fa-edit"></i>
            </button>
        </div>`).join('');
}

function openPreview(p) {
    document.getElementById('modal-content').innerHTML = `
        <img src="${p.image_url}" class="w-full h-64 object-cover shadow-inner">
        <div class="p-6 space-y-3 text-center">
            <div class="flex justify-center gap-2">
                 <span class="bg-slate-100 text-slate-500 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${p.status}</span>
                 ${p.is_approved ? '<span class="bg-green-100 text-green-600 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Visible</span>' : ''}
            </div>
            <h3 class="text-2xl font-bold text-slate-800">${p.name}</h3>
            <p class="text-slate-400 font-bold text-sm">${p.barrio} | <i class="fab fa-whatsapp"></i> ${p.telefono}</p>
        </div>`;

    let actions = '';
    
    if (!p.is_approved) {
        // Si no está aprobada, solo botón de aprobar o descartar
        actions = `
            <button onclick="approvePet(${p.id}); closeAdminModal();" class="flex-1 bg-green-500 text-white rounded-2xl font-bold py-4 shadow-lg shadow-green-100 transition-all active:scale-95">APROBAR</button>
            <button onclick="deletePet(${p.id}); closeAdminModal();" class="bg-red-50 text-red-400 rounded-2xl font-bold px-6 py-4 transition-all active:scale-95"><i class="fas fa-trash"></i></button>
        `;
    } else {
        // Si ya está aprobada, permitir marcar como finalizado o eliminar
        actions = `
            <button onclick="deletePet(${p.id}); closeAdminModal();" class="flex-1 bg-slate-800 text-white rounded-2xl font-bold py-4 shadow-lg transition-all active:scale-95">
                ${p.status === 'perdido' ? '¡ENCONTRADO!' : '¡ADOPTADO!'}
            </button>
            <button onclick="deletePet(${p.id}); closeAdminModal();" class="bg-red-50 text-red-400 rounded-2xl font-bold px-6 py-4 hover:bg-red-100 transition-all active:scale-95"><i class="fas fa-trash"></i></button>
        `;
    }

    document.getElementById('modal-actions').innerHTML = actions;
    document.getElementById('admin-modal').classList.remove('hidden');
}

// Asegurate de que deleteUser también esté:
async function deleteUser(id) {
    if(confirm("¿Estás seguro de rechazar/eliminar a este usuario?")) {
        await fetch(`/admin/users/delete/${id}`, { method: 'DELETE' });
        showAdmin();
    }
}
        

        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        async function approvePet(id) { await fetch('/pets/approve/'+id, {method:'POST'}); showAdmin(); }
        async function deletePet(id) { if(confirm("¿Eliminar?")) { await fetch('/admin/pets/delete/'+id, {method:'DELETE'}); showAdmin(); } }
        async function approveUser(id) { await fetch('/admin/users/approve/'+id, {method:'POST'}); showAdmin(); }
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method: 'POST', body: new FormData(e.target)});
            if (res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else { alert("Error o cuenta no aprobada."); }
        }
        async function handleReg(e) {
            e.preventDefault();
            const res = await fetch('/register', {method: 'POST', body: new FormData(e.target)});
            if (res.ok) { alert("¡Registrado! Esperá aprobación."); toggleAuth('login'); }
        }
        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-input').value) return alert("Marcá en el mapa.");
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = 'Subiendo...'; btn.disabled = true;
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', {method: 'POST', body: fd});
            if (res.ok) { alert("¡Enviado!"); showSection('home'); }
            btn.innerText = "Publicar"; btn.disabled = false;
        }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function toggleAuth(t) {
            document.getElementById('f-login').classList.toggle('hidden', t==='reg');
            document.getElementById('f-reg').classList.toggle('hidden', t==='login');
            document.getElementById('t-login').className = t==='login' ? 'flex-1 py-2.5 rounded-xl bg-white shadow-sm font-bold text-orange-600' : 'flex-1 py-2.5 rounded-xl text-slate-400 font-bold';
            document.getElementById('t-reg').className = t==='reg' ? 'flex-1 py-2.5 rounded-xl bg-white shadow-sm font-bold text-orange-600' : 'flex-1 py-2.5 rounded-xl text-slate-400 font-bold';
        }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('u-mail').innerText = user.email;
                if(user.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
