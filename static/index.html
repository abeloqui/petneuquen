<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #F4F1DE; color: #3D405B; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        #map { height: 40vh; border-radius: 0 0 3rem 3rem; border-bottom: 6px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-pet { background: white; border-radius: 2rem; overflow: hidden; transition: 0.3s; border: 2px solid transparent; }
        .card-pet:active { transform: scale(0.95); border-color: #E07A5F; }
        .btn-filter.active { background: #E07A5F; color: white; box-shadow: 0 5px 15px rgba(224,122,95,0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <div id="map" class="z-10"></div>

    <nav class="absolute top-4 left-0 w-full px-4 z-[1000]">
        <div class="glass p-3 rounded-2xl flex justify-between items-center shadow-lg border border-white/50">
            <div class="flex items-center gap-2">
                <img src="/static/logo.png" class="w-8 h-8">
                <h1 class="font-black text-lg">Huellitas<span class="text-[#E07A5F]">NQN</span></h1>
            </div>
            <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-[#E07A5F]">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="p-4 space-y-6">
        <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
            <button onclick="setFilter('todos', this)" class="btn-filter active px-6 py-3 bg-white rounded-full font-black text-xs uppercase shadow-sm">🔍 Todos</button>
            <button onclick="setFilter('perro', this)" class="btn-filter px-6 py-3 bg-white rounded-full font-black text-xs uppercase shadow-sm">🐶 Perros</button>
            <button onclick="setFilter('gato', this)" class="btn-filter px-6 py-3 bg-white rounded-full font-black text-xs uppercase shadow-sm">🐱 Gatos</button>
        </div>

        <div class="relative">
            <i class="fas fa-location-dot absolute left-5 top-1/2 -translate-y-1/2 text-[#E07A5F]"></i>
            <input type="text" id="searchInput" oninput="render()" placeholder="¿En qué barrio buscamos?" 
                   class="w-full p-5 pl-12 rounded-3xl bg-white shadow-inner outline-none focus:ring-2 ring-[#E07A5F] transition-all">
        </div>

        <div id="petGrid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[1000]">
        <div class="glass p-4 rounded-[3rem] flex justify-around items-center border-2 border-white shadow-2xl">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="text-slate-400 text-xl"><i class="fas fa-home"></i></button>
            <button class="w-16 h-16 bg-[#E07A5F] text-white rounded-full -mt-14 border-[6px] border-[#F4F1DE] shadow-xl flex items-center justify-center">
                <i class="fas fa-plus text-2xl"></i>
            </button>
            <button onclick="location.reload()" class="text-slate-400 text-xl"><i class="fas fa-bell"></i></button>
        </div>
    </div>

    <script>
        let allPets = [];
        let map;
        let currentFilter = 'todos';

        async function init() {
            const res = await fetch('/pets');
            allPets = await res.json();
            
            map = L.map('map', {zoomControl: false}).setView([-38.95, -68.06], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            
            render();
        }

        function render() {
            const grid = document.getElementById('petGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";
            
            const filtered = allPets.filter(p => {
                const matchType = currentFilter === 'todos' || p.especie === currentFilter;
                const matchBarrio = p.barrio.toLowerCase().includes(search);
                return matchType && matchBarrio;
            });

            filtered.forEach(p => {
                const isLost = p.status.toLowerCase() === 'perdido';
                grid.innerHTML += `
                    <div class="card-pet shadow-md">
                        <div class="h-32 w-full relative">
                            <img src="${p.image_url}" class="w-full h-full object-cover" onclick="map.flyTo([${p.lat}, ${p.lng}], 16)">
                            <div class="absolute top-2 left-2 px-2 py-1 rounded-lg text-[8px] font-black text-white uppercase ${isLost ? 'bg-red-500' : 'bg-emerald-500'}">
                                ${p.status}
                            </div>
                        </div>
                        <div class="p-3">
                            <h3 class="font-black text-xs uppercase truncate">${p.name}</h3>
                            <p class="text-[9px] text-slate-400 mb-3"><i class="fas fa-map-marker-alt"></i> ${p.barrio}</p>
                            <div class="flex gap-2">
                                <a href="/generate_plate/${p.id}" class="flex-1 bg-slate-100 text-[#3D405B] py-2 rounded-xl text-[9px] font-black text-center uppercase">
                                    <i class="fas fa-download"></i> Placa
                                </a>
                                <a href="https://wa.me/2996894360" class="w-10 bg-emerald-100 text-emerald-600 py-2 rounded-xl flex items-center justify-center">
                                    <i class="fab fa-whatsapp text-lg"></i>
                                </a>
                            </div>
                        </div>
                    </div>`;
                
                // Agregar marcador al mapa
                L.circleMarker([p.lat, p.lng], {
                    radius: 8, color: '#white', weight: 2, fill: true, fillColor: isLost ? '#ef4444' : '#10b981', fillOpacity: 1
                }).addTo(map).bindPopup(`<b>${p.name}</b><br>${p.barrio}`);
            });
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
