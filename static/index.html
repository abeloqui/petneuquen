<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-amarillo: #F2CC8F; --logo-rojo: #C94C4C; --logo-crema: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 140px; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #main-map { height: 360px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 40px rgba(61,64,91,0.12); z-index: 10; }
        .btn-filter { padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 700; background: white; transition: 0.3s; border: 1px solid rgba(129,178,154,0.2); }
        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 8px 20px rgba(224,122,95,0.3); }
        .custom-input { background: white; border-radius: 1.5rem; padding: 16px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); width: 100%; outline: none; }
        .card-pet { background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 10px 25px rgba(61,64,91,0.06); position: relative; }
        .status-badge { position: absolute; top: 14px; left: 14px; padding: 6px 14px; border-radius: 20px; font-size: 8px; font-weight: 900; color: white; text-transform: uppercase; z-index: 20; }
        .section-container { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Área Centro"><option value="Belgrano"><option value="Confluencia"><option value="San Lorenzo"><option value="Santa Genoveva"><option value="Villa María">
    </datalist>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md overflow-hidden">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-widest" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>
        <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-md">
            <i class="fas fa-user text-xl text-slate-300"></i>
        </button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <div class="flex gap-3">
                <input type="text" id="search" list="lista-barrios" oninput="renderPets()" placeholder="Buscar barrio..." class="custom-input">
                <select id="filter-status" onchange="renderPets()" class="custom-input w-auto font-bold" style="color: var(--logo-coral);">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-auth" class="section-container hidden">...</section>
        <section id="sec-upload" class="section-container hidden">...</section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-300"><i class="fas fa-map-marked-alt text-2xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center text-white" style="background: var(--logo-coral);"><i class="fas fa-plus text-2xl"></i></button>
        <button onclick="location.reload()" class="w-14 h-14 text-slate-300"><i class="fas fa-sync-alt text-2xl"></i></button>
    </nav>
    
    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [];
        let currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));

        function initMainMap() {
            if(mainMap) return;
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            list.innerHTML = "";
            
            if(mainMap) mainMap.eachLayer(l => { if(l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            const filtered = allPets.filter(p => 
                (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) &&
                (status === 'todos' || p.status === status) &&
                (currentSpecies === 'todos' || p.especie === currentSpecies)
            );

            filtered.forEach(p => {
                const color = p.status === 'perdido' ? 'var(--logo-rojo)' : 'var(--logo-celeste)';
                const tel = p.users ? p.users.telefono : '299000000';
                if(mainMap) L.circleMarker([p.latitud, p.longitud], {color: color, radius: 9, fillOpacity: 0.8}).addTo(mainMap);
                
                list.innerHTML += `
                    <div class="card-pet">
                        <span class="status-badge" style="background:${color}">${p.status}</span>
                        <img src="${p.image_url}" onclick="focusOnPet(${p.latitud}, ${p.longitud})" class="w-full h-40 object-cover cursor-pointer">
                        <div class="p-5 text-center">
                            <p class="font-black text-sm uppercase">${p.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 mb-4 uppercase">${p.barrio}</p>
                            <div class="flex gap-2">
                                <a href="https://wa.me/${tel}" target="_blank" class="flex-1 text-white text-[10px] py-3 rounded-2xl font-black shadow-md" style="background: var(--logo-celeste)">WA</a>
                                <button onclick="shareOnFacebook(${p.id}, '${p.name}')" class="bg-[#1877F2] text-white px-4 rounded-2xl active:scale-90 transition-transform">
                                    <i class="fab fa-facebook-f"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function shareOnFacebook(id, nombre) {
            const shareUrl = `https://petneuquen.onrender.com/mascota/${id}`;
            const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`;
            const w = 600, h = 450;
            const left = (window.innerWidth/2)-(w/2), top = (window.innerHeight/2)-(h/2);
            window.open(fbUrl, nombre, `width=${w},height=${h},top=${top},left=${left},toolbar=no,menubar=no`);
        }

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') { initMainMap(); loadPets(); }
        }

        function focusOnPet(lat, lng) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (mainMap) mainMap.flyTo([lat, lng], 16);
        }

        window.onload = () => { showSection('home'); };
    </script>
</body>
</html>
