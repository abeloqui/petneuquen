<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; }
        .section-hidden { display: none; }
    </style>
</head>
<body class="pb-24">

    <nav class="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div onclick="showSection('home')" class="flex items-center gap-2 cursor-pointer">
            <div class="bg-orange-500 p-2 rounded-xl text-white"><i class="fas fa-paw"></i></div>
            <h1 class="font-bold text-orange-600">HuellitasNQN</h1>
        </div>
        <button onclick="showSection('auth')" id="user-btn" class="text-gray-400 text-xl"><i class="fas fa-user-circle"></i></button>
    </nav>

    <section id="sec-auth" class="p-6 section-hidden max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-xl">
            <div class="flex border-b mb-6">
                <button onclick="toggleAuth('login')" class="flex-1 py-2 font-bold text-orange-500 border-b-2 border-orange-500" id="btn-tab-login">Login</button>
                <button onclick="toggleAuth('reg')" class="flex-1 py-2 font-bold text-gray-400" id="btn-tab-reg">Registro</button>
            </div>

            <form id="form-login" onsubmit="handleAuth(event, '/login')">
                <input type="email" name="email" placeholder="Email" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl" required>
                <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl" required>
                <button class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold">Entrar</button>
            </form>

            <form id="form-reg" class="hidden" onsubmit="handleAuth(event, '/register')">
                <input type="email" name="email" placeholder="Email" class="w-full p-3 mb-3 bg-gray-50 rounded-xl" required>
                <input type="password" name="password" placeholder="Contraseña" class="w-full p-3 mb-3 bg-gray-50 rounded-xl" required>
                <input type="text" name="telefono" placeholder="WhatsApp (Ej: 2991234567)" class="w-full p-3 mb-6 bg-gray-50 rounded-xl" required>
                <button class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold">Crear Cuenta</button>
            </form>
        </div>
    </section>

    <section id="sec-home" class="p-4 space-y-4">
        <div id="pet-list" class="space-y-6">
            </div>
    </section>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around">
        <button onclick="showSection('home')" class="text-orange-500"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="checkLoginForUpload()" class="bg-orange-500 text-white w-12 h-12 rounded-full -mt-8 shadow-lg flex items-center justify-center text-2xl">+</button>
        <button onclick="showAdminPanel()" id="admin-btn" class="hidden text-purple-500"><i class="fas fa-shield-alt text-2xl"></i></button>
    </div>

    <script>
        let currentUser = null;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('section-hidden'));
            document.getElementById('sec-' + id).classList.remove('section-hidden');
        }

        function toggleAuth(type) {
            document.getElementById('form-login').classList.toggle('hidden', type === 'reg');
            document.getElementById('form-reg').classList.toggle('hidden', type === 'login');
        }

        async function handleAuth(e, url) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const res = await fetch(url, { method: 'POST', body: formData });
            const data = await res.json();
            
            if (res.ok) {
                if(url === '/login') {
                    currentUser = data;
                    localStorage.setItem('user', JSON.stringify(data));
                    if(data.role === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
                    alert("¡Bienvenido!");
                    showSection('home');
                } else {
                    alert("Registro exitoso, ahora inicia sesión");
                    toggleAuth('login');
                }
            } else { alert(data.detail); }
        }

        async function loadPets() {
            const res = await fetch('/pets');
            const pets = await res.json();
            const list = document.getElementById('pet-list');
            list.innerHTML = pets.map(p => `
                <div class="bg-white rounded-3xl shadow-md overflow-hidden">
                    <img src="${p.image_url}" class="w-full h-64 object-cover">
                    <div class="p-4">
                        <h3 class="text-xl font-bold">${p.name}</h3>
                        <p class="text-gray-400 text-sm mb-4">${p.barrio || 'Neuquén'}</p>
                        <a href="https://wa.me/${p.telefono}" class="block text-center bg-[#25D366] text-white py-3 rounded-xl font-bold">
                            <i class="fab fa-whatsapp"></i> Contactar
                        </a>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadPets;
    </script>
</body>
</html>
