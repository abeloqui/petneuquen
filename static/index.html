<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-amarillo: #F2CC8F; --logo-rojo: #C94C4C; --logo-crema: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 120px; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(10px); }
        #main-map { height: 350px; width: 100%; border-radius: 2rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-pet { background: white; border-radius: 2rem; overflow: hidden; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-badge { position: absolute; top: 10px; left: 10px; padding: 4px 12px; border-radius: 15px; font-size: 8px; font-weight: 900; color: white; z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Área Centro"><option value="Belgrano"><option value="Confluencia"><option value="San Lorenzo"><option value="Santa Genoveva"><option value="Villa María">
    </datalist>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center">
        <div onclick="location.reload()" class="flex items-center gap-2 cursor-pointer">
            <h1 class="font-black text-xl">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
        </div>
        <button onclick="toggleUserMenu()" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center">
            <i class="fas fa-user text-slate-300"></i>
        </button>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        <section id="sec-home">
            <div id="main-map" class="mb-6"></div>
            <div class="flex gap-2 overflow-x-auto mb-4 pb-2">
                <button onclick="setSpecies('todos', this)" class="bg-white px-4 py-2 rounded-full text-xs font-bold active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="bg-white px-4 py-2 rounded-full text-xs font-bold">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="bg-white px-4 py-2 rounded-full text-xs font-bold">🐱 Gatos</button>
            </div>
            <div class="flex gap-2 mb-6">
                <input type="text" id="search" list="lista-barrios" oninput="renderPets()" placeholder="Barrio..." class="flex-1 p-4 rounded-2xl bg-white outline-none text-sm">
                <select id="filter-status" onchange="renderPets()" class="p-4 rounded-2xl bg-white font-bold text-xs">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-auth" class="hidden space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl">
                <h2 id="auth-title" class="text-2xl font-black mb-6">Ingresar</h2>
                <form id="form-auth" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <div id="reg-fields" class="hidden">
                        <input type="tel" name="telefono" placeholder="WhatsApp (ej: 2991234567)" class="w-full p-4 rounded-2xl bg-slate-50 outline-none">
                    </div>
                    <button type="submit" class="w-full py-4 rounded-2xl bg-[#E07A5F] text-white font-black shadow-lg">Continuar</button>
                </form>
                <p onclick="toggleAuthMode()" class="text-center mt-6 text-xs font-bold text-slate-400 cursor-pointer">¿No tenés cuenta? Registrate</p>
            </div>
        </section>

        <section id="sec-upload" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem]">
                <h2 class="font-black text-xl mb-4">Reportar Mascota</h2>
                <form id="form-pet" class="space-y-3">
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="w-full p-4 rounded-2xl bg-slate-50" required>
                    <select name="status" class="w-full p-4 rounded-2xl bg-slate-50 font-bold text-orange-500">
                        <option value="perdido">Perdido / Encontrado</option>
                        <option value="adopcion">En Adopción</option>
                    </select>
                    <input type="text" name="barrio" list="lista-barrios" placeholder="Barrio de Neuquén" class="w-full p-4 rounded-2xl bg-slate-50" required>
                    <div id="upload-map" class="h-40 w-full rounded-2xl mb-2"></div>
                    <input type="file" name="file" accept="image/*" class="w-full text-xs" required>
                    <button type="submit" class="w-full py-4 rounded-2xl bg-[#81B29A] text-white font-black">Publicar reporte</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-6">
            <div class="grid grid-cols-3 gap-2" id="admin-stats"></div>
            <div id="admin-users" class="space-y-2"></div>
            <div id="admin-pets" class="space-y-2"></div>
        </section>

        <section id="sec-profile" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem]">
                <h2 class="font-black text-xl mb-4">Mis Publicaciones</h2>
                <div id="user-pet-list" class="space-y-2"></div>
                <button onclick="logout()" class="w-full mt-6 py-4 text-red-400 font-bold text-sm">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass shadow-2xl rounded-full p-2 flex justify-around items-center z-[2000]">
        <button onclick="showSection('home')" class="w-12 h-12 flex items-center justify-center text-slate-400"><i class="fas fa-map"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 rounded-full bg-[#E07A5F] text-white flex items-center justify-center -mt-10 shadow-xl border-4 border-[#F4F1DE]"><i class="fas fa-plus"></i></button>
        <button onclick="showSection(user ? (user.role === 'admin' ? 'admin' : 'profile') : 'auth')" class="w-12 h-12 flex items-center justify-center text-slate-400"><i class="fas fa-th-large"></i></button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));
        let isLogin = true;

        function initMainMap() {
            if(mainMap) return;
            mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            if(uploadMap) return;
            uploadMap = L.map('upload-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMap.removeLayer(uploadMarker);
                uploadMarker = L.marker(e.latlng).addTo(uploadMap);
            });
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            list.innerHTML = "";
            
            if(mainMap) mainMap.eachLayer(l => { if(l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            const filtered = allPets.filter(p => 
                (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) &&
                (status === 'todos' || p.status === status) &&
                (currentSpecies === 'todos' || p.especie === currentSpecies)
            );

            filtered.forEach(p => {
                const color = p.status === 'perdido' ? '#C94C4C' : '#81B29A';
                const tel = p.users ? p.users.telefono : '';
                if(mainMap) L.circleMarker([p.latitud, p.longitud], {color: color, radius: 8, fillOpacity: 0.8}).addTo(mainMap);
                
                list.innerHTML += `
                    <div class="card-pet">
                        <span class="status-badge" style="background:${color}">${p.status}</span>
                        <img src="${p.image_url}" onclick="focusOnPet(${p.latitud}, ${p.longitud})" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-black text-xs uppercase">${p.name}</p>
                            <div class="flex gap-2 mt-2">
                                <a href="https://wa.me/${tel}" target="_blank" class="flex-1 bg-[#81B29A] text-white py-2 rounded-xl text-[9px] font-bold">WA</a>
                                <button onclick="shareFB(${p.id}, '${p.name}')" class="bg-[#1877F2] text-white px-3 rounded-xl"><i class="fab fa-facebook-f text-[10px]"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function shareFB(id, name) {
            const url = `https://petneuquen.onrender.com/mascota/${id}`;
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, 'Compartir', 'width=600,height=400');
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') { initMainMap(); loadPets(); }
            if(id === 'upload') initUploadMap();
            if(id === 'admin') loadAdminData();
            if(id === 'profile') loadUserPets();
        }

        function checkAuth() { if(!user) showSection('auth'); else showSection('upload'); }
        
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Ingresar' : 'Registrarse';
            document.getElementById('reg-fields').classList.toggle('hidden', isLogin);
        }

        document.getElementById('form-auth').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const res = await fetch(isLogin ? '/login' : '/register', { method: 'POST', body: fd });
            if(res.ok) {
                const data = await res.json();
                if(isLogin) {
                    localStorage.setItem('user', JSON.stringify(data));
                    location.reload();
                } else { alert("Cuenta creada. Esperá aprobación."); location.reload(); }
            } else alert("Error en los datos");
        };

        document.getElementById('form-pet').onsubmit = async (e) => {
            e.preventDefault();
            if(!uploadMarker) return alert("Marcá la ubicación en el mapa");
            const fd = new FormData(e.target);
            fd.append('user_id', user.id);
            fd.append('latitud', uploadMarker.getLatLng().lat);
            fd.append('longitud', uploadMarker.getLatLng().lng);
            const res = await fetch('/pets/upload', { method: 'POST', body: fd });
            if(res.ok) { alert("Publicado. Esperando aprobación."); location.reload(); }
        };

        async function loadAdminData() {
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('admin-stats').innerHTML = `
                <div class="bg-white p-4 rounded-3xl text-center"><p class="text-xs font-bold">Perdidos</p><p class="text-xl font-black">${data.stats.perdidos}</p></div>
                <div class="bg-white p-4 rounded-3xl text-center"><p class="text-xs font-bold">Adopción</p><p class="text-xl font-black">${data.stats.adopcion}</p></div>
                <div class="bg-white p-4 rounded-3xl text-center text-orange-500"><p class="text-xs font-bold">Nuevos</p><p class="text-xl font-black">${data.stats.pendientes}</p></div>`;
            
            document.getElementById('admin-users').innerHTML = data.users.map(u => `<div class="bg-white p-4 rounded-3xl flex justify-between items-center"><p class="text-xs font-bold">${u.email}</p><button onclick="approve('user', ${u.id})" class="bg-emerald-400 text-white px-4 py-2 rounded-xl text-[10px]">Aprobar</button></div>`).join('');
            document.getElementById('admin-pets').innerHTML = data.pets.filter(p => !p.is_approved).map(p => `<div class="bg-white p-4 rounded-3xl flex justify-between items-center"><p class="text-xs font-bold">${p.name}</p><button onclick="approve('pet', ${p.id})" class="bg-orange-400 text-white px-4 py-2 rounded-xl text-[10px]">Aprobar</button></div>`).join('');
        }

        async function approve(t, id) { await fetch(`/admin/approve/${t}/${id}`, {method: 'POST'}); loadAdminData(); }
        async function loadUserPets() {
            const res = await fetch(`/my-pets/${user.id}`);
            const pets = await res.json();
            document.getElementById('user-pet-list').innerHTML = pets.map(p => `<div class="bg-white p-3 rounded-2xl flex justify-between items-center"><p class="text-xs font-bold">${p.name}</p><button onclick="deletePet(${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button></div>`).join('');
        }
        async function deletePet(id) { if(confirm("Borrar?")) { await fetch(`/pets/user-delete/${id}`, {method: 'DELETE'}); loadUserPets(); } }
        function logout() { localStorage.clear(); location.reload(); }
        function setSpecies(s, b) {
            currentSpecies = s;
            document.querySelectorAll('.active').forEach(x => x.classList.remove('active', 'bg-[#E07A5F]', 'text-white'));
            b.classList.add('active', 'bg-[#E07A5F]', 'text-white');
            renderPets();
        }
        function focusOnPet(la, lo) { window.scrollTo(0,0); mainMap.flyTo([la, lo], 16); }
        window.onload = () => showSection('home');
    </script>
</body>
</html>
