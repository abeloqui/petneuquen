<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-crema: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 120px; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(10px); }
        #main-map { height: 350px; width: 100%; border-radius: 2rem; border: 4px solid white; shadow: lg; }
        #map-upload { height: 180px; width: 100%; border-radius: 1rem; border: 2px solid white; margin-top: 10px; }
        .custom-input { background: white; border-radius: 1.2rem; padding: 12px 18px; width: 100%; border: none; outline: none; font-size: 14px; }
        .btn-main { background: var(--logo-coral); color: white; font-weight: 900; border-radius: 1.5rem; padding: 15px; width: 100%; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <h1 onclick="location.reload()" class="font-black text-xl cursor-pointer tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-red-500 text-white text-[8px] font-black px-2 py-1 rounded">ADMIN</span>
            <button onclick="toggleMenu()" class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm"><i class="fas fa-user"></i></button>
            <div id="user-menu" class="hidden absolute top-12 right-0 w-48 bg-white rounded-2xl shadow-xl z-[2001] overflow-hidden border">
                <button onclick="showSection('user-panel'); toggleMenu()" class="w-full text-left p-4 text-xs font-bold">Mis Reportes</button>
                <button id="btn-admin" onclick="showSection('admin'); toggleMenu()" class="hidden w-full text-left p-4 text-xs font-bold text-red-500 border-t">Panel Admin</button>
                <button onclick="logout()" class="w-full text-left p-4 text-xs font-bold border-t text-slate-400">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        <section id="sec-home" class="section-container space-y-4">
            <div id="main-map"></div>
            <input type="text" id="search" oninput="renderPets()" placeholder="Buscar por barrio..." class="custom-input shadow-sm">
            <div id="pet-list" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl">
                <div class="flex gap-2 mb-6 bg-slate-100 p-1 rounded-2xl">
                    <button onclick="toggleAuth('login')" id="t-login" class="flex-1 py-2 rounded-xl font-bold text-xs bg-white">Login</button>
                    <button onclick="toggleAuth('reg')" id="t-reg" class="flex-1 py-2 rounded-xl font-bold text-xs text-slate-400">Registro</button>
                </div>
                <form id="f-login" onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="custom-input bg-slate-50" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input bg-slate-50" required>
                    <button type="submit" class="btn-main">Entrar</button>
                </form>
                <form id="f-reg" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                    <input type="email" name="email" placeholder="Email" class="custom-input bg-slate-50" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input bg-slate-50" required>
                    <input type="tel" name="telefono" placeholder="WhatsApp (299...)" class="custom-input bg-slate-50" required>
                    <button type="submit" class="btn-main" style="background: var(--logo-celeste);">Solicitar Cuenta</button>
                </form>
            </div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl">
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre" class="custom-input bg-slate-50" required>
                    <select name="status" class="custom-input bg-slate-50"><option value="perdido">Perdido</option><option value="adopcion">En Adopción</option></select>
                    <input type="text" name="barrio" placeholder="Barrio" class="custom-input bg-slate-50" required>
                    <div id="map-upload"></div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="text-[10px]" required>
                    <button type="submit" class="btn-main">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-user-panel" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl">
                <h2 class="font-black mb-4">Mis Publicaciones</h2>
                <div id="my-list" class="space-y-3"></div>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl space-y-6">
                <h2 class="font-black text-red-500">Panel Admin</h2>
                <div id="adm-metrics" class="grid grid-cols-2 gap-2"></div>
                <div>
                    <h3 class="text-[10px] font-bold uppercase text-slate-400 mb-2">Usuarios Pendientes</h3>
                    <div id="adm-users" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-[10px] font-bold uppercase text-slate-400 mb-2">Mascotas</h3>
                    <div id="adm-pets" class="space-y-2"></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass shadow-2xl rounded-[2.5rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="text-slate-300"><i class="fas fa-map text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 rounded-full -mt-12 bg-[#E07A5F] text-white shadow-xl"><i class="fas fa-plus"></i></button>
        <button onclick="location.reload()" class="text-slate-300"><i class="fas fa-sync"></i></button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], user = JSON.parse(localStorage.getItem('user'));
        const toast = (t, i='success') => Swal.fire({title: t, icon: i, toast: true, position: 'top-end', showConfirmButton: false, timer: 2000});
        const load = (m) => Swal.fire({title: m, allowOutsideClick: false, didOpen: () => Swal.showLoading()});

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') { if(!mainMap) initMaps(); loadPets(); }
            if (id === 'upload' && !uploadMap) initUploadMap();
            if (id === 'admin') loadAdmin();
            if (id === 'user-panel') loadUserPets();
        }

        function initMaps() {
            mainMap = L.map('main-map', {zoomControl: false}).setView([-38.95, -68.06], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            setTimeout(() => {
                uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.95, -68.06], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-in').value = e.latlng.lat;
                    document.getElementById('lng-in').value = e.latlng.lng;
                });
            }, 200);
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const q = document.getElementById('search').value.toLowerCase();
            list.innerHTML = allPets.filter(p => p.barrio.toLowerCase().includes(q)).map(p => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-white">
                    <img src="${p.image_url}" class="w-full h-32 object-cover">
                    <div class="p-2 text-center">
                        <p class="font-black text-[10px] uppercase truncate">${p.name}</p>
                        <a href="https://wa.me/${p.users?.telefono}" class="text-[9px] font-bold text-emerald-500 uppercase">Contactar</a>
                    </div>
                </div>
            `).join('');
        }

        async function loadAdmin() {
            const res = await fetch('/admin/data');
            const {users, pets} = await res.json();
            document.getElementById('adm-metrics').innerHTML = `<div class="bg-slate-50 p-3 rounded-2xl">Usuarios: ${users.length}</div><div class="bg-slate-50 p-3 rounded-2xl">Mascotas: ${pets.length}</div>`;
            document.getElementById('adm-users').innerHTML = users.filter(u => !u.is_approved).map(u => `
                <div class="flex justify-between items-center p-2 bg-slate-50 rounded-xl text-[10px]">
                    <span>${u.email}</span>
                    <div class="flex gap-2">
                        <button onclick="admAct('user','approve',${u.id})" class="text-emerald-500"><i class="fas fa-check"></i></button>
                        <button onclick="admAct('user','delete',${u.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('adm-pets').innerHTML = pets.map(p => `
                <div class="flex items-center gap-2 p-2 bg-slate-50 rounded-xl text-[10px]">
                    <img src="${p.image_url}" class="w-6 h-6 rounded object-cover">
                    <span class="flex-1">${p.name}</span>
                    ${!p.is_approved ? `<button onclick="admAct('pet','approve',${p.id})" class="text-emerald-500"><i class="fas fa-check"></i></button>` : ''}
                    <button onclick="admAct('pet','delete',${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function admAct(type, act, id) {
            if (act === 'delete') {
                const r = await Swal.fire({title: '¿Borrar?', icon: 'warning', showCancelButton: true});
                if(!r.isConfirmed) return;
            }
            load("Procesando...");
            const method = act === 'delete' ? 'DELETE' : 'POST';
            await fetch(`/admin/${act}/${type}/${id}`, {method});
            Swal.close(); loadAdmin();
        }

        async function handleLogin(e) {
            e.preventDefault();
            load("Entrando...");
            const res = await fetch('/login', {method: 'POST', body: new FormData(e.target)});
            if(res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else { Swal.close(); toast("Error", "error"); }
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function toggleMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }
        function toggleAuth(t) { 
            const isL = t === 'login';
            document.getElementById('f-login').classList.toggle('hidden', !isL);
            document.getElementById('f-reg').classList.toggle('hidden', isL);
            document.getElementById('t-login').classList.toggle('bg-white', isL);
            document.getElementById('t-reg').classList.toggle('bg-white', !isL);
        }
        function logout() { localStorage.removeItem('user'); location.reload(); }

        window.onload = () => {
            if(user) {
                if(user.role === 'admin') {
                    document.getElementById('admin-badge').classList.remove('hidden');
                    document.getElementById('btn-admin').classList.remove('hidden');
                }
            }
            showSection('home');
        };
    </script>
</body>
</html>
