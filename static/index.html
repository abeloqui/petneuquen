<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #F4F1DE; color: #3D405B; padding-bottom: 100px; }
        .glass { background: rgba(244, 241, 222, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        #main-map { height: 350px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .btn-filter { padding: 12px 24px; border-radius: 25px; background: white; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .btn-filter.active { background: #E07A5F; color: white; box-shadow: 0 5px 15px rgba(224,122,95,0.4); }
        .card-pet { background: white; border-radius: 2.5rem; overflow: hidden; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .status-pill { position: absolute; top: 15px; left: 15px; padding: 6px 12px; border-radius: 20px; font-size: 9px; font-weight: 900; color: white; text-transform: uppercase; z-index: 10; }
        .nav-bottom { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 1000; }
    </style>
</head>
<body>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="location.reload()" class="flex items-center gap-3 cursor-pointer">
            <img src="/static/logo.png" class="w-10 h-10">
            <div>
                <h1 class="font-black text-xl leading-none">Huellitas<span class="text-[#E07A5F]">NQN</span></h1>
                <p class="text-[8px] font-bold uppercase tracking-widest text-[#81B29A]">Neuquén Capital</p>
            </div>
        </div>
        <button onclick="handleUser()" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-md">
            <i class="fas fa-user text-slate-300"></i>
        </button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        <div id="main-map"></div>

        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="filterBy('todos', this)" class="btn-filter active">🔍 Todos</button>
            <button onclick="filterBy('perro', this)" class="btn-filter">🐶 Perros</button>
            <button onclick="filterBy('gato', this)" class="btn-filter">🐱 Gatos</button>
        </div>

        <div class="relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" id="searchBar" oninput="renderPets()" placeholder="Buscar barrio (ej: Alta Barda)..." 
                   class="w-full p-5 pl-14 rounded-3xl bg-white shadow-sm outline-none border-2 border-transparent focus:border-[#E07A5F] transition-all">
        </div>

        <div id="petGrid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div class="nav-bottom">
        <div class="glass p-3 rounded-[3rem] flex justify-around items-center border-2 border-white shadow-2xl">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="w-12 h-12 text-slate-400"><i class="fas fa-home text-xl"></i></button>
            <button onclick="location.href='/upload'" class="w-16 h-16 bg-[#E07A5F] rounded-full -mt-12 border-[6px] border-[#F4F1DE] shadow-xl text-white flex items-center justify-center">
                <i class="fas fa-plus text-2xl"></i>
            </button>
            <button onclick="location.reload()" class="w-12 h-12 text-slate-400"><i class="fas fa-sync-alt text-xl"></i></button>
        </div>
    </div>

    <script>
        let allPets = [];
        let map;
        let currentFilter = 'todos';

        async function init() {
            try {
                const res = await fetch('/pets');
                allPets = await res.json();
                renderPets();
                initMap();
            } catch (e) { console.error("Error inicializando:", e); }
        }

        function initMap() {
            map = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            
            // Agregar marcadores
            allPets.forEach(p => {
                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background:#E07A5F; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`
                });
                L.marker([p.latitud, p.longitud], {icon}).addTo(map)
                 .bindPopup(`<b>${p.name}</b><br>${p.barrio}`);
            });
        }

        function renderPets() {
            const grid = document.getElementById('petGrid');
            const term = document.getElementById('searchBar').value.toLowerCase();
            grid.innerHTML = "";

            const filtered = allPets.filter(p => {
                const matchTerm = p.barrio.toLowerCase().includes(term);
                const matchType = currentFilter === 'todos' || p.especie === currentFilter;
                return matchTerm && matchType;
            });

            filtered.forEach(p => {
                const color = p.status === 'perdido' ? '#C94C4C' : '#81B29A';
                grid.innerHTML += `
                    <div class="card-pet">
                        <span class="status-pill" style="background:${color}">${p.status}</span>
                        <img src="${p.image_url}" class="w-full h-40 object-cover" onclick="map.flyTo([${p.latitud}, ${p.longitud}], 16)">
                        <div class="p-4 text-center">
                            <h3 class="font-black text-xs uppercase truncate mb-3">${p.name}</h3>
                            <div class="flex gap-2">
                                <button onclick="downloadPlate('${p.name}', '${p.barrio}', '${p.status}', '${p.image_url}')" 
                                        class="flex-1 bg-slate-50 p-3 rounded-xl text-[8px] font-black uppercase text-slate-400">
                                    <i class="fas fa-download"></i> Placa
                                </button>
                                <a href="https://wa.me/2996894360" class="w-10 h-10 bg-emerald-400 text-white rounded-xl flex items-center justify-center">
                                    <i class="fab fa-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function downloadPlate(name, barrio, status, imgUrl) {
            // Ya no usamos html2canvas. Llamamos directamente al servidor.
            const url = `/generate_plate?name=${name}&barrio=${barrio}&status=${status}&img_url=${encodeURIComponent(imgUrl)}`;
            
            // Creamos un link temporal para disparar la descarga
            const a = document.createElement('a');
            a.href = url;
            a.download = `Placa-${name}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function filterBy(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPets();
        }

        function handleUser() {
            const user = JSON.parse(localStorage.getItem('user'));
            window.location.href = user ? '/panel' : '/login';
        }

        window.onload = init;
    </script>
</body>
</html>
