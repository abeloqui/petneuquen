<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { 
            --logo-coral: #E07A5F; 
            --logo-celeste: #81B29A; 
            --logo-amarillo: #F2CC8F; 
            --logo-rojo: #C94C4C; 
            --logo-crema: #F4F1DE; 
            --dark: #3D405B; 
        }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 140px; overflow-x: hidden; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #main-map { height: 360px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 40px rgba(61, 64, 91, 0.12); z-index: 10; }
        #map-upload { height: 180px; width: 100%; border-radius: 1.5rem; border: 3px solid #f8fafc; margin: 10px 0; box-shadow: inset 0 2px 4px rgba(0,0,0,0.06); }
        .btn-filter { padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 700; background: white; transition: 0.3s; border: 1px solid rgba(129, 178, 154, 0.1); }
        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 8px 20px rgba(224, 122, 95, 0.3); }
        .custom-input { background: white; border-radius: 1.5rem; padding: 16px 20px; border: 2px solid transparent; width: 100%; outline: none; transition: 0.3s; font-size: 14px; }
        .custom-input:focus { border-color: var(--logo-celeste); }
        .card-pet { background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 10px 25px rgba(61, 64, 91, 0.06); }
        .hidden { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Área Centro"><option value="Belgrano"><option value="Confluencia"><option value="Don Bosco"><option value="Huilliches"><option value="La Sirena"><option value="Río Grande"><option value="San Lorenzo"><option value="Santa Genoveva"><option value="Valentina Sur"><option value="Villa María">
    </datalist>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md border-2 border-white overflow-hidden">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.2em]" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>

        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-[#C94C4C] text-white text-[8px] font-black px-2 py-1 rounded-md uppercase">Admin</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white text-slate-400 flex items-center justify-center shadow-md transition-all">
                <i class="fas fa-user text-xl"></i>
            </button>
            
            <div id="user-menu" class="hidden absolute top-16 right-0 w-52 bg-white rounded-[2.2rem] shadow-2xl z-[2001] overflow-hidden border border-slate-50">
                <div class="p-5 border-b border-slate-50">
                    <p id="menu-email" class="text-[9px] font-black text-slate-400 truncate uppercase tracking-wider">Invitado</p>
                </div>
                <div id="menu-options">
                    <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-5 text-xs font-bold hover:bg-orange-50 transition-colors" style="color: var(--logo-coral);"><i class="fas fa-th-large mr-2"></i> Mis Reportes</button>
                    <button id="btn-admin-view" onclick="showSection('admin'); toggleUserMenu()" class="hidden w-full text-left p-5 text-xs font-bold hover:bg-red-50 text-red-500"><i class="fas fa-shield-alt mr-2"></i> Panel Admin</button>
                    <button onclick="logout()" class="w-full text-left p-5 text-xs font-bold border-t border-slate-50 text-slate-400 hover:text-red-500 transition-colors"><i class="fas fa-sign-out-alt mr-2"></i> Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <input type="text" id="search" list="lista-barrios" oninput="renderPets()" placeholder="Buscar por barrio o nombre..." class="custom-input shadow-sm">
            <div id="pet-list" class="grid grid-cols-2 gap-4">
                </div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <div class="flex gap-4 mb-8 bg-slate-100 p-2 rounded-[2rem]">
                    <button onclick="toggleAuthTab('login')" id="tab-login" class="flex-1 py-3 rounded-[1.5rem] font-bold text-xs bg-white shadow-sm">Ingresar</button>
                    <button onclick="toggleAuthTab('register')" id="tab-register" class="flex-1 py-3 rounded-[1.5rem] font-bold text-xs text-slate-400">Registrarse</button>
                </div>

                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Tu Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Tu Contraseña" class="custom-input" required>
                    <button type="submit" class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-xl bg-[#E07A5F]">Entrar</button>
                </form>

                <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                    <input type="email" name="email" placeholder="Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input" required>
                    <input type="tel" name="telefono" placeholder="WhatsApp (Ej: 2991234567)" class="custom-input" required>
                    <p class="text-[10px] text-slate-400 px-4 text-center font-bold">Tu cuenta será revisada por seguridad antes de permitirte publicar.</p>
                    <button type="submit" class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-xl bg-[#81B29A]">Solicitar Registro</button>
                </form>
            </div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <h2 class="font-black text-xl mb-6 text-center uppercase tracking-tighter">Nuevo Reporte</h2>
                <form onsubmit="handleUpload(event)" class="space-y-5">
                    <input type="text" name="name" placeholder="Nombre (o 'Sin nombre')" class="custom-input" required>
                    <select name="status" class="custom-input">
                        <option value="perdido">Perdido / Encontrado en calle</option>
                        <option value="adopcion">En Adopción</option>
                    </select>
                    <select name="especie" class="custom-input">
                        <option value="perro">Perro</option>
                        <option value="gato">Gato</option>
                    </select>
                    <input type="text" name="barrio" list="lista-barrios" placeholder="Barrio donde se vio" class="custom-input" required>
                    
                    <div class="space-y-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase ml-4">Toca el mapa para marcar ubicación:</p>
                        <div id="map-upload"></div>
                        <input type="hidden" name="latitud" id="lat-in">
                        <input type="hidden" name="longitud" id="lng-in">
                    </div>

                    <div class="bg-slate-50 p-4 rounded-3xl border-2 border-dashed border-slate-200 text-center">
                        <input type="file" name="file" accept="image/*" class="text-[10px] font-bold" required>
                    </div>

                    <button type="submit" class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-xl bg-[#E07A5F]">Publicar Reporte</button>
                </form>
            </div>
        </section>

        <section id="sec-user-panel" class="section-container hidden">
            <div class="bg-white p-6 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-xl mb-4 text-center">Mis Publicaciones</h2>
                <div id="my-pets-list" class="space-y-4">
                    </div>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-6 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-xl mb-6 text-center text-red-500">Panel de Control</h2>
                <div id="admin-metrics" class="grid grid-cols-2 gap-4 mb-6"></div>
                
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-2 ml-2">Usuarios Pendientes</h3>
                <div id="admin-users" class="space-y-3 mb-8"></div>
                
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-2 ml-2">Gestión de Mascotas</h3>
                <div id="admin-pets" class="space-y-3"></div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-300 hover:text-[#E07A5F] transition-colors"><i class="fas fa-map-marked-alt text-2xl"></i></button>
        
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center text-white bg-[#E07A5F] active:scale-90 transition-transform">
            <i class="fas fa-plus text-2xl"></i>
        </button>
        
        <button onclick="location.reload()" class="w-14 h-14 text-slate-300 hover:text-[#81B29A] transition-colors"><i class="fas fa-sync-alt text-2xl"></i></button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));

        // --- UTILIDADES VISUALES ---
        const toast = (title, icon = 'success') => {
            Swal.fire({ title, icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#F4F1DE', color: '#3D405B' });
        };

        const showLoading = (msg = "Procesando...") => {
            Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => Swal.showLoading(), borderRadius: '2rem', background: '#F4F1DE' });
        };

        // --- GESTIÓN DE SECCIONES ---
        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id)?.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if (id === 'home') { if (!mainMap) initMainMap(); loadPets(); }
            if (id === 'upload') { if (!uploadMap) initUploadMap(); }
        }

        function toggleAuthTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-register').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').classList.toggle('bg-white', isLogin);
            document.getElementById('tab-login').classList.toggle('text-slate-400', !isLogin);
            document.getElementById('tab-register').classList.toggle('bg-white', !isLogin);
            document.getElementById('tab-register').classList.toggle('text-slate-400', isLogin);
        }

        function toggleUserMenu() {
            document.getElementById('user-menu').classList.toggle('hidden');
            if(user) {
                document.getElementById('menu-email').innerText = user.email;
                if(user.role === 'admin') document.getElementById('btn-admin-view').classList.remove('hidden');
            }
        }

        // --- MAPAS ---
        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if (uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng, { draggable: true }).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        // --- AUTENTICACIÓN ---
        async function handleLogin(e) {
            e.preventDefault();
            showLoading("Iniciando sesión...");
            const fd = new FormData(e.target);
            const res = await fetch('/login', { method: 'POST', body: fd });
            const data = await res.json();
            Swal.close();
            if (res.ok) {
                localStorage.setItem('user', JSON.stringify(data));
                location.reload();
            } else {
                toast(data.msg, "error");
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            showLoading("Enviando solicitud...");
            const fd = new FormData(e.target);
            const res = await fetch('/register', { method: 'POST', body: fd });
            Swal.close();
            if (res.ok) {
                Swal.fire({ title: '¡Recibido!', text: 'Te avisaremos por mail cuando el admin apruebe tu cuenta.', icon: 'success' });
                showSection('home');
            } else {
                const data = await res.json();
                toast(data.msg, "error");
            }
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }

        function checkAuth() {
            if (!user) {
                showSection('auth');
                toast("Necesitás una cuenta", "info");
            } else {
                showSection('upload');
            }
        }

        // --- LÓGICA DE MASCOTAS ---
        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
            
            // Limpiar markers viejos y poner nuevos
            mainMap.eachLayer(l => { if(l instanceof L.Marker) mainMap.removeLayer(l); });
            allPets.forEach(p => {
                L.marker([p.latitud, p.longitud]).addTo(mainMap)
                 .bindPopup(`<div class="text-center"><img src="${p.image_url}" class="w-20 h-20 object-cover rounded-lg mb-1"><br><b>${p.name}</b><br>${p.barrio}</div>`);
            });
        }

        function setSpecies(s, btn) {
            currentSpecies = s;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            const filtered = allPets.filter(p => 
                (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) && 
                (currentSpecies === 'todos' || p.especie === currentSpecies)
            );
            filtered.forEach(p => {
                list.innerHTML += `
                    <div class="card-pet">
                        <img src="${p.image_url}" class="w-full h-40 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-black text-[10px] uppercase truncate">${p.name}</p>
                            <p class="text-[8px] text-slate-400 font-bold mb-2">${p.barrio}</p>
                            <a href="https://wa.me/${p.users?.telefono || ''}" target="_blank" class="block bg-[#81B29A] text-white text-[9px] py-2 rounded-xl font-black uppercase">WhatsApp</a>
                        </div>
                    </div>`;
            });
        }

        async function handleUpload(e) {
            e.preventDefault();
            if (!document.getElementById('lat-in').value) return toast("Marcá el lugar en el mapa", "warning");
            showLoading("Subiendo reporte...");
            const fd = new FormData(e.target);
            fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', { method: 'POST', body: fd });
            if (res.ok) {
                toast("¡Éxito! En revisión.");
                setTimeout(() => location.reload(), 2000);
            } else {
                Swal.close();
                toast("Error al subir", "error");
            }
        }

        // --- PANEL DE USUARIO ---
        
        // --- PANEL DE USUARIO ---
        async function checkUserPanel() {
            showSection('user-panel');
            const list = document.getElementById('my-pets-list');
            list.innerHTML = "<p class='text-center py-10 opacity-50'>Buscando tus huellitas...</p>";
            const res = await fetch(`/my-pets/${user.id}`);
            const data = await res.json();
            list.innerHTML = data.length ? "" : "<p class='text-center py-10 text-xs font-bold text-slate-400'>No tenés publicaciones todavía.</p>";
            data.forEach(p => {
                list.innerHTML += `
                    <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-[2rem] border border-slate-100">
                        <img src="${p.image_url}" class="w-12 h-12 rounded-2xl object-cover shadow-sm">
                        <div class="flex-1">
                            <p class="font-black text-[10px] uppercase">${p.name}</p>
                            <p class="text-[8px] font-bold ${p.is_approved ? 'text-emerald-500' : 'text-orange-400'} uppercase">${p.is_approved ? 'Visible' : 'Pendiente'}</p>
                        </div>
                        <button onclick="adminAction('pet', 'delete', ${p.id})" class="w-10 h-10 bg-white text-red-400 rounded-full shadow-sm flex items-center justify-center">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>`;
            });
        }

        // --- PANEL ADMIN ---
        async function loadAdminData() {
            const res = await fetch('/admin/data');
            const data = await res.json();
            
            // Métricas
            const stats = document.getElementById('admin-metrics');
            stats.innerHTML = `
                <div class="bg-orange-50 p-4 rounded-3xl border border-orange-100">
                    <p class="text-[8px] font-black uppercase text-orange-400">Usuarios</p>
                    <p class="text-xl font-black">${data.users.length}</p>
                </div>
                <div class="bg-emerald-50 p-4 rounded-3xl border border-emerald-100">
                    <p class="text-[8px] font-black uppercase text-emerald-400">Total Pets</p>
                    <p class="text-xl font-black">${data.pets.length}</p>
                </div>
            `;

            // Usuarios
            const uList = document.getElementById('admin-users');
            uList.innerHTML = data.users.length ? "" : "<p class='text-[10px] ml-2'>No hay solicitudes.</p>";
            data.users.forEach(u => {
                uList.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-2xl">
                        <p class="text-[10px] font-bold truncate flex-1 mr-2">${u.email}</p>
                        <div class="flex gap-2">
                            <button onclick="adminAction('user', 'approve', ${u.id})" class="text-emerald-500"><i class="fas fa-check-circle"></i></button>
                            <button onclick="adminAction('user', 'delete', ${u.id})" class="text-red-400"><i class="fas fa-times-circle"></i></button>
                        </div>
                    </div>`;
            });

            // Pets
            const pList = document.getElementById('admin-pets');
            pList.innerHTML = "";
            data.pets.forEach(p => {
                pList.innerHTML += `
                    <div class="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                        <img src="${p.image_url}" class="w-10 h-10 rounded-xl object-cover">
                        <p class="text-[9px] font-black uppercase flex-1">${p.name}</p>
                        <div class="flex gap-3">
                            ${!p.is_approved ? `<button onclick="adminAction('pet', 'approve', ${p.id})" class="text-emerald-500"><i class="fas fa-check"></i></button>` : ''}
                            <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function adminAction(type, action, id) {
            if (action === 'delete') {
                const res = await Swal.fire({ 
                    title: '¿Confirmar borrado?', 
                    text: "Se borrará de la base de datos y de Cloudinary.", 
                    icon: 'warning', 
                    showCancelButton: true, 
                    confirmButtonColor: '#C94C4C',
                    cancelButtonText: 'Cancelar',
                    confirmButtonText: 'Sí, borrar',
                    borderRadius: '2rem'
                });
                if (!res.isConfirmed) return;
            }
            
            showLoading();
            const method = (action === 'delete') ? 'DELETE' : 'POST';
            const url = (action === 'delete') ? `/admin/delete/${type}/${id}` : `/admin/approve/${type}/${id}`;
            const resp = await fetch(url, { method });
            Swal.close();
            if (resp.ok) {
                toast("Acción completada");
                if (document.getElementById('sec-admin').classList.contains('hidden')) checkUserPanel();
                else loadAdminData();
            }
        }

        // --- ARRANQUE ---
        window.onload = () => {
            if (user) {
                const uBtn = document.getElementById('user-anchor');
                uBtn.classList.add('bg-[#E07A5F]', 'text-white');
                if (user.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
