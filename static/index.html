<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; }
        .logo-bounce:hover { transform: scale(1.1) rotate(10deg); transition: 0.3s; }
    </style>
</head>
<body class="pb-20">
    <nav class="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 logo-bounce">
            <div class="bg-orange-500 p-2 rounded-xl text-white">
                <i class="fas fa-paw fa-lg"></i>
            </div>
            <h1 class="text-xl font-bold text-orange-600">Huellitas<span class="text-gray-400 font-light text-sm italic">NQN</span></h1>
        </div>
        <button onclick="showSection('login')" class="text-gray-400"><i class="fas fa-user-circle fa-xl"></i></button>
    </nav>

    <main id="pet-container" class="p-4 space-y-6">
        </main>

    <script>
        async function loadPets() {
            const res = await fetch('/pets');
            const pets = await res.json();
            const container = document.getElementById('pet-container');
            container.innerHTML = '';

            pets.forEach(p => {
                // Generamos el link de WhatsApp dinámico
                const msg = `Hola! Vi a ${p.name} en Huellitas Neuquén y me gustaría contactarte.`;
                const waLink = `https://wa.me/${p.telefono}?text=${encodeURIComponent(msg)}`;

                container.innerHTML += `
                    <div class="bg-white rounded-[2rem] shadow-lg overflow-hidden border border-orange-50">
                        <img src="${p.image_url}" class="w-full h-72 object-cover">
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-2xl font-bold text-gray-800">${p.name}</h3>
                                <span class="bg-orange-100 text-orange-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase italic">${p.barrio || 'Neuquén'}</span>
                            </div>
                            
                            <div class="flex gap-4 mb-6">
                                <div class="flex items-center gap-1 text-xs text-gray-500">
                                    <i class="fas fa-syringe text-orange-300"></i> ${p.vacunado ? 'Vacunado' : 'Sin datos'}
                                </div>
                                <button onclick="window.open('https://www.google.com/maps?q=${p.lat},${p.lon}')" class="flex items-center gap-1 text-xs text-blue-500">
                                    <i class="fas fa-location-dot"></i> Ver Mapa
                                </button>
                            </div>

                            <a href="${waLink}" target="_blank" class="w-full bg-[#25D366] text-white flex items-center justify-center gap-2 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                                <i class="fab fa-whatsapp fa-xl"></i> Contactar ahora
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        function showSection(id) {
            // Lógica para mostrar/ocultar secciones...
        }

        window.onload = loadPets;
    </script>
</body>
</html>
