<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #f97316; border-bottom: 3px solid #f97316; }
    </style>
</head>
<body class="pb-24">

    <nav class="p-4 bg-white/80 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center border-b border-orange-50">
        <div>
            <h1 class="text-2xl font-bold text-orange-500 tracking-tight">🐾 Huellitas</h1>
            <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-widest">Neuquén Capital</p>
        </div>
        <button onclick="showSection('login')" class="bg-gray-100 p-2 rounded-full">
            👤
        </button>
    </nav>

    <section id="sec-home" class="animate-fade-in">
        <div class="p-6 bg-gradient-to-br from-orange-400 to-orange-500 text-white rounded-b-[3rem] shadow-lg mb-6">
            <h2 class="text-3xl font-bold mb-2">¡Hola! 🐶</h2>
            <p class="text-orange-50 mb-6 text-sm">¿Cómo vas a ayudar hoy a los animales de nuestra ciudad?</p>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showSection('gallery'); loadPets('adopcion')" class="bg-white/20 backdrop-blur-md p-4 rounded-3xl text-left border border-white/30">
                    <span class="text-2xl">🏠</span>
                    <p class="font-bold mt-2 text-sm">Quiero Adoptar</p>
                </button>
                <button onclick="showSection('gallery'); loadPets('perdido')" class="bg-white/20 backdrop-blur-md p-4 rounded-3xl text-left border border-white/30">
                    <span class="text-2xl">🔍</span>
                    <p class="font-bold mt-2 text-sm">Busco mi Mascota</p>
                </button>
            </div>
        </div>

        <div class="px-6 mb-8">
            <div class="bg-white p-4 rounded-3xl shadow-sm flex justify-around border border-orange-50">
                <div class="text-center border-r w-1/2">
                    <p class="text-xl font-bold text-orange-500">12</p>
                    <p class="text-[10px] text-gray-400 uppercase">En Adopción</p>
                </div>
                <div class="text-center w-1/2">
                    <p class="text-xl font-bold text-red-500">5</p>
                    <p class="text-[10px] text-gray-400 uppercase">Perdidos Hoy</p>
                </div>
            </div>
        </div>

        <div class="px-6">
            <h3 class="font-bold text-gray-700 mb-4">Destacados de la semana</h3>
            <div id="home-featured" class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                <div class="min-w-[200px] h-64 bg-gray-200 rounded-3xl animate-pulse"></div>
            </div>
        </div>
    </section>

    <section id="sec-gallery" class="hidden p-4">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="showSection('home')" class="p-2 bg-gray-100 rounded-full">←</button>
            <h2 id="gallery-title" class="text-xl font-bold text-gray-800">Mascotas</h2>
        </div>
        <input type="text" id="search-input" placeholder="Buscar por nombre o barrio..." class="w-full p-4 bg-white border border-orange-100 rounded-2xl mb-6 shadow-sm shadow-orange-100/50 outline-none focus:ring-2 focus:ring-orange-400 transition-all">
        
        <div id="pet-list" class="grid grid-cols-1 gap-6">
            </div>
    </section>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 px-8 py-3 flex justify-between items-center z-50">
        <button onclick="showSection('home')" class="flex flex-col items-center gap-1">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold text-gray-400">Inicio</span>
        </button>
        <button onclick="showSection('publicar')" class="bg-orange-500 -mt-12 w-14 h-14 rounded-full shadow-lg shadow-orange-300 flex items-center justify-center text-white text-2xl border-4 border-white">
            +
        </button>
        <button onclick="showAdminCheck()" id="nav-admin" class="hidden flex flex-col items-center gap-1">
            <span class="text-xl">🛡️</span>
            <span class="text-[10px] font-bold text-gray-400">Admin</span>
        </button>
    </div>

    <script>
        // Lógica de navegación simple
        function showSection(id) {
            ['home', 'gallery', 'publicar', 'login', 'admin'].forEach(s => {
                const el = document.getElementById('sec-' + s);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('sec-' + id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        // Simulación de carga inicial
        window.onload = () => {
            // Chequear si es admin para mostrar el escudo
            // loadFeaturedPets();
        }
    </script>
</body>
</html>
