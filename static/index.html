<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        
        :root {
            --logo-coral: #E07A5F;
            --logo-celeste: #81B29A;
            --logo-amarillo: #F2CC8F;
            --logo-rojo: #C94C4C;
            --logo-crema: #F4F1DE;
            --dark: #3D405B;
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: var(--logo-crema); 
            color: var(--dark);
            padding-bottom: 140px;
        }

        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }

        /* Mapa y UI Principal */
        #main-map { 
            height: 360px; width: 100%; border-radius: 2.5rem; 
            border: 6px solid white; box-shadow: 0 20px 40px rgba(61, 64, 91, 0.12); z-index: 10;
        }

        .btn-filter { 
            padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 700; 
            background: white; color: var(--logo-celeste); transition: 0.3s;
            border: 1px solid rgba(129, 178, 154, 0.1); white-space: nowrap;
        }

        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 8px 20px rgba(224, 122, 95, 0.3); }

        .custom-input { 
            background: white; border-radius: 1.5rem; padding: 16px 20px; 
            width: 100%; outline: none; border: 2px solid transparent; transition: 0.3s;
        }

        .card-pet { 
            background: white; border-radius: 2.5rem; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(61, 64, 91, 0.06); position: relative;
        }

        .status-badge {
            position: absolute; top: 14px; left: 14px; padding: 6px 14px;
            border-radius: 20px; font-size: 8px; font-weight: 900;
            color: white; text-transform: uppercase; z-index: 20;
        }

        /* --- PLACA DE EXPORTACIÓN (INVISIBLE) --- */
        #canvas-export { position: fixed; left: -5000px; width: 1080px; height: 1080px; background: var(--logo-crema); }

        #placa-container {
            width: 1080px; height: 1080px; background: white;
            position: relative; box-sizing: border-box;
            border: 40px solid var(--logo-coral); overflow: hidden;
            display: block;
        }

        .section-container { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Altos del Limay"><option value="Área Centro"><option value="Belgrano">
        <option value="Canal V"><option value="Confluencia"><option value="Cuenca XV"><option value="Don Bosco">
        <option value="Hibepa"><option value="Huilliches"><option value="Islas Malvinas"><option value="La Sirena">
        <option value="Mariano Moreno"><option value="Melipal"><option value="Parque Industrial"><option value="Progreso">
        <option value="Provinciales Unidas"><option value="Rincón de Emilio"><option value="Río Grande"><option value="San Lorenzo">
        <option value="Santa Genoveva"><option value="Sapere"><option value="Terrazas del Neuquén"><option value="Unión de Mayo">
        <option value="Valentina Norte"><option value="Valentina Sur"><option value="Villa Ceferino"><option value="Villa Florencia"><option value="Villa María">
    </datalist>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md border-2 border-white overflow-hidden">
                <img src="/static/logo.png" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.2em]" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>
        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-[#C94C4C] text-white text-[8px] font-black px-2 py-1 rounded-md uppercase">Admin</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white text-slate-400 flex items-center justify-center shadow-md">
                <i class="fas fa-user text-xl"></i>
            </button>
            <div id="user-menu" class="hidden absolute top-16 right-0 w-52 bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden z-[2001]">
                <div class="p-5 border-b border-slate-50 bg-slate-50/30">
                    <p id="menu-email" class="text-[9px] font-black text-slate-400 truncate uppercase"></p>
                </div>
                <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-5 text-xs font-bold hover:bg-orange-50" style="color: var(--logo-coral);">
                    <i class="fas fa-th-large mr-2"></i> Mi Panel
                </button>
                <button onclick="logout()" class="w-full text-left p-5 text-xs font-bold border-t border-slate-50" style="color: var(--logo-rojo);">
                    <i class="fas fa-sign-out-alt mr-2"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <div id="canvas-export">
        <div id="placa-container">
            <div style="text-align: center; padding-top: 40px;">
                <img src="/static/logo.png" style="width: 320px; display: inline-block;">
            </div>
            <div style="width: 850px; height: 500px; margin: 30px auto; border-radius: 50px; overflow: hidden; border: 15px solid var(--logo-crema);">
                <img id="export-img" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div style="text-align: center;">
                <h2 id="export-name" style="font-size: 120px; font-weight: 900; color: var(--dark); margin: 0; text-transform: uppercase; line-height: 1;"></h2>
                <p id="export-status" style="font-size: 55px; font-weight: 900; color: var(--logo-rojo); margin: 15px 0; text-transform: uppercase;"></p>
                <div style="display: inline-block; background: var(--logo-celeste); padding: 25px 80px; border-radius: 60px; margin-top: 10px;">
                    <span id="export-barrio" style="font-size: 45px; font-weight: 900; color: white; text-transform: uppercase;"></span>
                </div>
            </div>
            <p style="position: absolute; bottom: 40px; width: 100%; text-align: center; font-size: 26px; font-weight: 800; color: #94a3b8;">petneuquen.onrender.com</p>
        </div>
    </div>

    <main class="p-4 max-w-2xl mx-auto">
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
                <button onclick="setSpecies('otro', this)" class="btn-filter">✨ Otros</button>
            </div>
            <div class="relative">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" id="search" list="lista-barrios" oninput="renderPets()" placeholder="Buscar barrio..." class="custom-input pl-12 shadow-sm">
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <h2 class="font-black text-2xl mb-8 uppercase text-center">Reportar Mascota</h2>
                <form onsubmit="handleUpload(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="especie" id="especie-select" onchange="checkOtroEspecie(this.value)" class="p-4 bg-slate-50 rounded-2xl font-bold text-sm">
                            <option value="perro">🐶 Perro</option>
                            <option value="gato">🐱 Gato</option>
                            <option value="otro">✨ Otro...</option>
                        </select>
                        <select name="status" class="p-4 bg-slate-50 rounded-2xl font-bold text-sm" style="color: var(--logo-coral);">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">Adopción</option>
                        </select>
                    </div>
                    <input type="text" id="especie-otro" placeholder="¿Qué animal?" class="hidden custom-input border-2 border-orange-100">
                    <input type="text" name="name" placeholder="Nombre" class="custom-input" required>
                    <input type="text" name="barrio" list="lista-barrios" onchange="autoZoomMap(this.value, 'upload')" placeholder="Barrio" class="custom-input" required>
                    <div id="map-upload" style="height: 200px;" class="rounded-[2rem] border-4 border-slate-50"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="w-full text-xs font-bold text-slate-400" required>
                    <button type="submit" class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-xl" style="background: var(--logo-coral);">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-2xl mb-8 uppercase">Panel Admin</h2>
                <div class="grid grid-cols-3 gap-3 mb-8 text-center text-[10px] font-black uppercase">
                    <div class="bg-orange-50 p-4 rounded-3xl"><p class="text-xl" id="stat-perdidos">0</p>Perdidos</div>
                    <div class="bg-emerald-50 p-4 rounded-3xl"><p class="text-xl" id="stat-adopcion">0</p>Adopción</div>
                    <div class="bg-slate-50 p-4 rounded-3xl text-slate-400"><p class="text-xl" id="stat-pendientes">0</p>Espera</div>
                </div>
                <div id="admin-users" class="space-y-3 mb-6"></div>
                <div id="admin-pets" class="space-y-3"></div>
            </div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl text-center">
                <h2 class="font-black text-2xl uppercase mb-8">Ingresar</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input" required>
                    <button class="w-full py-5 rounded-[2rem] font-black uppercase text-white" style="background: var(--dark);">Entrar</button>
                </form>
                <div class="mt-8 pt-8 border-t border-dashed border-slate-100">
                    <p class="text-[10px] font-black uppercase text-slate-400 mb-4">¿No tenés cuenta?</p>
                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <input type="email" name="email" placeholder="Email" class="custom-input" required>
                        <input type="password" name="password" placeholder="Contraseña" class="custom-input" required>
                        <input type="tel" name="telefono" placeholder="WhatsApp (299...)" class="custom-input" required>
                        <button class="w-full border-2 border-slate-200 py-5 rounded-[2rem] font-black uppercase text-slate-400">Solicitar Acceso</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="sec-profile" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-2xl uppercase mb-8">Mis Reportes</h2>
                <div id="user-pet-list" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-300"><i class="fas fa-map-marked-alt text-2xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center text-white" style="background: var(--logo-coral);">
            <i class="fas fa-plus text-2xl"></i>
        </button>
        <button onclick="location.reload()" class="w-14 h-14 text-slate-300"><i class="fas fa-sync-alt text-2xl"></i></button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [];
        let currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));

        const coordsBarrios = {
            "Alta Barda": [-38.932, -68.077], "Área Centro": [-38.951, -68.059],
            "Belgrano": [-38.961, -68.046], "Confluencia": [-38.974, -68.028],
            "Hibepa": [-38.924, -68.125], "San Lorenzo": [-38.948, -68.118],
            "Santa Genoveva": [-38.946, -68.041], "Villa María": [-38.966, -68.056],
            "La Sirena": [-38.966, -68.083]
        };

        function updateAuthUI() {
            if (user) {
                document.getElementById('user-anchor').style.backgroundColor = 'var(--logo-coral)';
                document.getElementById('user-anchor').style.color = 'white';
                if (user.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            }
        }

        async function downloadPlate(name, barrio, status, imgSrc) {
            const btn = event.currentTarget;
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const imgEl = document.getElementById('export-img');
            document.getElementById('export-name').innerText = name;
            document.getElementById('export-status').innerText = status === 'perdido' ? '¡SE BUSCA!' : 'EN ADOPCIÓN';
            document.getElementById('export-barrio').innerText = "BARRIO " + barrio;

            const loadImg = new Promise((res) => {
                imgEl.onload = () => res();
                imgEl.src = imgSrc + "?t=" + new Date().getTime(); // Anti-cache forzada
            });

            try {
                await loadImg;
                await new Promise(r => setTimeout(r, 600)); // Respiro para render móvil

                const canvas = await html2canvas(document.querySelector("#placa-container"), {
                    useCORS: true,
                    scale: 2,
                    backgroundColor: "#F4F1DE",
                    width: 1080,
                    height: 1080
                });

                const link = document.createElement('a');
                link.download = `Huellitas-${name}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } catch (e) {
                alert("Error al generar imagen");
            } finally {
                btn.innerHTML = original;
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') { if(!mainMap) initMainMap(); setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 300); }
            if(id === 'upload') { if(!uploadMap) initUploadMap(); setTimeout(() => uploadMap.invalidateSize(), 300); }
        }

        function autoZoomMap(barrio, mapa) {
            if (coordsBarrios[barrio]) {
                const target = mapa === 'main' ? mainMap : uploadMap;
                target.flyTo(coordsBarrios[barrio], 15);
                if(mapa === 'upload') {
                    if(uploadMarker) uploadMarker.setLatLng(coordsBarrios[barrio]);
                    else uploadMarker = L.marker(coordsBarrios[barrio]).addTo(uploadMap);
                    document.getElementById('lat-in').value = coordsBarrios[barrio][0];
                    document.getElementById('lng-in').value = coordsBarrios[barrio][1];
                }
            }
        }

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            const filtered = allPets.filter(p => p.barrio.toLowerCase().includes(term) && (currentSpecies === 'todos' || p.especie === currentSpecies));
            filtered.forEach(p => {
                const color = p.status === 'perdido' ? 'var(--logo-rojo)' : 'var(--logo-celeste)';
                list.innerHTML += `
                    <div class="card-pet">
                        <span class="status-badge" style="background:${color}">${p.status}</span>
                        <img src="${p.image_url}" onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)" class="w-full h-40 object-cover cursor-pointer">
                        <div class="p-4 text-center">
                            <p class="font-black text-[11px] uppercase mb-3 truncate">${p.name}</p>
                            <div class="flex gap-1">
                                <button onclick="downloadPlate('${p.name}', '${p.barrio}', '${p.status}', '${p.image_url}')" class="bg-slate-50 text-slate-400 p-3 rounded-xl flex-1 text-[8px] font-black uppercase"><i class="fas fa-download mr-1"></i> Placa</button>
                                <a href="https://wa.me/${p.users?.telefono || '2996894360'}" target="_blank" class="bg-emerald-400 text-white p-3 rounded-xl flex-1 flex items-center justify-center shadow-md"><i class="fab fa-whatsapp"></i></a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function checkUserPanel() {
            if(!user) return showSection('auth');
            if(user.role === 'admin') { showSection('admin'); loadAdminData(); }
            else { showSection('profile'); loadUserPets(); }
        }

        async function loadAdminData() {
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('stat-perdidos').innerText = data.stats.perdidos;
            document.getElementById('stat-adopcion').innerText = data.stats.adopcion;
            document.getElementById('stat-pendientes').innerText = data.stats.pendientes;
            document.getElementById('admin-users').innerHTML = data.users.map(u => `<div class="bg-slate-50 p-4 rounded-3xl flex justify-between"><span>${u.email}</span><button onclick="approve('user', ${u.id})" class="text-emerald-500 font-bold">ADMITIR</button></div>`).join('');
            document.getElementById('admin-pets').innerHTML = data.pets.filter(p => !p.is_approved).map(p => `<div class="bg-slate-50 p-3 rounded-3xl flex items-center gap-3"><img src="${p.image_url}" class="w-10 h-10 rounded-xl object-cover"><span>${p.name}</span><button onclick="approve('pet', ${p.id})" class="ml-auto text-orange-400 font-bold">OK</button></div>`).join('');
        }

        async function loadUserPets() {
            const res = await fetch(`/my-pets/${user.id}`);
            const pets = await res.json();
            document.getElementById('user-pet-list').innerHTML = pets.map(p => `<div class="bg-slate-50 p-4 rounded-3xl flex items-center gap-4"><img src="${p.image_url}" class="w-14 h-14 rounded-2xl object-cover"><div class="flex-1"><p class="font-black text-xs uppercase">${p.name}</p><p class="text-[8px] uppercase">${p.is_approved ? 'Aprobado' : 'Revisión'}</p></div><button onclick="deletePet(${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button></div>`).join('');
        }

        async function approve(t, id) { await fetch(`/admin/approve/${t}/${id}`, {method:'POST'}); loadAdminData(); }
        async function deletePet(id) { if(confirm("¿Eliminar?")) { await fetch(`/pets/user-delete/${id}`, {method:'DELETE'}); loadUserPets(); } }
        function toggleUserMenu() { if(!user) return showSection('auth'); document.getElementById('user-menu').classList.toggle('hidden'); document.getElementById('menu-email').innerText = user.email; }
        function logout() { localStorage.removeItem('user'); location.reload(); }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function checkOtroEspecie(v) { v === 'otro' ? document.getElementById('especie-otro').classList.remove('hidden') : document.getElementById('especie-otro').classList.add('hidden'); }
        async function handleLogin(e) { e.preventDefault(); const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) }); if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); } }
        async function handleRegister(e) { e.preventDefault(); const res = await fetch('/register', { method: 'POST', body: new FormData(e.target) }); if(res.ok) { alert("Solicitud enviada"); location.reload(); } }
        async function handleUpload(e) { e.preventDefault(); const fd = new FormData(e.target); fd.append('user_id', user.id); const res = await fetch('/pets/upload', { method: 'POST', body: fd }); if(res.ok) location.reload(); }
        function setSpecies(sp, btn) { currentSpecies = sp; document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderPets(); }

        window.onload = () => { updateAuthUI(); showSection('home'); };
    </script>
</body>
</html>
