<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-amarillo: #F2CC8F; --logo-rojo: #C94C4C; --logo-crema: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 140px; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #main-map { height: 360px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 40px rgba(61, 64, 91, 0.12); z-index: 10; }
        #map-upload { height: 180px; width: 100%; border-radius: 1.5rem; border: 3px solid #f8fafc; margin: 10px 0; box-shadow: inset 0 2px 4px rgba(0,0,0,0.06); }
        .btn-filter { padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 700; background: white; transition: 0.3s; border: 1px solid rgba(129, 178, 154, 0.2); }
        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 8px 20px rgba(224, 122, 95, 0.3); }
        .custom-input { background: white; border-radius: 1.5rem; padding: 16px 20px; border: 2px solid transparent; width: 100%; outline: none; transition: 0.3s; }
        .card-pet { background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 10px 25px rgba(61, 64, 91, 0.06); position: relative; }
        .hidden { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Área Centro"><option value="Belgrano"><option value="Confluencia"><option value="Don Bosco"><option value="Huilliches"><option value="La Sirena"><option value="Río Grande"><option value="San Lorenzo"><option value="Santa Genoveva"><option value="Valentina Sur"><option value="Villa María">
    </datalist>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md border-2 border-white overflow-hidden">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.2em]" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>

        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-[#C94C4C] text-white text-[8px] font-black px-2 py-1 rounded-md">ADMIN</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white text-slate-400 flex items-center justify-center shadow-md">
                <i class="fas fa-user text-xl"></i>
            </button>
            <div id="user-menu" class="hidden absolute top-16 right-0 w-52 bg-white rounded-[2.2rem] shadow-2xl z-[2001] overflow-hidden">
                <div class="p-5 border-b border-slate-50"><p id="menu-email" class="text-[9px] font-black text-slate-400 truncate uppercase"></p></div>
                <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-5 text-xs font-bold hover:bg-orange-50" style="color: var(--logo-coral);"><i class="fas fa-th-large mr-2"></i> Mi Panel</button>
                <button onclick="logout()" class="w-full text-left p-5 text-xs font-bold border-t border-slate-50" style="color: var(--logo-rojo);"><i class="fas fa-sign-out-alt mr-2"></i> Salir</button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <div class="flex gap-3"><input type="text" id="search" list="lista-barrios" oninput="renderPets()" placeholder="Buscar barrio..." class="custom-input flex-1"></div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <form onsubmit="handleUpload(event)" class="space-y-6">
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="custom-input" required>
                    <input type="text" name="barrio" list="lista-barrios" onchange="autoZoomMap(this.value, 'upload')" placeholder="Barrio" class="custom-input" required>
                    <div class="space-y-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase ml-2">Ubicación exacta:</p>
                        <div id="map-upload"></div>
                    </div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" class="text-xs" required>
                    <button type="submit" id="btn-up" class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-xl" style="background: var(--logo-coral);">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-user-panel" class="section-container hidden">
            <div class="bg-white p-6 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-xl mb-4 text-center">Mis Reportes</h2>
                <div id="my-pets-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <div id="admin-metrics"></div>
                <div id="admin-users" class="mb-6"></div>
                <div id="admin-pets"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-300"><i class="fas fa-map-marked-alt text-2xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center text-white bg-[#E07A5F]"><i class="fas fa-plus text-2xl"></i></button>
        <button onclick="location.reload()" class="w-14 h-14 text-slate-300"><i class="fas fa-sync-alt text-2xl"></i></button>
    </nav>
    <script>
    let mainMap, uploadMap, uploadMarker, allPets = [], currentSpecies = 'todos';
    let user = JSON.parse(localStorage.getItem('user'));

    const toast = (title, icon = 'success') => {
        Swal.fire({ title, icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#F4F1DE', color: '#3D405B' });
    };

    const showLoading = (msg = "Procesando...") => {
        Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => Swal.showLoading(), borderRadius: '2rem', background: '#F4F1DE' });
    };

    function showSection(id) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id)?.classList.remove('hidden');
        if (id === 'home') { if (!mainMap) initMainMap(); loadPets(); }
        if (id === 'upload') { if (!uploadMap) initUploadMap(); }
        if (id === 'admin') loadAdminData();
    }

    function initMainMap() {
        mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
    }

    function initUploadMap() {
        uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
        uploadMap.on('click', e => {
            if (uploadMarker) uploadMarker.setLatLng(e.latlng);
            else uploadMarker = L.marker(e.latlng, { draggable: true }).addTo(uploadMap);
            document.getElementById('lat-in').value = e.latlng.lat;
            document.getElementById('lng-in').value = e.latlng.lng;
        });
    }

    async function loadPets() {
        const res = await fetch('/pets');
        allPets = await res.json();
        renderPets();
    }

    function renderPets() {
        const list = document.getElementById('pet-list');
        const term = document.getElementById('search').value.toLowerCase();
        list.innerHTML = "";
        const filtered = allPets.filter(p => (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) && (currentSpecies === 'todos' || p.especie === currentSpecies));
        filtered.forEach(p => {
            const color = (p.status === 'perdido') ? '#C94C4C' : '#81B29A';
            list.innerHTML += `
                <div class="card-pet bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                    <img src="${p.image_url}" class="w-full h-40 object-cover">
                    <div class="p-4 text-center">
                        <p class="font-black text-xs uppercase">${p.name}</p>
                        <a href="https://wa.me/${p.users?.telefono || ''}" target="_blank" class="block mt-2 bg-[#81B29A] text-white text-[9px] py-3 rounded-2xl font-black uppercase">Contactar</a>
                    </div>
                </div>`;
        });
    }

    async function adminAction(type, action, id) {
        if (action === 'delete') {
            const res = await Swal.fire({ title: '¿Eliminar?', text: "Se borrará de la DB y Cloudinary", icon: 'warning', showCancelButton: true, confirmButtonColor: '#C94C4C' });
            if (!res.isConfirmed) return;
        }
        showLoading();
        const method = (action === 'delete') ? 'DELETE' : 'POST';
        const url = (action === 'delete') ? `/admin/delete/${type}/${id}` : `/admin/approve/${type}/${id}`;
        const resp = await fetch(url, { method });
        Swal.close();
        if (resp.ok) { toast("Éxito"); loadAdminData(); }
    }

    async function checkUserPanel() {
        if (!user) return showSection('auth');
        showSection('user-panel');
        const list = document.getElementById('my-pets-list');
        list.innerHTML = "<p class='text-xs text-center'>Cargando...</p>";
        const res = await fetch(`/my-pets/${user.id}`);
        const data = await res.json();
        list.innerHTML = data.map(p => `
            <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-3xl">
                <img src="${p.image_url}" class="w-12 h-12 rounded-xl object-cover">
                <div class="flex-1 font-black text-[10px] uppercase">${p.name}</div>
                <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    async function handleUpload(e) {
        e.preventDefault();
        if (!document.getElementById('lat-in').value) return toast("Marcá el mapa", "error");
        showLoading("Subiendo huellita...");
        const fd = new FormData(e.target);
        fd.append('user_id', user.id);
        const res = await fetch('/pets/upload', { method: 'POST', body: fd });
        if (res.ok) { toast("¡Subido!"); location.reload(); } else { Swal.close(); toast("Error", "error"); }
    }

    function logout() { localStorage.removeItem('user'); location.reload(); }
    function checkAuth() { user ? showSection('upload') : toast("Iniciá sesión", "info"); }
    function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); if(user) document.getElementById('menu-email').innerText = user.email; }
    window.onload = () => { if(user?.role==='admin') document.getElementById('admin-badge').classList.remove('hidden'); showSection('home'); };
</script>
</body>
</html>
