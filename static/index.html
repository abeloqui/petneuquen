<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-24">
    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b">
        <h1 class="text-2xl font-bold text-orange-500">🐾 Huellitas</h1>
        <div id="user-badge" class="hidden text-[10px] bg-orange-100 text-orange-600 px-2 py-1 rounded-lg"></div>
    </nav>

    <div class="p-4 bg-white border-b sticky top-14 z-40">
        <input type="text" id="search-bar" oninput="debounceSearch()" placeholder="Buscar por nombre..." class="w-full p-3 rounded-2xl bg-gray-100 border-none text-sm focus:ring-2 focus:ring-orange-400">
        <div class="flex gap-2 mt-3 overflow-x-auto no-scrollbar">
            <button onclick="changeTab('adopcion')" id="btn-adopcion" class="px-4 py-2 rounded-full text-xs font-bold bg-orange-500 text-white whitespace-nowrap">🏠 En Adopción</button>
            <button onclick="changeTab('perdido')" id="btn-perdido" class="px-4 py-2 rounded-full text-xs font-bold bg-gray-200 text-gray-600 whitespace-nowrap">🔍 Perdidos</button>
            <button id="tab-admin" onclick="showAdmin()" class="hidden px-4 py-2 rounded-full text-xs font-bold bg-purple-100 text-purple-600 whitespace-nowrap">🛡️ Admin</button>
        </div>
    </div>

    <main id="main-content" class="p-4 grid grid-cols-1 gap-6">
        </main>

    <button onclick="showSection('publicar')" class="fixed bottom-6 right-6 bg-orange-500 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-3xl z-50">+</button>

    <section id="sec-login" class="p-8 hidden fixed inset-0 bg-white z-[60]">
        <h2 class="text-3xl font-bold mb-8">Ingresar</h2>
        <form id="form-login" class="space-y-4">
            <input type="email" id="l-email" placeholder="Email" class="w-full p-4 border rounded-2xl">
            <input type="password" id="l-pass" placeholder="Contraseña" class="w-full p-4 border rounded-2xl">
            <button type="submit" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg">Entrar</button>
            <button type="button" onclick="showSection('gallery')" class="w-full text-gray-400 py-2">Cancelar</button>
        </form>
    </section>

    <script>
        let currentTab = 'adopcion';
        let currentUser = JSON.parse(localStorage.getItem('user'));
        let searchTimeout;

        async function loadPets(status = currentTab, query = '') {
            const url = `/pets?status=${status}&q=${query}`;
            const res = await fetch(url);
            const pets = await res.json();
            renderPets(pets, false);
        }

        function renderPets(pets, isAdminView) {
            const container = document.getElementById('main-content');
            container.innerHTML = pets.length ? '' : '<p class="text-center text-gray-400 mt-10">No encontramos resultados 🐾</p>';
            
            pets.forEach(p => {
                const badgeColor = p.status === 'adopcion' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600';
                container.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-gray-100">
                        <img src="${p.image_url}" class="w-full h-64 object-cover">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                                <span class="text-[10px] px-3 py-1 rounded-full font-bold uppercase ${badgeColor}">${p.status}</span>
                            </div>
                            <p class="text-sm text-gray-500 mb-4">${p.vacunado ? '✅ Vacunado: ' + p.vacunas_detalle : '⏳ Vacunas pendientes'}</p>
                            ${isAdminView ? `
                                <div class="flex gap-2">
                                    <button onclick="approve(${p.id})" class="flex-1 bg-green-500 text-white py-2 rounded-xl text-xs font-bold">APROBAR</button>
                                    <button onclick="deletePet(${p.id})" class="flex-1 bg-red-100 text-red-500 py-2 rounded-xl text-xs font-bold">BORRAR</button>
                                </div>
                            ` : `
                                <button class="w-full bg-orange-50 text-orange-600 py-3 rounded-2xl text-sm font-bold">Contactar</button>
                            `}
                        </div>
                    </div>
                `;
            });
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadPets(currentTab, document.getElementById('search-bar').value);
            }, 500);
        }

        async function showAdmin() {
            const res = await fetch('/pets?all_pets=true');
            const pets = await res.json();
            renderPets(pets.filter(p => !p.is_approved), true);
        }

        async function approve(id) {
            await fetch(`/pets/approve/${id}`, { method: 'POST' });
            showAdmin();
        }

        function changeTab(tab) {
            currentTab = tab;
            document.getElementById('btn-adopcion').className = tab === 'adopcion' ? 'px-4 py-2 rounded-full text-xs font-bold bg-orange-500 text-white' : 'px-4 py-2 rounded-full text-xs font-bold bg-gray-200 text-gray-600';
            document.getElementById('btn-perdido').className = tab === 'perdido' ? 'px-4 py-2 rounded-full text-xs font-bold bg-orange-500 text-white' : 'px-4 py-2 rounded-full text-xs font-bold bg-gray-200 text-gray-600';
            loadPets(tab);
        }

        window.onload = () => {
            if(currentUser?.role === 'admin') document.getElementById('tab-admin').classList.remove('hidden');
            loadPets();
        };
    </script>
</body>
</html>
