<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --primary: #f97316; --bg: #f8fafc; }
        body { font-family: 'Lexend', sans-serif; background: var(--bg); color: #1e293b; margin:0; padding-bottom: 140px; }
        .hidden { display: none !important; }
        #main-map { height: 350px; width: 100%; border-radius: 3rem; border: 8px solid white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .card-pet { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        input:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        @media (max-width: 400px) { .grid-cols-2 { grid-template-cols: 1fr; } }
    </style>
</head>
<body>

    <nav class="p-6 glass sticky top-0 z-[1000] flex justify-between items-center border-b">
        <div>
            <h1 class="font-black text-2xl tracking-tighter" onclick="location.reload()">Huellitas<span class="text-orange-500">NQN</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Neuquén Capital</p>
        </div>
        <button onclick="showSection('auth')" class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center text-2xl shadow-inner"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto overflow-x-hidden">
        
        <section id="sec-home" class="space-y-8">
            <div id="main-map"></div>
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="search" oninput="applyFilters()" placeholder="¿En qué barrio?" class="w-full p-5 pl-14 rounded-3xl bg-white shadow-sm outline-none">
                </div>
                <select id="filter-status" onchange="applyFilters()" class="p-5 rounded-3xl bg-white shadow-sm font-bold text-orange-500 outline-none cursor-pointer">
                    <option value="todos">Todo tipo</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-6"></div>
        </section>

        <section id="sec-upload" class="hidden">
            <div class="bg-white p-8 rounded-[3.5rem] shadow-2xl border border-white">
                <h2 class="font-black text-3xl text-slate-800">Nueva huellita</h2>
                <form onsubmit="handleUpload(event)" class="space-y-6">
                    <input type="text" name="name" placeholder="Nombre" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                    <select name="status" class="w-full p-5 bg-slate-50 rounded-2xl font-bold text-orange-500">
                        <option value="perdido">Perdido</option>
                        <option value="adopcion">Adopción</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                    <div id="map-upload" style="height: 200px;" class="rounded-3xl"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="w-full p-4 border-2 border-dashed rounded-2xl" required>
                    <button id="btn-up" class="w-full bg-orange-500 text-white py-6 rounded-[2rem] font-black uppercase">Publicar Ahora</button>
                </form>
            </div>
        </section>

        <section id="sec-auth" class="hidden space-y-6">
            <div id="auth-forms" class="space-y-8">
                <div class="bg-white p-10 rounded-[3.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-2xl mb-6">Ingresar</h3>
                    <form onsubmit="handleLogin(event)" class="space-y-4">
                        <input type="email" name="email" placeholder="Email" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="password" name="password" placeholder="Clave" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                        <button class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase">Entrar</button>
                    </form>
                </div>
                <div class="text-center p-6 border-2 border-dashed rounded-[3rem]">
                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <input type="email" name="email" placeholder="Email" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="password" name="password" placeholder="Crear Clave" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="text" name="telefono" placeholder="WhatsApp" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                        <button class="w-full bg-white text-slate-500 py-5 rounded-2xl font-bold border-2">REGISTRARME</button>
                    </form>
                </div>
            </div>
            <div id="user-info" class="hidden space-y-8">
                <div class="bg-white p-10 rounded-[3.5rem] text-center border">
                    <p id="u-mail" class="font-black text-xl mb-4"></p>
                    <button onclick="logout()" class="text-red-400 font-bold uppercase text-[10px]">Cerrar Sesión</button>
                </div>
                <div id="my-pets-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-8">
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-orange-500 p-5 rounded-[2rem] text-white">
                    <p class="text-[8px] font-black uppercase opacity-70">Perdidos</p>
                    <h4 id="stat-perdidos" class="text-2xl font-black">0</h4>
                </div>
                <div class="bg-teal-500 p-5 rounded-[2rem] text-white">
                    <p class="text-[8px] font-black uppercase opacity-70">Adopción</p>
                    <h4 id="stat-adopcion" class="text-2xl font-black">0</h4>
                </div>
                <div class="bg-slate-800 p-5 rounded-[2rem] text-white">
                    <p class="text-[8px] font-black uppercase opacity-70">Pendientes</p>
                    <h4 id="stat-pendientes" class="text-2xl font-black">0</h4>
                </div>
            </div>
            <div id="admin-users" class="space-y-3"></div>
            <div id="admin-pets" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass shadow-2xl rounded-full p-4 flex justify-around items-center z-[2000]">
        <button onclick="showSection('home')" class="w-12 h-12 text-slate-300"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-16 h-16 rounded-full -mt-16 flex items-center justify-center"><i class="fas fa-plus text-2xl"></i></button>
        <button id="nav-admin-btn" onclick="showAdmin()" class="hidden w-12 h-12 text-indigo-400"><i class="fas fa-shield-halved text-2xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') {
                if(!mainMap) {
                    mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
                }
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 400);
            }
            if(id === 'auth' && user) loadMyPets();
            if(id === 'upload') {
                setTimeout(() => {
                    if(!uploadMap) {
                        uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.951, -68.061], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                        uploadMap.on('click', e => {
                            if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                            else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                            document.getElementById('lat-in').value = e.latlng.lat;
                            document.getElementById('lng-in').value = e.latlng.lng;
                        });
                    }
                    uploadMap.invalidateSize();
                }, 400);
            }
        }

        async function loadPets() {
            try {
                const res = await fetch('/pets');
                allPets = await res.json();
                applyFilters();
            } catch (e) { console.error(e); }
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const list = document.getElementById('pet-list');
            list.innerHTML = "";
            if (mainMap) mainMap.eachLayer(l => { if (l instanceof L.CircleMarker) mainMap.removeLayer(l); });
            const filtered = allPets.filter(p => (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) && (status === 'todos' || p.status === status));
            filtered.forEach(p => {
                const color = p.status === 'perdido' ? '#f43f5e' : '#10b981';
                if(mainMap) L.circleMarker([p.latitud, p.longitud], {color: color, radius: 8, fillOpacity: 1, fillColor: 'white'}).addTo(mainMap);
                list.innerHTML += `<div class="bg-white rounded-[2rem] overflow-hidden border p-4">
                    <img src="${p.image_url}" class="w-full h-32 object-cover rounded-2xl mb-2">
                    <p class="font-black text-xs">${p.name}</p>
                    <p class="text-[9px] text-slate-400 uppercase">${p.barrio}</p>
                </div>`;
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            if(res.ok) { user = data; localStorage.setItem('user', JSON.stringify(user)); location.reload(); } else alert(data.msg);
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            alert(data.msg);
            if(res.ok) location.reload();
        }

        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-in').value) return alert("Marca ubicación");
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', {method:'POST', body:fd});
            if(res.ok) { alert("Subido"); location.reload(); }
        }

        async function loadMyPets() {
            const res = await fetch(`/my-pets/${user.id}`);
            const data = await res.json();
            const cont = document.getElementById('my-pets-list');
            cont.innerHTML = data.map(p => `<div class="bg-white p-4 rounded-3xl border flex justify-between items-center"><span>${p.name}</span><button onclick="deleteMyPet(${p.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`).join('');
        }

        async function showAdmin() {
            showSection('admin');
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('stat-perdidos').innerText = data.stats.perdidos;
            document.getElementById('stat-adopcion').innerText = data.stats.adopcion;
            document.getElementById('stat-pendientes').innerText = data.stats.pendientes;
            
            document.getElementById('admin-users').innerHTML = data.users.map(u => `<div class="p-4 bg-white rounded-2xl flex justify-between"><span>${u.email}</span><button onclick="approve('user', ${u.id})" class="text-blue-500 font-bold">APROBAR</button></div>`).join('');
            document.getElementById('admin-pets').innerHTML = data.pets.map(p => `<div class="p-4 bg-white rounded-2xl flex justify-between items-center"><img src="${p.image_url}" class="w-10 h-10 rounded-lg"><span>${p.name}</span><div><button onclick="approve('pet', ${p.id})" class="text-green-500 mr-2">OK</button><button onclick="adminDel(${p.id})" class="text-red-500">X</button></div></div>`).join('');
        }

        async function approve(t, id) { await fetch(`/admin/approve/${t}/${id}`, {method:'POST'}); showAdmin(); }
        async function adminDel(id) { if(confirm("¿Borrar?")) { await fetch(`/admin/delete/${id}`, {method:'DELETE'}); showAdmin(); } }
        async function deleteMyPet(id) { if(confirm("¿Borrar?")) { await fetch(`/pets/user-delete/${id}`, {method:'DELETE'}); loadMyPets(); } }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('u-mail').innerText = user.email;
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                if(user.role === 'admin') document.getElementById('nav-admin-btn').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
