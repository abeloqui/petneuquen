<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-amarillo: #F2CC8F; --logo-rojo: #C94C4C; --logo-crema: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 140px; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #main-map { height: 360px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 40px rgba(61, 64, 91, 0.12); z-index: 10; }
        .btn-filter { padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 700; background: white; color: var(--logo-celeste); transition: 0.3s; border: 1px solid rgba(129, 178, 154, 0.2); }
        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 8px 20px rgba(224, 122, 95, 0.3); border-color: var(--logo-coral); }
        .custom-input { background: white; border-radius: 1.5rem; padding: 16px 20px; border: 2px solid transparent; width: 100%; outline: none; transition: 0.3s; }
        .card-pet { background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 10px 25px rgba(61, 64, 91, 0.06); position: relative; }
        .status-badge { position: absolute; top: 14px; left: 14px; padding: 6px 14px; border-radius: 20px; font-size: 8px; font-weight: 900; color: white; text-transform: uppercase; z-index: 20; }
        .section-container { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Altos del Limay"><option value="Área Centro"><option value="Belgrano"><option value="Canal V"><option value="Confluencia"><option value="Cuenca XV"><option value="Don Bosco"><option value="Huilliches"><option value="Islas Malvinas"><option value="La Sirena"><option value="Mariano Moreno"><option value="Melipal"><option value="Parque Industrial"><option value="Progreso"><option value="Provinciales Unidas"><option value="Rincón de Emilio"><option value="Río Grande"><option value="San Lorenzo"><option value="Santa Genoveva"><option value="Sapere"><option value="Terrazas del Neuquén"><option value="Unión de Mayo"><option value="Valentina Norte"><option value="Valentina Sur"><option value="Villa Ceferino"><option value="Villa Florencia"><option value="Villa María">
    </datalist>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md overflow-hidden">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.2em]" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>
        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-[#C94C4C] text-white text-[8px] font-black px-2 py-1 rounded-md">ADMIN</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white text-slate-400 flex items-center justify-center shadow-md"><i class="fas fa-user text-xl"></i></button>
            <div id="user-menu" class="hidden absolute top-16 right-0 w-52 bg-white rounded-[2.2rem] shadow-2xl border border-slate-100 overflow-hidden z-[2001]">
                <div class="p-5 border-b border-slate-50"><p id="menu-email" class="text-[9px] font-black text-slate-400 truncate uppercase"></p></div>
                <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-5 text-xs font-bold hover:bg-orange-50" style="color: var(--logo-coral);"><i class="fas fa-th-large mr-2"></i> Mi Panel</button>
                <button onclick="logout()" class="w-full text-left p-5 text-xs font-bold border-t border-slate-50" style="color: var(--logo-rojo);"><i class="fas fa-sign-out-alt mr-2"></i> Salir</button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <div class="flex gap-3">
                <input type="text" id="search" list="lista-barrios" oninput="renderPets()" placeholder="Buscar barrio..." class="custom-input">
                <select id="filter-status" onchange="renderPets()" class="custom-input font-bold w-auto" style="color: var(--logo-coral);">
                    <option value="todos">Todos</option><option value="perdido">Perdidos</option><option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <h2 class="font-black text-2xl mb-8 uppercase text-center">Nueva Publicación</h2>
                <form onsubmit="handleUpload(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="especie" class="p-4 bg-slate-50 rounded-2xl font-bold text-sm outline-none"><option value="perro">Perro</option><option value="gato">Gato</option><option value="otro">Otro</option></select>
                        <select name="status" class="p-4 bg-slate-50 rounded-2xl font-bold text-sm outline-none" style="color: var(--logo-coral);"><option value="perdido">Perdido</option><option value="adopcion">Adopción</option></select>
                    </div>
                    <input type="text" name="name" placeholder="Nombre" class="custom-input" required>
                    <input type="text" name="barrio" list="lista-barrios" placeholder="Barrio" class="custom-input" required>
                    <div id="map-upload" style="height: 200px;" class="rounded-[2rem]"></div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="text-xs" required>
                    <button type="submit" id="btn-up" class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-xl" style="background: var(--logo-coral);">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl text-center">
                <h2 class="font-black text-3xl uppercase mb-10">Ingresar</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Clave" class="custom-input" required>
                    <button class="w-full py-5 rounded-[2rem] font-black uppercase text-white" style="background: var(--dark);">Entrar</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <h2 class="font-black text-2xl mb-8 uppercase">Panel Admin</h2>
                <div class="grid grid-cols-3 gap-3 mb-10 text-center">
                    <div class="bg-orange-50 p-4 rounded-2xl"><p id="stat-perdidos" class="text-xl font-black">0</p><p class="text-[8px] uppercase">Perdidos</p></div>
                    <div class="bg-emerald-50 p-4 rounded-2xl"><p id="stat-adopcion" class="text-xl font-black">0</p><p class="text-[8px] uppercase">Adopción</p></div>
                    <div class="bg-slate-50 p-4 rounded-2xl"><p id="stat-pendientes" class="text-xl font-black">0</p><p class="text-[8px] uppercase">Espera</p></div>
                </div>
                <div id="admin-users" class="space-y-4 mb-8"></div>
                <div id="admin-pets" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-300"><i class="fas fa-map-marked-alt text-2xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center text-white" style="background: var(--logo-coral);"><i class="fas fa-plus text-2xl"></i></button>
        <button onclick="location.reload()" class="w-14 h-14 text-slate-300"><i class="fas fa-sync-alt text-2xl"></i></button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));

        function updateAuthUI() {
            if (user) {
                document.getElementById('user-anchor').style.backgroundColor = 'var(--logo-coral)';
                document.getElementById('user-anchor').style.color = 'white';
                if (user.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') { 
                if(!mainMap) initMainMap(); 
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 400); 
            }
            if(id === 'upload') { if(!uploadMap) initUploadMap(); setTimeout(() => uploadMap.invalidateSize(), 400); }
        }

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            list.innerHTML = "";
            const filtered = allPets.filter(p => (p.barrio.toLowerCase().includes(term)) && (status === 'todos' || p.status === status) && (currentSpecies === 'todos' || p.especie === currentSpecies));
            filtered.forEach(p => {
                const color = p.status === 'perdido' ? 'var(--logo-rojo)' : 'var(--logo-celeste)';
                list.innerHTML += `<div class="card-pet"><span class="status-badge" style="background:${color}">${p.status}</span><img src="${p.image_url}" class="w-full h-40 object-cover"><div class="p-5 text-center"><p class="font-black text-sm uppercase">${p.name}</p><p class="text-[9px] font-bold text-slate-400 uppercase">${p.barrio}</p></div></div>`;
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
        }

        async function loadAdminData() {
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('stat-perdidos').innerText = data.stats.perdidos;
            document.getElementById('stat-adopcion').innerText = data.stats.adopcion;
            document.getElementById('stat-pendientes').innerText = data.stats.pendientes;
            document.getElementById('admin-pets').innerHTML = data.pets.map(p => `
                <div class="bg-white p-3 rounded-3xl flex items-center gap-4 mb-2 shadow-sm">
                    <img src="${p.image_url}" class="w-12 h-12 rounded-2xl object-cover">
                    <div class="flex-1"><span class="block text-xs font-black">${p.name}</span><span class="text-[8px] uppercase text-slate-400">${p.is_approved ? 'Visible' : 'Pendiente'}</span></div>
                    <div class="flex gap-2">
                        ${!p.is_approved ? `<button onclick="approve('pet', ${p.id})" class="bg-emerald-500 text-white text-[8px] px-3 py-2 rounded-xl font-black uppercase">Aprobar</button>` : ''}
                        <button onclick="adminDeletePet(${p.id})" class="bg-red-100 text-red-500 px-3 py-2 rounded-xl"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                </div>`).join('');
        }

        async function adminDeletePet(id) {
            if (confirm("¿Borrar reporte definitivamente?")) {
                const res = await fetch(`/admin/delete-pet/${id}`, { method: 'DELETE' });
                if (res.ok) loadAdminData();
            }
        }

        async function approve(t, id) { await fetch(`/admin/approve/${t}/${id}`, {method:'POST'}); loadAdminData(); }
        function toggleUserMenu() { if(user) { document.getElementById('user-menu').classList.toggle('hidden'); document.getElementById('menu-email').innerText = user.email; } else { showSection('auth'); } }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function checkUserPanel() { if(user.role === 'admin') { showSection('admin'); loadAdminData(); } }
        function logout() { localStorage.removeItem('user'); location.reload(); }
        function setSpecies(sp, btn) { currentSpecies = sp; document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderPets(); }
        window.onload = () => { updateAuthUI(); showSection('home'); };
    </script>
</body>
    </html>
