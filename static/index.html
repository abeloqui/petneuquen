<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-crema: #F4F1DE; --dark: #3D405B; --logo-rojo: #C94C4C; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); color: var(--dark); padding-bottom: 120px; }
        .glass { background: rgba(244, 241, 222, 0.8); backdrop-filter: blur(10px); }
        #main-map { height: 350px; width: 100%; border-radius: 2rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-filter { padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; background: white; color: var(--logo-celeste); border: 1px solid #eee; transition: 0.3s; }
        .btn-filter.active { background: var(--logo-coral); color: white; border-color: var(--logo-coral); }
        .custom-input { background: white; border-radius: 1.5rem; padding: 16px 20px; border: 2px solid transparent; width: 100%; outline: none; font-size: 13px; font-weight: 600; }
        .card-pet { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.04); position: relative; }
        .status-badge { position: absolute; top: 10px; left: 10px; padding: 4px 12px; border-radius: 15px; font-size: 7px; font-weight: 900; color: white; text-transform: uppercase; z-index: 10; }
        .paw-marker { display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <nav class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white">
        <div onclick="location.reload()" class="flex items-center gap-2 cursor-pointer">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm overflow-hidden">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <h1 class="font-black text-xl tracking-tighter">Huellitas<span style="color: var(--logo-coral)">NQN</span></h1>
        </div>
        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-red-500 text-white text-[7px] font-black px-2 py-1 rounded">ADMIN</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-10 h-10 rounded-full bg-white text-slate-300 flex items-center justify-center shadow-sm"><i class="fas fa-user"></i></button>
            <div id="user-menu" class="hidden absolute top-12 right-0 w-48 bg-white rounded-3xl shadow-xl border border-slate-50 overflow-hidden z-[2001]">
                <div class="p-4 bg-slate-50"><p id="menu-email" class="text-[8px] font-black text-slate-400 truncate uppercase"></p></div>
                <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-4 text-xs font-bold hover:bg-orange-50"><i class="fas fa-th-large mr-2"></i> Mi Panel</button>
                <button onclick="logout()" class="w-full text-left p-4 text-xs font-bold border-t border-slate-50 text-red-400"><i class="fas fa-sign-out-alt mr-2"></i> Salir</button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <section id="sec-home" class="space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <div class="flex gap-2">
                <input type="text" id="search" oninput="renderPets()" placeholder="Buscar barrio..." class="custom-input flex-1">
                <select id="filter-status" onchange="renderPets()" class="custom-input w-auto" style="color: var(--logo-coral);">
                    <option value="todos">Todos</option><option value="perdido">Perdidos</option><option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="hidden bg-white p-6 rounded-[2.5rem] shadow-sm space-y-4">
            <h2 class="font-black text-xl text-center uppercase">Reportar Mascota</h2>
            <form onsubmit="handleUpload(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <select name="especie" class="custom-input bg-slate-50"><option value="perro">Perro</option><option value="gato">Gato</option></select>
                    <select name="status" class="custom-input bg-slate-50"><option value="perdido">Perdido</option><option value="adopcion">Adopción</option></select>
                </div>
                <input type="text" name="name" placeholder="Nombre de la mascota" class="custom-input bg-slate-50" required>
                <input type="text" name="barrio" placeholder="Barrio / Zona" class="custom-input bg-slate-50" required>
                <p class="text-[10px] font-bold text-slate-400 px-2 uppercase">Toca el mapa para marcar ubicación:</p>
                <div id="map-upload" style="height: 200px;" class="rounded-2xl border-4 border-slate-50"></div>
                <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                <input type="file" name="file" accept="image/*" class="text-[10px] block w-full" required>
                <div class="space-y-3 bg-slate-50 p-4 rounded-3xl">
    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Estado de Salud y Resguardo:</p>
    
    <label class="flex items-center gap-2 text-xs font-bold">
        <input type="checkbox" name="necesita_medicacion" class="w-4 h-4 accent-red-500"> 
        💊 Necesita medicación urgente
    </label>

    <label class="flex items-center gap-2 text-xs font-bold">
        <input type="checkbox" name="esta_herido" class="w-4 h-4 accent-red-500"> 
        🩹 Está herido / lastimado
    </label>

    <select name="estado_resguardo" class="custom-input bg-white mt-2">
        <option value="calle">Sigue en la calle</option>
        <option value="transito">Lo tengo conmigo (Tránsito)</option>
        <option value="veterinaria">Está en una veterinaria</option>
    </select>
    
    <input type="text" name="referencia" placeholder="Referencia (ej: frente al kiosco)" class="custom-input bg-white mt-2">
                </div>
                
                <button type="submit" id="btn-up" class="w-full py-5 rounded-[2rem] font-black text-white uppercase shadow-lg" style="background: var(--logo-coral)">Publicar Reporte</button>
            </form>
        </section>

        <section id="sec-auth" class="hidden bg-white p-8 rounded-[3rem] shadow-xl">
            <div class="flex justify-center gap-6 mb-8">
                <button onclick="toggleAuthMode('login')" id="btn-mode-login" class="font-black text-sm uppercase pb-2 border-b-4" style="border-color: var(--logo-coral)">Ingresar</button>
                <button onclick="toggleAuthMode('register')" id="btn-mode-reg" class="font-black text-sm uppercase pb-2 border-b-4 border-transparent text-slate-300">Registrarse</button>
            </div>
            <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" name="email" placeholder="Email" class="custom-input bg-slate-50" required>
                <input type="password" name="password" placeholder="Clave" class="custom-input bg-slate-50" required>
                <button class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-lg bg-slate-800">Entrar</button>
            </form>
            <form id="form-register" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <input type="email" name="email" placeholder="Email de contacto" class="custom-input bg-slate-50" required>
                <input type="password" name="password" placeholder="Crea una clave" class="custom-input bg-slate-50" required>
                <div class="relative">
                    <span class="absolute left-5 top-4 font-bold text-slate-400">+54 9</span>
                    <input type="tel" name="telefono" placeholder="2991234567" class="custom-input bg-slate-50 pl-20" required>
                </div>
                <button class="w-full py-5 rounded-[2rem] font-black uppercase text-white shadow-lg" style="background: var(--logo-coral)">Crear Cuenta</button>
            </form>
        </section>

        <section id="sec-user-panel" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                <h2 class="font-black text-xl mb-6 uppercase">Mis Publicaciones</h2>
                <div id="user-pet-list" class="space-y-3"></div>
                <p id="no-pets-msg" class="hidden text-center text-[10px] font-bold text-slate-400 py-10 uppercase">Aún no tienes reportes.</p>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                <h2 class="font-black text-xl mb-6 uppercase">Panel Admin</h2>
                <div class="grid grid-cols-3 gap-2 mb-6 text-center">
                    <div class="bg-orange-50 p-3 rounded-2xl"><p id="stat-perdidos" class="font-black">0</p><p class="text-[6px] uppercase">Perdidos</p></div>
                    <div class="bg-emerald-50 p-3 rounded-2xl"><p id="stat-adopcion" class="font-black">0</p><p class="text-[6px] uppercase">Adopción</p></div>
                    <div class="bg-slate-50 p-3 rounded-2xl"><p id="stat-pendientes" class="font-black">0</p><p class="text-[6px] uppercase">Espera</p></div>
                </div>
                <div class="mb-8">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-3 ml-2">Nuevos Registros</h3>
                    <div id="admin-users" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-3 ml-2">Mascotas Reportadas</h3>
                    <div id="admin-pets" class="space-y-2"></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass shadow-2xl rounded-[3rem] p-2 flex justify-around items-center z-[2000] border border-white">
        <button onclick="showSection('home')" class="p-4 text-slate-300"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 rounded-full -mt-10 border-8 border-[var(--logo-crema)] text-white flex items-center justify-center shadow-lg" style="background: var(--logo-coral)"><i class="fas fa-plus"></i></button>
        <button onclick="location.reload()" class="p-4 text-slate-300"><i class="fas fa-sync-alt text-xl"></i></button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));
        let markersGroup = L.layerGroup();

        function updateAuthUI() {
            if (user) {
                const anchor = document.getElementById('user-anchor');
                anchor.style.backgroundColor = 'var(--logo-coral)';
                anchor.classList.remove('text-slate-300');
                anchor.classList.add('text-white');
                document.getElementById('menu-email').innerText = user.email;
                if (user.role === 'admin' || user.id === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            }
        }

        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById('sec-' + id);
            if(target) target.classList.remove('hidden');
            
            if(id === 'home') { 
                if(!mainMap) initMainMap(); 
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 400); 
            }
            if(id === 'upload') { 
                if(!uploadMap) initUploadMap(); 
                setTimeout(() => uploadMap.invalidateSize(), 400); 
            }
        }

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            markersGroup.addTo(mainMap);
        }

        function initUploadMap() {
            if(uploadMap) return;
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    uploadMap.setView(pos, 16);
                    if(uploadMarker) uploadMarker.setLatLng(pos); else uploadMarker = L.marker(pos).addTo(uploadMap);
                    document.getElementById('lat-in').value = pos[0];
                    document.getElementById('lng-in').value = pos[1];
                });
            }
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng); else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        async function loadPets() {
            try {
                const res = await fetch('/pets');
                allPets = await res.json();
                renderPets();
            } catch(e) { console.error(e); }
        }

                function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            list.innerHTML = ""; markersGroup.clearLayers();

            allPets.filter(p => p.barrio.toLowerCase().includes(term) && (status === 'todos' || p.status === status) && (currentSpecies === 'todos' || p.especie === currentSpecies))
            .forEach(p => {
                const color = p.status === 'perdido' ? 'var(--logo-rojo)' : '#10b981';
                const tel = p.users ? p.users.telefono : '';
                const waLink = tel ? `https://wa.me/549${tel}?text=Hola! Te contacto por ${p.name}` : '#';

                // --- NUEVA LÓGICA DE URGENCIA ---
                const esUrgente = p.necesita_medicacion || p.esta_herido;
                const badgeUrgente = esUrgente ? `<span class="status-badge" style="background:var(--logo-rojo); left: auto; right: 10px;">⚠️ URGENTE</span>` : '';
                const borderStyle = esUrgente ? 'border: 2px solid var(--logo-rojo);' : '';

                list.innerHTML += `
                    <div class="card-pet" style="${borderStyle}">
                        <span class="status-badge" style="background:${color}">${p.status}</span>
                        ${badgeUrgente}
                        <img src="${p.image_url}" class="w-full h-36 object-cover cursor-zoom-in" onclick="openImage('${p.image_url}')">
                        <div class="p-3 space-y-2">
                            <div class="text-center">
                                <p class="font-black text-[10px] uppercase">${p.name}</p>
                                <p class="text-[7px] font-bold text-slate-400 uppercase">${p.barrio}</p>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="flyToPet(${p.latitud}, ${p.longitud})" class="flex-1 py-2 bg-slate-50 rounded-lg text-[7px] font-black uppercase">Mapa</button>
                                <button onclick='copiarResumen(${JSON.stringify(p)})' class="flex-1 py-2 bg-blue-500 rounded-lg text-[7px] font-black uppercase text-white">Difundir</button>
                            </div>
                            ${tel ? `<a href="${waLink}" target="_blank" class="block w-full py-2 bg-emerald-500 rounded-lg text-[7px] font-black uppercase text-white text-center">Contactar dueño</a>` : ''}
                        </div>
                    </div>`;

                const icon = L.divIcon({
                    className: 'paw-marker',
                    html: `<div style="color: ${color}; font-size: 20px;"><i class="fas fa-paw"></i></div>`,
                    iconSize: [20, 20]
                });
                L.marker([p.latitud, p.longitud], {icon}).bindPopup(`<b>${p.name}</b>`).addTo(markersGroup);
            });
                }
        


        function flyToPet(lat, lng) { window.scrollTo({ top: 0, behavior: 'smooth' }); mainMap.flyTo([lat, lng], 16); }

        async function handleUpload(e) {
    e.preventDefault();
    
    // 1. Validaciones básicas antes de intentar subir
    const lat = document.getElementById('lat-in').value;
    const lng = document.getElementById('lng-in').value;
    
    if(!lat || !lng) {
        alert("Por favor, toca el mapa para marcar dónde está la mascota.");
        return;
    }

    if(!user) {
        alert("Tu sesión expiró. Por favor ingresa de nuevo.");
        showSection('auth');
        return;
    }

    const btn = document.getElementById('btn-up');
    const originalText = btn.innerText;
    
    // Bloquear botón
    btn.disabled = true;
    btn.innerText = "⏳ SUBIENDO FOTO...";

    const fd = new FormData(e.target);
    // Asegurar que enviamos un ID válido
    const senderId = (user.id === 'admin') ? "0" : user.id;
    fd.append('user_id', senderId);
    fd.append('user_email', user.email);

    try {
        const res = await fetch('/pets/upload', { 
            method: 'POST', 
            body: fd 
        });

        const data = await res.json();

        if(res.ok) {
            alert("✅ ¡Publicado! Ahora un administrador debe aprobarlo.");
            location.reload();
        } else {
            alert("❌ Error: " + (data.msg || "No se pudo subir"));
            btn.disabled = false;
            btn.innerText = originalText;
        }
    } catch (error) {
        console.error(error);
        alert("📡 Error de conexión. La foto puede ser muy pesada o no tienes buena señal.");
        btn.disabled = false;
        btn.innerText = originalText;
    }
        }
        

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
            else alert("Error al ingresar.");
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { alert("Registro exitoso. Espera aprobación."); location.reload(); }
        }

        async function loadUserPets() {
            const list = document.getElementById('user-pet-list');
            const res = await fetch(`/my-pets/${user.id}`); const pets = await res.json();
            document.getElementById('no-pets-msg').classList.toggle('hidden', pets.length > 0);
            list.innerHTML = pets.map(p => `
                <div class="bg-slate-50 p-4 rounded-[2rem] flex items-center gap-4">
                    <img src="${p.image_url}" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-1"><p class="font-black text-xs uppercase">${p.name}</p><p class="text-[8px] font-bold ${p.is_approved?'text-emerald-500':'text-orange-400'}">${p.is_approved?'Visible':'Pendiente'}</p></div>
                    <button onclick="deletePet(${p.id})" class="text-red-400 p-3 bg-white rounded-full"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function loadAdminData() {
            const res = await fetch('/admin/data'); const data = await res.json();
            document.getElementById('stat-perdidos').innerText = data.stats.perdidos;
            document.getElementById('stat-adopcion').innerText = data.stats.adopcion;
            document.getElementById('stat-pendientes').innerText = data.stats.pendientes;
            
            document.getElementById('admin-users').innerHTML = data.users.map(u => `
                <div class="bg-amber-50 p-3 rounded-xl flex justify-between items-center">
                    <p class="text-[10px] font-black">${u.email}</p>
                    <button onclick="approve('user', ${u.id})" class="bg-amber-500 text-white text-[8px] px-3 py-1 rounded-lg">APROBAR</button>
                </div>`).join('') || '<p class="text-[8px] text-center">Sin usuarios nuevos</p>';

            document.getElementById('admin-pets').innerHTML = data.pets.map(p => `
                <div class="bg-slate-50 p-2 rounded-xl flex items-center gap-2">
                    <img src="${p.image_url}" class="w-8 h-8 rounded object-cover">
                    <div class="flex-1 text-[8px] font-black uppercase">${p.name}</div>
                    ${!p.is_approved ? `<button onclick="approve('pet', ${p.id})" class="bg-emerald-500 text-white text-[8px] px-2 py-1 rounded">OK</button>` : ''}
                    <button onclick="deletePet(${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }


// Función para borrar mascotas (Omnipotente)
async function deletePet(id) {
    if(confirm("¿Estás seguro de ELIMINAR esta mascota para siempre?")) {
        const res = await fetch(`/admin/delete-pet/${id}`, { method: 'DELETE' });
        if(res.ok) {
            // Si estamos en el panel admin, refrescamos los datos de admin
            if(user.role === 'admin') loadAdminData();
            // Si estamos en el panel de usuario, refrescamos sus mascotas
            else loadUserPets();
            alert("Eliminado correctamente");
        } else {
            alert("Error al eliminar");
        }
    }
}


        

                async function deletePet(id) { 
            if(confirm("¿Borrar reporte?")) { 
                await fetch(`/pets/delete/${id}`, {method:'DELETE'}); 
                if(user && (user.role === 'admin' || user.id === 'admin')) {
                    loadAdminData(); 
                } else {
                    loadUserPets(); 
                }
            } 
        }

        async function approve(t, id) { 
            await fetch(`/admin/approve/${t}/${id}`, {method:'POST'}); 
            loadAdminData(); 
        }

        function toggleUserMenu() { 
            if(user) {
                document.getElementById('user-menu').classList.toggle('hidden'); 
            } else {
                showSection('auth'); 
            }
        }

        function toggleAuthMode(m) { 
            document.getElementById('form-login').classList.toggle('hidden', m === 'register');
            document.getElementById('form-register').classList.toggle('hidden', m === 'login');
            
            const btnLogin = document.getElementById('btn-mode-login');
            const btnReg = document.getElementById('btn-mode-reg');
            
            if(m === 'login') {
                btnLogin.style.borderColor = 'var(--logo-coral)';
                btnReg.style.borderColor = 'transparent';
                btnReg.classList.add('text-slate-300');
                btnLogin.classList.remove('text-slate-300');
            } else {
                btnReg.style.borderColor = 'var(--logo-coral)';
                btnLogin.style.borderColor = 'transparent';
                btnLogin.classList.add('text-slate-300');
                btnReg.classList.remove('text-slate-300');
            }
        }

        function checkAuth() { 
            user ? showSection('upload') : showSection('auth'); 
        }

        function checkUserPanel() { 
            if(user.role === 'admin' || user.id === 'admin') { 
                showSection('admin'); 
                loadAdminData(); 
            } else { 
                showSection('user-panel'); 
                loadUserPets(); 
            } 
        }

        function logout() { 
            localStorage.removeItem('user'); 
            location.reload(); 
        }

        function openImage(url) {
    const modal = document.getElementById('modal-image');
    const img = document.getElementById('img-full');
    img.src = url;
    modal.classList.remove('hidden');
    // Bloquear scroll del cuerpo al abrir
    document.body.style.overflow = 'hidden';
}

        function copiarResumen(mascota) {
    // Definimos el estado para el texto
    const estadoTxt = mascota.tipo_post === 'perdido' ? 'buscando a' : 'encontrado a';
    const resguardoTxt = mascota.estado_resguardo === 'calle' ? 'Sigue en la calle, ¡necesita ayuda!' : 'Está a resguardo';

    const texto = `🐾 *¡AYUDANOS A DIFUNDIR!* 🐾
    
Estamos ${estadoTxt} a *${mascota.nombre}*.
📍 Visto en: ${mascota.barrio} (${mascota.referencia || 'Sin referencia'})
🏥 Estado: ${mascota.necesita_medicacion ? 'Necesita medicación urgente' : 'Estable'}
🏠 Situación: ${resguardoTxt}

Mas info y fotos acá: 
https://huellitas-neuquen.render.com/mascota/${mascota.id}

#MascotasNeuquen #RescateAnimal #Huellitas`;

    // Copiar al portapapeles
    navigator.clipboard.writeText(texto);
    alert("¡Texto copiado! Ya puedes pegarlo en WhatsApp o Facebook.");
        }
        

function closeImage() {
    const modal = document.getElementById('modal-image');
    modal.classList.add('hidden');
    // Restaurar scroll
    document.body.style.overflow = 'auto';
}
        

        function setSpecies(sp, btn) { 
            currentSpecies = sp; 
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            renderPets(); 
        }

        // Única ejecución al cargar la página
        window.onload = () => { 
            updateAuthUI(); 
            showSection('home'); 
        };
