<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hidden { display: none !important; }
        #main-map, #map-upload { border-radius: 24px; z-index: 10; border: 4px solid white; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .pet-card { background: white; border-radius: 28px; overflow: hidden; transition: all 0.3s ease; border: 1px solid #f1f5f9; cursor: pointer; }
        .pet-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .img-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .pet-marker { width: 30px; height: 30px; border-radius: 50% 50% 50% 0; border: 2px solid white; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; color: white; }
        .pet-marker i { transform: rotate(45deg); font-size: 12px; }
    </style>
</head>
<body class="pb-24">

    <nav class="p-4 bg-white/80 backdrop-blur-md sticky top-0 z-[1000] border-b border-slate-100">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('home')">
                <div class="bg-orange-500 p-2 rounded-lg text-white"><i class="fas fa-paw"></i></div>
                <h1 class="font-bold text-slate-800 text-xl">Huellitas<span class="text-orange-500">NQN</span></h1>
            </div>
            <button onclick="showSection('auth')" class="text-slate-400 text-2xl"><i class="fas fa-user-circle"></i></button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pt-6">
        
        <section id="sec-home" class="space-y-6">
            <div id="main-map" class="w-full h-[350px]"></div>
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Mascotas en la zona</h2>
                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl text-[10px] font-black uppercase">
                    <button onclick="loadPets('todos')" class="px-3 py-1.5 rounded-lg hover:bg-white transition-all">Todos</button>
                    <button onclick="loadPets('perdido')" class="px-3 py-1.5 rounded-lg text-red-500 hover:bg-white">Perdidos</button>
                </div>
            </div>
            <div id="pet-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="sec-upload" class="hidden max-w-lg mx-auto py-4">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-xl font-bold text-center">Publicar Mascota</h2>
                <form id="form-upload" onsubmit="handleUpload(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" name="name" placeholder="Nombre" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-orange-300" required>
                        <select name="status" class="p-3 bg-slate-50 rounded-xl outline-none font-bold">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">Adopción</option>
                        </select>
                    </div>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-3 bg-slate-50 rounded-xl outline-none" required>
                    <p class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Toca el mapa para ubicar:</p>
                    <div id="map-upload" class="w-full h-48"></div>
                    <input type="hidden" name="latitud" id="lat-input">
                    <input type="hidden" name="longitud" id="lng-input">
                    <input type="file" name="file" class="text-xs block w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-orange-50 file:text-orange-600" required>
                    <button id="btn-submit" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-orange-100">Publicar Ahora</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-6">
            <div class="bg-indigo-600 p-6 rounded-[32px] text-white flex justify-between items-center">
                <h2 class="text-xl font-bold">Panel Admin</h2>
                <i class="fas fa-shield-alt text-2xl opacity-50"></i>
            </div>
            <div id="admin-user-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            <div id="admin-pet-management" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </section>

        <section id="sec-auth" class="hidden max-w-sm mx-auto py-10">
            <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <div id="auth-forms">
                    <h2 class="text-xl font-bold mb-6">Ingresar</h2>
                    <form id="f-login" onsubmit="handleLogin(event)" class="space-y-4 text-left">
                        <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <button class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold">Entrar</button>
                        <button type="button" onclick="toggleAuth('reg')" class="w-full text-slate-400 text-sm mt-2">No tengo cuenta, registrarme</button>
                    </form>
                    <form id="f-reg" onsubmit="handleReg(event)" class="space-y-4 text-left hidden">
                        <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="tel" name="telefono" placeholder="WhatsApp" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <button class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold">Registrarme</button>
                        <button type="button" onclick="toggleAuth('login')" class="w-full text-slate-400 text-sm mt-2">Ya tengo cuenta</button>
                    </form>
                </div>
                <div id="user-info" class="hidden space-y-4">
                    <p id="u-mail" class="font-bold text-slate-700"></p>
                    <button onclick="logout()" class="text-red-400 font-bold">Cerrar Sesión</button>
                </div>
            </div>
        </section>
    </main>

    <div id="public-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[32px] overflow-hidden shadow-2xl">
            <img id="p-modal-img" src="" class="w-full h-64 object-cover">
            <div class="p-6 space-y-4">
                <div class="flex justify-between items-start">
                    <h3 id="p-modal-name" class="text-2xl font-bold text-slate-800"></h3>
                    <button onclick="closePublicModal()" class="text-slate-300 text-xl"><i class="fas fa-times"></i></button>
                </div>
                <p id="p-modal-location" class="text-slate-400 font-bold text-sm"></p>
                <div class="flex gap-2">
                    <button id="p-modal-map-btn" class="flex-1 bg-slate-100 py-4 rounded-xl font-bold text-xs">VER EN MAPA</button>
                    <a id="p-modal-wa-btn" href="" target="_blank" class="flex-1 bg-[#25D366] text-white text-center py-4 rounded-xl font-bold text-xs">WHATSAPP</a>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] overflow-hidden shadow-2xl p-6 space-y-4">
            <div id="modal-content"></div>
            <div id="modal-actions" class="flex gap-2"></div>
            <button onclick="closeAdminModal()" class="w-full text-slate-400 font-bold text-xs uppercase pt-2">Cerrar</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] md:w-auto md:min-w-[300px] bg-white/90 backdrop-blur-lg rounded-full p-3 flex justify-around items-center z-[1000] shadow-2xl border border-white/50">
        <button onclick="showSection('home')" class="text-slate-400 px-4"><i class="fas fa-home text-lg"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center transition-transform active:scale-90"><i class="fas fa-plus"></i></button>
        <button id="nav-admin" onclick="showAdmin()" class="hidden text-indigo-500 px-4"><i class="fas fa-shield-alt text-lg"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') setTimeout(initMainMap, 100);
            if (id === 'upload') setTimeout(initUploadMap, 100);
        }

        function initMainMap() {
            if (!mainMap) {
                mainMap = L.map('main-map', {zoomControl: false}).setView([-38.9517, -68.0611], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            }
            loadPets();
        }

        function initUploadMap() {
            if (!uploadMap) {
                uploadMap = L.map('map-upload').setView([-38.9517, -68.0611], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if (uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-input').value = e.latlng.lat;
                    document.getElementById('lng-input').value = e.latlng.lng;
                });
            } else {
                uploadMap.invalidateSize(); // Fix para que el mapa se vea bien al mostrar sección
            }
        }

        async function loadPets(filter = 'todos') {
            const res = await fetch('/pets');
            const pets = await res.json();
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            
            mainMap.eachLayer(l => { if(l instanceof L.Marker) mainMap.removeLayer(l); });

            pets.forEach(p => {
                if(filter !== 'todos' && p.status !== filter) return;

                const color = p.status === 'perdido' ? '#ef4444' : '#22c55e';
                const icon = L.divIcon({
                    className: 'custom',
                    html: `<div class="pet-marker" style="background-color:${color}"><i class="fas fa-paw"></i></div>`,
                    iconSize: [30,30], iconAnchor: [15,30]
                });
                
                if(p.latitud) {
                    L.marker([p.latitud, p.longitud], {icon}).addTo(mainMap).on('click', () => openPublicModal(p));
                }

                list.innerHTML += `
                    <div class="pet-card shadow-sm" onclick='openPublicModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <div class="img-wrapper">
                            <img src="${p.image_url}">
                            <div class="absolute top-2 left-2 ${p.status==='perdido'?'bg-red-500':'bg-green-500'} text-white text-[8px] font-black px-2 py-1 rounded-full uppercase shadow-lg">
                                ${p.status}
                            </div>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-slate-800 truncate">${p.name}</h3>
                            <p class="text-[10px] text-slate-400 font-bold"><i class="fas fa-map-marker-alt text-orange-400 mr-1"></i> ${p.barrio}</p>
                        </div>
                    </div>`;
            });
        }

        function openPublicModal(p) {
            document.getElementById('p-modal-img').src = p.image_url;
            document.getElementById('p-modal-name').innerText = p.name;
            document.getElementById('p-modal-location').innerText = p.barrio + ", Neuquén";
            document.getElementById('p-modal-wa-btn').href = `https://wa.me/${p.telefono}`;
            document.getElementById('p-modal-map-btn').onclick = () => {
                closePublicModal();
                mainMap.flyTo([p.latitud, p.longitud], 16);
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            document.getElementById('public-modal').classList.remove('hidden');
        }

        function closePublicModal() { document.getElementById('public-modal').classList.add('hidden'); }

        async function showAdmin() {
            showSection('admin');
            const resU = await fetch('/admin/users/pending');
            const users = await resU.json();
            document.getElementById('admin-user-list').innerHTML = users.map(u => `
                <div class="bg-white p-3 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100 text-xs">
                    <p class="font-bold truncate">${u.email}</p>
                    <button onclick="approveUser(${u.id})" class="bg-indigo-600 text-white px-3 py-1 rounded-lg">Aprobar</button>
                </div>`).join('');

            const resP = await fetch('/pets?all_pets=true');
            const pets = await resP.json();
            document.getElementById('admin-pet-management').innerHTML = pets.map(p => `
                <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-50 flex gap-2 items-center text-xs">
                    <img src="${p.image_url}" class="w-8 h-8 rounded-lg object-cover">
                    <div class="flex-1 min-w-0"><p class="font-bold truncate">${p.name}</p></div>
                    <button onclick='openAdminPreview(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="text-slate-300"><i class="fas fa-edit"></i></button>
                </div>`).join('');
        }

        function openAdminPreview(p) {
            document.getElementById('modal-content').innerHTML = `
                <img src="${p.image_url}" class="w-full h-40 object-cover rounded-xl mb-4">
                <h3 class="text-lg font-bold">${p.name}</h3>
                <p class="text-slate-400 text-sm">${p.barrio}</p>`;
            
            let btnAction = !p.is_approved ? 
                `<button onclick="approvePet(${p.id}); closeAdminModal();" class="flex-1 bg-green-500 text-white rounded-xl font-bold py-3">APROBAR</button>` :
                `<button onclick="deletePet(${p.id}); closeAdminModal();" class="flex-1 bg-slate-800 text-white rounded-xl font-bold py-3">FINALIZAR</button>`;
            
            document.getElementById('modal-actions').innerHTML = btnAction + `<button onclick="deletePet(${p.id}); closeAdminModal();" class="bg-red-50 text-red-400 rounded-xl px-4"><i class="fas fa-trash"></i></button>`;
            document.getElementById('admin-modal').classList.remove('hidden');
        }

        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        async function approvePet(id) { await fetch('/pets/approve/'+id, {method:'POST'}); showAdmin(); }
        async function deletePet(id) { if(confirm("¿Eliminar?")) { await fetch('/admin/pets/delete/'+id, {method:'DELETE'}); showAdmin(); } }
        async function approveUser(id) { await fetch('/admin/users/approve/'+id, {method:'POST'}); showAdmin(); }
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method: 'POST', body: new FormData(e.target)});
            if (res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else alert("Error login");
        }
        async function handleReg(e) {
            e.preventDefault();
            const res = await fetch('/register', {method: 'POST', body: new FormData(e.target)});
            if (res.ok) { alert("Registrado! Esperá aprobación."); toggleAuth('login'); }
        }
        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-input').value) return alert("Marcá el mapa");
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', {method: 'POST', body: fd});
            if (res.ok) { alert("¡Enviado!"); location.reload(); }
        }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function toggleAuth(t) {
            document.getElementById('f-login').classList.toggle('hidden', t==='reg');
            document.getElementById('f-reg').classList.toggle('hidden', t==='login');
        }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('u-mail').innerText = user.email;
                if(user.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
