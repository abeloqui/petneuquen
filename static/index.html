<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f1f5f9; margin:0; padding-bottom: 120px; }
        .hidden { display: none !important; }
        #main-map { height: 320px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="p-6 bg-white/90 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b border-slate-200">
        <h1 class="font-black text-2xl tracking-tighter cursor-pointer" onclick="location.reload()">Huellitas<span class="text-orange-500">NQN</span></h1>
        <button onclick="showSection('auth')" class="text-slate-300 text-4xl"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        <section id="sec-home" class="space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-3">
                <input type="text" id="search" oninput="applyFilters()" placeholder="¿En qué barrio?" class="flex-1 p-5 rounded-3xl bg-white shadow-sm outline-none border-2 border-transparent focus:border-orange-500 transition-all">
                <select id="filter-status" onchange="applyFilters()" class="p-5 rounded-3xl bg-white shadow-sm font-bold text-orange-500 outline-none border-none">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4 mt-2"></div>
        </section>

        <section id="sec-upload" class="hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100">
                <h2 class="font-black text-2xl mb-6 text-slate-800">Nueva Publicación</h2>
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                    <select name="status" class="w-full p-5 bg-slate-50 rounded-2xl font-bold text-orange-500">
                        <option value="perdido">Perdido</option>
                        <option value="adopcion">Adopción</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio (Ej: Confluencia)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                    <div id="map-upload" style="height: 200px;" class="rounded-3xl border-4 border-slate-50"></div>
                    <input type="hidden" name="latitud" id="lat-in" value="-38.951">
                    <input type="hidden" name="longitud" id="lng-in" value="-68.061">
                    <input type="file" name="file" accept="image/*" class="text-xs font-bold text-slate-400" required>
                    <button id="btn-up" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black shadow-lg">Publicar Ahora</button>
                </form>
            </div>
        </section>

        <section id="sec-auth" class="hidden">
            <div id="auth-forms" class="bg-white p-10 rounded-[3rem] border-2 shadow-sm space-y-8">
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <h3 class="font-black text-lg">Ingresar</h3>
                    <input type="email" name="email" placeholder="Email" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold">ENTRAR</button>
                </form>
                <form onsubmit="handleRegister(event)" class="space-y-4 border-t pt-8">
                    <h3 class="text-xs font-black text-slate-300 uppercase">Registro Nuevo</h3>
                    <input type="email" name="email" placeholder="Email" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                    <input type="text" name="telefono" placeholder="WhatsApp (Ej: 299...)" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-white text-slate-600 py-5 rounded-2xl font-bold border-2">PEDIR ACCESO</button>
                </form>
            </div>
            <div id="user-info" class="hidden space-y-6">
                <div class="bg-white p-8 rounded-[3rem] border-2 text-center shadow-sm">
                    <p id="u-mail" class="font-black text-slate-800 mb-2"></p>
                    <button onclick="logout()" class="text-red-500 font-bold text-[10px] uppercase">Cerrar Sesión</button>
                </div>
                <div class="px-2">
                    <h3 class="font-black text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-paw text-orange-500"></i> Mis Publicaciones</h3>
                    <div id="my-pets-list" class="grid grid-cols-1 gap-3"></div>
                </div>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-4">
            <h2 class="font-black text-xl px-2">Panel Admin</h2>
            <div id="admin-content" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] bg-white/95 backdrop-blur-lg shadow-xl rounded-full p-4 flex justify-around items-center z-[2000]">
        <button onclick="showSection('home')" class="p-3 text-slate-300"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white p-5 rounded-full -mt-14 border-[6px] border-slate-100 shadow-xl"><i class="fas fa-plus text-xl"></i></button>
        <button id="nav-admin-btn" onclick="showAdmin()" class="hidden p-3 text-indigo-400"><i class="fas fa-shield-halved text-2xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') {
                if(!mainMap) {
                    mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
                }
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 400);
            }
            if(id === 'auth' && user) loadMyPets();
            if(id === 'upload') {
                setTimeout(() => {
                    if(!uploadMap) {
                        uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.951, -68.061], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                        uploadMap.on('click', e => {
                            if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                            else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                            document.getElementById('lat-in').value = e.latlng.lat;
                            document.getElementById('lng-in').value = e.latlng.lng;
                        });
                    }
                    uploadMap.invalidateSize();
                }, 400);
            }
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const list = document.getElementById('pet-list');
            list.innerHTML = "";
            if (mainMap) mainMap.eachLayer(l => { if (l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            const filtered = allPets.filter(p => (p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term)) && (status === 'todos' || p.status === status));
            
            filtered.forEach(p => {
                const color = p.status === 'perdido' ? '#ef4444' : '#10b981';
                if(mainMap) L.circleMarker([p.latitud, p.longitud], {color: color, radius: 8, fillOpacity: 1, fillColor: 'white'}).addTo(mainMap).bindPopup(`<b>${p.name}</b>`);
                
                list.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-white">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-black text-slate-800 text-xs mb-0.5">${p.name}</p>
                            <p class="text-[8px] text-slate-400 mb-3 uppercase">${p.barrio}</p>
                            <div class="flex gap-1.5">
                                <button onclick="focusOnPet(${p.latitud}, ${p.longitud}, '${p.name}')" class="bg-slate-100 text-slate-500 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-location-dot"></i></button>
                                <a href="https://wa.me/${p.tel_final}" target="_blank" class="flex-1 bg-orange-500 text-white py-3 rounded-xl text-[9px] font-black uppercase">Contactar</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function focusOnPet(lat, lng, name) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if(mainMap) {
                mainMap.flyTo([lat, lng], 16, { animate: true, duration: 1.5 });
                setTimeout(() => { L.popup().setLatLng([lat, lng]).setContent(`<b>${name}</b> está aquí`).openOn(mainMap); }, 1600);
            }
        }

        async function loadMyPets() {
            const container = document.getElementById('my-pets-list');
            container.innerHTML = '<p class="text-center text-slate-400 py-4 text-xs">Cargando...</p>';
            const res = await fetch(`/my-pets/${user.id}`);
            const data = await res.json();
            container.innerHTML = data.length ? "" : '<p class="text-center text-slate-400 text-xs">No tienes publicaciones.</p>';
            data.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex items-center gap-4 border shadow-sm">
                        <img src="${p.image_url}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1"><p class="text-xs font-black">${p.name}</p><p class="text-[9px] font-bold ${p.is_approved ? 'text-green-500' : 'text-orange-500'} uppercase">${p.is_approved ? 'Visible' : 'Revisión'}</p></div>
                        <button onclick="deleteMyPet(${p.id})" class="bg-red-50 text-red-500 p-3 rounded-xl"><i class="fas fa-trash-can"></i></button>
                    </div>`;
            });
        }

        async function deleteMyPet(id) { if(confirm("¿Eliminar?")) { await fetch(`/pets/user-delete/${id}`, {method:'DELETE'}); loadMyPets(); loadPets(); } }
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            if(res.ok) { user = data; localStorage.setItem('user', JSON.stringify(user)); location.reload(); } else alert(data.msg);
        }
        async function handleRegister(e) { e.preventDefault(); const res = await fetch('/register', {method:'POST', body:new FormData(e.target)}); alert((await res.json()).msg); if(res.ok) location.reload(); }
        async function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-up'); btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', {method:'POST', body:fd});
            if(res.ok) { alert("¡Publicado!"); location.reload(); } else { alert("Error"); btn.innerText = "Publicar Ahora"; btn.disabled = false; }
        }
        async function showAdmin() {
            showSection('admin');
            const res = await fetch('/admin/data');
            const data = await res.json();
            const container = document.getElementById('admin-content');
            container.innerHTML = '<p class="text-[10px] font-black text-slate-300 uppercase px-2">Usuarios</p>';
            data.users.forEach(u => container.innerHTML += `<div class="bg-white p-4 rounded-3xl flex justify-between border shadow-sm mb-2 text-xs"><span>${u.email}</span><button onclick="approve('user', ${u.id})" class="text-indigo-600 font-bold">APROBAR</button></div>`);
            container.innerHTML += '<p class="text-[10px] font-black text-slate-300 uppercase px-2 mt-4">Mascotas</p>';
            data.pets.forEach(p => container.innerHTML += `<div class="bg-white p-4 rounded-3xl flex items-center gap-3 border shadow-sm mb-2"><img src="${p.image_url}" class="w-10 h-10 rounded-lg object-cover"><span class="text-xs flex-1">${p.name}</span><button onclick="approve('pet', ${p.id})" class="text-green-500"><i class="fas fa-check"></i></button><button onclick="adminDelPet(${p.id})" class="text-red-500 ml-2"><i class="fas fa-trash"></i></button></div>`);
        }
        async function approve(t, id) { await fetch(`/admin/approve/${t}/${id}`, {method:'POST'}); showAdmin(); }
        async function adminDelPet(id) { if(confirm("¿Eliminar?")) { await fetch(`/admin/delete-any/${id}`, {method:'DELETE'}); showAdmin(); } }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if(user) { document.getElementById('u-mail').innerText = user.email; document.getElementById('auth-forms').classList.add('hidden'); document.getElementById('user-info').classList.remove('hidden'); if(user.role === 'admin') document.getElementById('nav-admin-btn').classList.remove('hidden'); } showSection('home'); };
    </script>
</body>
</html>
