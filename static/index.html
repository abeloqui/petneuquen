<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; } </style>
</head>
<body class="pb-20">
    <nav class="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-orange-500">🐾 Huellitas</h1>
        <div class="flex gap-2">
            <button onclick="showSection('login')" class="text-xs font-bold text-gray-500">Ingresar</button>
            <button onclick="showSection('registro')" class="text-xs bg-orange-500 text-white px-3 py-1 rounded-full">Registrarme</button>
        </div>
    </nav>

    <div class="flex justify-around bg-white border-b sticky top-14 z-40 text-sm">
        <button onclick="showSection('adopcion')" class="py-3 px-2">Adopción</button>
        <button onclick="showSection('perdidos')" class="py-3 px-2">Perdidos</button>
        <button onclick="showSection('publicar')" class="py-3 px-2 font-bold text-orange-600">+ Publicar</button>
    </div>

    <section id="sec-registro" class="p-6 hidden max-w-md mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-2xl font-bold mb-4">Crear cuenta</h2>
            <p class="text-sm text-gray-500 mb-6">Unite para ayudar a las mascotas de Neuquén.</p>
            <input type="email" placeholder="Email" class="w-full p-3 mb-3 border rounded-2xl">
            <input type="password" placeholder="Contraseña" class="w-full p-3 mb-6 border rounded-2xl">
            <button class="w-full bg-orange-500 text-white py-3 rounded-2xl font-bold">Registrarme</button>
        </div>
    </section>

    <section id="sec-publicar" class="p-6 hidden max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-lg">
            <h2 class="text-xl font-bold mb-4">Detalles de la mascota</h2>
            <form id="form-pet">
                <input type="text" placeholder="Nombre (o 'Desconocido')" class="w-full p-3 mb-3 border rounded-xl" required>
                
                <select class="w-full p-3 mb-3 border rounded-xl">
                    <option value="adopcion">Busca Hogar (Adopción)</option>
                    <option value="perdido">Se perdió / Lo encontré (Perdido)</option>
                </select>

                <div class="p-3 bg-gray-50 rounded-xl mb-3">
                    <p class="text-xs font-bold text-gray-400 mb-2">SALUD / VACUNACIÓN</p>
                    <label class="flex items-center gap-2 mb-2">
                        <input type="checkbox" id="chk-vacuna" onchange="toggleVacunas()"> ¿Está vacunado?
                    </label>
                    <input type="text" id="p-vacunas" placeholder="¿Cuáles? (Ej: Quinta, Rabia)" class="hidden w-full p-2 border rounded-lg text-sm">
                </div>

                <button type="button" onclick="getLocation()" class="w-full text-xs bg-blue-50 text-blue-600 p-3 rounded-xl mb-4">📍 Marcar ubicación en el mapa</button>
                <input type="file" class="w-full mb-4 text-sm">
                
                <button type="submit" class="w-full bg-green-500 text-white py-3 rounded-2xl font-bold">Enviar para revisión</button>
                <p class="text-[10px] text-center mt-3 text-gray-400 italic">Tu publicación será revisada por un administrador antes de aparecer.</p>
            </form>
        </div>
    </section>

    <script>
        function showSection(name) {
            ['adopcion', 'perdidos', 'login', 'registro', 'publicar'].forEach(s => {
                document.getElementById('sec-' + s)?.classList.add('hidden');
            });
            document.getElementById('sec-' + name).classList.remove('hidden');
        }
        function toggleVacunas() {
            const input = document.getElementById('p-vacunas');
            input.classList.toggle('hidden', !document.getElementById('chk-vacuna').checked);
        }
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => alert("Ubicación guardada: " + p.coords.latitude.toFixed(4)));
            }
        }
    </script>
</body>
</html>
