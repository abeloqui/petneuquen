<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f1f5f9; margin:0; padding-bottom: 120px; }
        .hidden { display: none !important; }
        #main-map { height: 320px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="p-6 bg-white/90 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b border-slate-200">
        <h1 class="font-black text-2xl tracking-tighter cursor-pointer" onclick="location.reload()">Huellitas<span class="text-orange-500">NQN</span></h1>
        <button onclick="showSection('auth')" class="text-slate-300 text-4xl"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        <section id="sec-home" class="space-y-6">
            <div id="main-map"></div>
            <div class="flex gap-3">
                <input type="text" id="search" oninput="applyFilters()" placeholder="¿En qué barrio?" class="flex-1 p-5 rounded-3xl bg-white shadow-sm outline-none border-2 border-transparent focus:border-orange-500 transition-all">
                <select id="filter-status" onchange="applyFilters()" class="p-5 rounded-3xl bg-white shadow-sm font-bold text-orange-500 outline-none border-none">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4 mt-2">
                <p class="col-span-2 text-center text-slate-400 animate-pulse py-10">Buscando mascotas...</p>
            </div>
        </section>

        <section id="sec-upload" class="hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100">
                <h2 class="font-black text-2xl mb-6 text-slate-800">Nueva Publicación</h2>
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                    <select name="status" class="w-full p-5 bg-slate-50 rounded-2xl font-bold text-orange-500">
                        <option value="perdido">Perdido</option>
                        <option value="adopcion">Adopción</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio (Ej: Confluencia)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none" required>
                    <p class="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">Toca el mapa para ubicar</p>
                    <div id="map-upload" style="height: 200px;" class="rounded-3xl border-4 border-slate-50"></div>
                    <input type="hidden" name="latitud" id="lat-in" value="-38.951">
                    <input type="hidden" name="longitud" id="lng-in" value="-68.061">
                    <div class="p-6 border-4 border-dashed border-slate-100 rounded-3xl text-center">
                        <input type="file" name="file" accept="image/*" class="text-xs font-bold text-slate-400" required>
                    </div>
                    <button id="btn-up" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black shadow-lg shadow-orange-200 uppercase tracking-tighter">Publicar Ahora</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-4">
            <h2 class="font-black text-xl px-2">Panel de Control</h2>
            <div id="admin-content" class="space-y-3"></div>
        </section>

        <section id="sec-auth" class="hidden">
            <div id="auth-forms" class="bg-white p-10 rounded-[3rem] border-2 shadow-sm space-y-8">
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <h3 class="font-black text-lg">Ingresar</h3>
                    <input type="email" name="email" placeholder="Tu Email" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Tu Clave" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold">ENTRAR</button>
                </form>
                <div class="border-t border-slate-100 pt-8">
                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <h3 class="text-xs font-black text-slate-300 uppercase tracking-[0.2em]">Registro Nuevo</h3>
                        <input type="email" name="email" placeholder="Email" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                        <input type="password" name="password" placeholder="Clave" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                        <input type="text" name="telefono" placeholder="WhatsApp (Ej: 2991234567)" class="w-full p-5 bg-slate-50 rounded-2xl" required>
                        <button class="w-full bg-white text-slate-600 py-5 rounded-2xl font-bold border-2">PEDIR ACCESO</button>
                    </form>
                </div>
            </div>
            <div id="user-info" class="hidden text-center p-12 bg-white rounded-[3rem] border-2">
                <p id="u-mail" class="font-black text-xl text-slate-800 mb-8"></p>
                <button onclick="logout()" class="text-red-500 font-bold uppercase tracking-widest text-xs">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] bg-white/95 backdrop-blur-lg shadow-[0_20px_50px_rgba(0,0,0,0.15)] rounded-full p-4 flex justify-around items-center border border-white z-[2000]">
        <button onclick="showSection('home')" id="nav-home" class="p-3 text-slate-300 transition-all"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white p-5 rounded-full -mt-14 border-[6px] border-slate-100 shadow-xl shadow-orange-200 active:scale-90 transition-all"><i class="fas fa-plus text-xl"></i></button>
        <button id="nav-admin-btn" onclick="showAdmin()" class="hidden p-3 text-indigo-400"><i class="fas fa-shield-halved text-2xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            
            if(id === 'home') {
                if(!mainMap) {
                    mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
                }
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 400);
            }
            if(id === 'upload') {
                setTimeout(() => {
                    if(!uploadMap) {
                        uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.951, -68.061], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                        uploadMap.on('click', e => {
                            if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                            else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                            document.getElementById('lat-in').value = e.latlng.lat;
                            document.getElementById('lng-in').value = e.latlng.lng;
                        });
                    }
                    uploadMap.invalidateSize();
                }, 400);
            }
        }

        async function loadPets() {
            try {
                const res = await fetch('/pets');
                allPets = await res.json();
                applyFilters();
            } catch (e) { console.error("Error cargando mascotas:", e); }
        }
        function focusOnPet(lat, lng) {
    // 1. Volvemos arriba para que el usuario vea el mapa
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    // 2. Movemos el mapa a las coordenadas con un zoom más cercano (16)
    if(mainMap) {
        mainMap.flyTo([lat, lng], 16, {
            animate: true,
            duration: 1.5
        });
        
        // 3. Opcional: Abrir el cartelito (popup) de esa ubicación
        // Buscamos si hay un marcador cerca para abrir su popup
        mainMap.eachLayer(l => {
            if(l instanceof L.CircleMarker && l.getLatLng().lat == lat) {
                l.openPopup();
            }
        });
    }
        }
        

function applyFilters() {
    const term = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const list = document.getElementById('pet-list');
    
    // 1. Limpiamos la lista y los marcadores del mapa antes de filtrar
    list.innerHTML = "";
    if (mainMap) {
        mainMap.eachLayer(layer => {
            if (layer instanceof L.CircleMarker) mainMap.removeLayer(layer);
        });
    }

    // 2. Filtramos el array global allPets
    const filtered = allPets.filter(p => {
        const matchSearch = p.barrio.toLowerCase().includes(term) || p.name.toLowerCase().includes(term);
        const matchStatus = status === 'todos' || p.status === status;
        return matchSearch && matchStatus;
    });

    // 3. Si no hay resultados
    if (filtered.length === 0) {
        list.innerHTML = '<p class="col-span-2 text-center text-slate-400 py-10">No se encontraron mascotas.</p>';
        return;
    }

    // 4. Dibujamos las tarjetas y los marcadores
    filtered.forEach(p => {
        const color = p.status === 'perdido' ? '#ef4444' : '#10b981';
        
        // Agregar marcador al mapa
        if(mainMap) {
            L.circleMarker([p.latitud, p.longitud], {
                color: color, 
                radius: 8, 
                fillOpacity: 1, 
                fillColor: 'white'
            }).addTo(mainMap).bindPopup(`<b>${p.name}</b>`);
        }
        
        // Usar tel_final procesado o el tuyo por defecto
        const tel = p.tel_final || "2996894360";

        // Agregar tarjeta a la grilla
        list.innerHTML += `
            <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-white">
                <img src="${p.image_url}" class="w-full h-32 object-cover" onerror="this.src='https://placehold.co/400x400?text=Mascota'">
                <div class="p-3 text-center">
                    <p class="font-black text-slate-800 text-xs mb-0.5">${p.name}</p>
                    <p class="text-[8px] text-slate-400 uppercase font-black mb-3">${p.barrio || 'Neuquén'}</p>
                    
                    <div class="flex gap-1.5">
                        <button onclick="focusOnPet(${p.latitud}, ${p.longitud}, '${p.name}')" 
                            class="bg-slate-100 text-slate-500 w-10 h-10 rounded-xl flex items-center justify-center active:scale-90 transition-transform">
                            <i class="fas fa-location-dot text-sm"></i>
                        </button>
                        
                        <a href="https://wa.me/${tel}" target="_blank" 
                            class="flex-1 bg-orange-500 text-white py-3 rounded-xl text-[9px] font-black uppercase flex items-center justify-center shadow-md shadow-orange-100 active:scale-95 transition-transform">
                            Contactar
                        </a>
                    </div>
                </div>
            </div>`;
    });
        }
        

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            if(res.ok) { user = data; localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else alert(data.msg || "Error al ingresar");
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', {method:'POST', body:new FormData(e.target)});
            const data = await res.json();
            alert(data.msg);
            if(res.ok) location.reload();
        }

        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-in').value) return alert("Marca la ubicación en el mapa");
            const btn = document.getElementById('btn-up');
            btn.innerText = "SUBIENDO..."; btn.disabled = true;
            const fd = new FormData(e.target);
            fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', {method:'POST', body:fd});
            if(res.ok) { alert("¡Publicado! Espera la aprobación."); location.reload(); }
            else { alert("Error al subir."); btn.innerText = "Publicar Ahora"; btn.disabled = false; }
        }

        async function showAdmin() {
            showSection('admin');
            const res = await fetch('/admin/data');
            const data = await res.json();
            const container = document.getElementById('admin-content');
            container.innerHTML = '<p class="text-[10px] font-black text-slate-300 uppercase px-2">Usuarios Pendientes</p>';
            data.users.forEach(u => {
                container.innerHTML += `<div class="bg-white p-5 rounded-3xl flex justify-between items-center border shadow-sm"><p class="text-xs font-bold">${u.email}</p><button onclick="approve('user', ${u.id})" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-black">APROBAR</button></div>`;
            });
            container.innerHTML += '<p class="text-[10px] font-black text-slate-300 uppercase px-2 mt-6">Gestión de Mascotas</p>';
            data.pets.forEach(p => {
                container.innerHTML += `<div class="bg-white p-4 rounded-3xl flex items-center gap-4 border shadow-sm"><img src="${p.image_url}" class="w-14 h-14 rounded-2xl object-cover"><div class="flex-1"><p class="text-xs font-black">${p.name}</p><p class="text-[9px] font-bold ${p.is_approved ? 'text-green-500' : 'text-orange-500'} uppercase">${p.is_approved ? 'Aprobada' : 'Pendiente'}</p></div><div class="flex gap-2">${!p.is_approved ? `<button onclick="approve('pet', ${p.id})" class="bg-green-500 text-white p-3 rounded-xl"><i class="fas fa-check"></i></button>` : ''}<button onclick="delPet(${p.id})" class="bg-red-50 text-red-500 p-3 rounded-xl"><i class="fas fa-trash"></i></button></div></div>`;
            });
        }

        async function approve(type, id) { await fetch(`/admin/approve/${type}/${id}`, {method:'POST'}); showAdmin(); }
        async function delPet(id) { if(confirm("¿Eliminar?")) { await fetch(`/admin/delete/pet/${id}`, {method:'DELETE'}); showAdmin(); } }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('u-mail').innerText = user.email;
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                if(user.role === 'admin') document.getElementById('nav-admin-btn').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
