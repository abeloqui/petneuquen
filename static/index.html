<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fdfcfb; }
        .hidden { display: none !important; }
        #main-map { border-radius: 2rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .pet-card { background: white; border-radius: 1.5rem; overflow: hidden; transition: 0.3s; }
        .pet-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-24">

    <nav class="p-4 bg-white/70 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b">
        <div class="flex items-center gap-2" onclick="showSection('home')">
            <div class="bg-orange-500 p-2 rounded-xl text-white"><i class="fas fa-paw"></i></div>
            <h1 class="font-bold text-xl">Huellitas<span class="text-orange-500">NQN</span></h1>
        </div>
        <button onclick="showSection('auth')" class="text-slate-300 text-3xl"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        
        <section id="sec-home" class="space-y-4">
            <div id="main-map" class="w-full h-72"></div>
            <div class="flex gap-2">
                <input type="text" id="search" oninput="applyFilters()" placeholder="Buscar barrio..." class="flex-1 p-4 rounded-2xl bg-white shadow-sm outline-none border border-slate-100">
                <select id="filter-status" onchange="applyFilters()" class="p-4 rounded-2xl bg-orange-50 text-orange-600 font-bold outline-none">
                    <option value="todos">Todos</option>
                    <option value="perdido">Perdidos</option>
                    <option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="hidden">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl space-y-4">
                <h2 class="text-center font-bold text-xl">Publicar Mascota</h2>
                <form id="form-upload" onsubmit="handleUpload(event)" class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" name="name" placeholder="Nombre" class="w-2/3 p-4 bg-slate-50 rounded-xl outline-none" required>
                        <select name="status" class="w-1/3 p-4 bg-slate-50 rounded-xl outline-none font-bold text-orange-500">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">Adopción</option>
                        </select>
                    </div>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-4 bg-slate-50 rounded-xl outline-none" required>
                    <div id="map-upload" class="w-full h-40 rounded-xl"></div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="text-xs" required>
                    <button id="btn-up" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-200">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-4">
            <div class="bg-indigo-600 p-6 rounded-[2rem] text-white">
                <h2 class="text-xl font-bold">Gestión de la Comunidad</h2>
            </div>
            <div id="admin-content" class="space-y-4"></div>
        </section>

        <section id="sec-auth" class="hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border text-center space-y-6">
                <div id="auth-forms">
                    <form id="f-login" onsubmit="handleLogin(event)" class="space-y-4">
                        <h3 class="font-bold text-2xl">Ingresar</h3>
                        <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-xl" required>
                        <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-xl" required>
                        <button class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold">Entrar</button>
                    </form>
                </div>
                <div id="user-info" class="hidden">
                    <p id="u-mail" class="font-bold text-lg mb-4"></p>
                    <button onclick="logout()" class="text-red-500 font-bold">Cerrar Sesión</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/80 backdrop-blur-xl rounded-full p-3 flex justify-around items-center shadow-2xl border border-white z-[2000]">
        <button onclick="showSection('home')" class="p-3 text-slate-400"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-14 h-14 rounded-2xl shadow-lg -mt-10 flex items-center justify-center"><i class="fas fa-plus"></i></button>
        <button id="nav-admin" onclick="showAdmin()" class="hidden p-3 text-indigo-400"><i class="fas fa-shield-alt text-xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') setTimeout(initMainMap, 200);
            if(id === 'upload') setTimeout(initUploadMap, 200);
        }

        function initMainMap() {
            if(!mainMap) {
                mainMap = L.map('main-map', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            }
            loadPets();
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            mainMap.eachLayer(l => { if(l instanceof L.Marker) mainMap.removeLayer(l); });

            allPets.filter(p => (status === 'todos' || p.status === status) && p.barrio.toLowerCase().includes(term)).forEach(p => {
                L.marker([p.latitud, p.longitud]).addTo(mainMap).bindPopup(`<b>${p.name}</b><br>${p.barrio}`);
                list.innerHTML += `<div class="pet-card shadow-sm"><img src="${p.image_url}" class="w-full h-32 object-cover"><div class="p-3"><p class="font-bold text-sm">${p.name}</p><a href="https://wa.me/${p.telefono}" class="text-[10px] text-green-600 font-bold">CONTACTAR</a></div></div>`;
            });
        }

        function initUploadMap() {
            if(!uploadMap) {
                uploadMap = L.map('map-upload', {zoomControl: false}).setView([-38.951, -68.061], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-in').value = e.latlng.lat;
                    document.getElementById('lng-in').value = e.latlng.lng;
                });
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            if(res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else alert("Error: Credenciales inválidas o cuenta no aprobada");
        }

        async function handleUpload(e) {
            e.preventDefault();
            const fd = new FormData(e.target); fd.append('user_id', user.id);
            document.getElementById('btn-up').innerText = "Subiendo...";
            await fetch('/pets/upload', {method:'POST', body:fd});
            alert("¡Enviado! Esperando aprobación del admin.");
            location.reload();
        }

        async function showAdmin() {
            showSection('admin');
            const res = await fetch('/pets?all_pets=true');
            const pets = await res.json();
            document.getElementById('admin-content').innerHTML = pets.map(p => `
                <div class="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm border border-slate-100">
                    <img src="${p.image_url}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1">
                        <p class="font-bold">${p.name} ${p.is_approved ? '✅' : '⏳'}</p>
                        <p class="text-xs text-slate-400">${p.barrio}</p>
                    </div>
                    <div class="flex flex-col gap-1">
                        ${!p.is_approved ? `<button onclick="approvePet(${p.id})" class="bg-green-500 text-white p-2 rounded-lg text-[10px] font-bold">APROBAR</button>` : ''}
                        <button onclick="deletePet(${p.id})" class="bg-red-50 text-red-500 p-2 rounded-lg text-[10px] font-bold">BORRAR</button>
                    </div>
                </div>
            `).join('');
        }

        async function approvePet(id) { await fetch(`/pets/approve/${id}`, {method:'POST'}); showAdmin(); }
        async function deletePet(id) { if(confirm("¿Eliminar?")) { await fetch(`/admin/pets/delete/${id}`, {method:'DELETE'}); showAdmin(); } }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('u-mail').innerText = user.email;
                if(user.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
    </html>
