<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas - Adopción de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; }
        .hero-gradient { background: linear-gradient(135deg, #ffeddb 0%, #ffd3b6 100%); }
    </style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center bg-white shadow-sm">
        <h1 class="text-2xl font-bold text-orange-500">🐾 Huellitas</h1>
        <a href="/docs" class="text-sm bg-orange-100 text-orange-600 px-4 py-2 rounded-full font-semibold">Panel Refugios</a>
    </nav>

    <header class="hero-gradient px-8 py-16 text-center">
        <h2 class="text-4xl font-bold text-gray-800 mb-4">Encontrá a tu nuevo mejor amigo</h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto">Conectamos refugios de Neuquén con familias responsables. Cada huella cuenta una historia.</p>
        <div class="flex justify-center gap-4">
            <button class="bg-orange-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-orange-200">Ver Mascotas</button>
        </div>
    </header>

    <section class="p-8">
        <h3 class="text-xl font-bold text-gray-800 mb-6">Mascotas en adopción</h3>
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-3xl overflow-hidden shadow-md p-4 text-center border border-dashed border-gray-200">
                <p class="text-gray-400 py-10">Cargando huellitas...</p>
            </div>
        </div>
    </section>

    <footer class="p-8 text-center text-gray-400 text-sm">
        &copy; 2026 Huellitas Neuquén - Hecho con ❤️ para los animales
    </footer>
</body>
</html>
