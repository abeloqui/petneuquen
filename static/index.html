<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfbf7; }
        .hidden { display: none; }
        .container-custom { max-width: 1200px; margin: 0 auto; }
        .pet-img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 25px; }
        .pet-img-container img { width: 100%; height: 100%; object-fit: cover; }
        #main-map { border-radius: 30px; border: 8px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .mini-map { height: 120px; border-radius: 15px; margin-top: 10px; z-index: 1; }
        .pet-marker { width: 35px; height: 35px; border-radius: 50% 50% 50% 0; border: 3px solid white; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; color: white; }
        .pet-marker i { transform: rotate(45deg); }
    </style>
</head>
<body class="pb-24">
    <nav class="p-4 bg-white/90 sticky top-0 z-[1000] shadow-sm">
        <div class="container-custom flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('home')">
                <div class="bg-orange-500 p-2 rounded-xl text-white"><i class="fas fa-paw"></i></div>
                <h1 class="font-bold text-orange-600 text-2xl tracking-tighter">HuellitasNQN</h1>
            </div>
            <button id="auth-btn" onclick="showSection('auth')" class="text-gray-400 text-3xl"><i class="fas fa-user-circle"></i></button>
        </div>
    </nav>

    <main class="container-custom px-4">
        <section id="sec-home" class="py-6 space-y-6">
            <div id="main-map" class="w-full h-[350px]"></div>
            <h2 class="text-2xl font-bold text-gray-800">Mascotas Activas</h2>
            <div id="pet-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

        <section id="sec-upload" class="py-6 hidden max-w-2xl mx-auto">
            <div class="bg-white p-8 rounded-[40px] shadow-xl space-y-6">
                <h2 class="text-2xl font-bold text-center">Publicar Mascota</h2>
                <form id="form-upload" onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre" class="w-full p-4 bg-gray-50 rounded-2xl" required>
                    <select name="status" class="w-full p-4 bg-gray-50 rounded-2xl">
                        <option value="perdido">🚨 Perdido</option>
                        <option value="adopcion">🎁 Adopción</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-4 bg-gray-50 rounded-2xl" required>
                    <p class="text-xs font-bold text-orange-500">Marcá en el mapa dónde se vio:</p>
                    <div id="map-upload" class="w-full h-56 rounded-3xl"></div>
                    <input type="hidden" name="latitud" id="lat-input">
                    <input type="hidden" name="longitud" id="lng-input">
                    <input type="file" name="file" class="w-full text-sm" required>
                    <button id="btn-submit" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-bold">Publicar Ahora</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="py-6 hidden space-y-8">
            <div class="bg-purple-600 p-8 rounded-[40px] text-white">
                <h2 class="text-3xl font-bold">Panel de Moderación</h2>
            </div>
            <div class="space-y-4">
                <h3 class="font-bold text-xl text-purple-600">Usuarios Pendientes</h3>
                <div id="admin-user-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div class="space-y-4">
                <h3 class="font-bold text-xl text-orange-600">Mascotas por Revisar</h3>
                <div id="admin-pet-management" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="sec-auth" class="py-10 hidden max-w-md mx-auto">
            <div class="bg-white p-8 rounded-[40px] shadow-2xl">
                <div id="auth-forms">
                    <div class="flex gap-4 mb-8">
                        <button onclick="toggleAuth('login')" id="t-login" class="flex-1 pb-2 border-b-4 border-orange-500 font-bold">Entrar</button>
                        <button onclick="toggleAuth('reg')" id="t-reg" class="flex-1 pb-2 text-gray-400 font-bold">Registrarse</button>
                    </div>
                    <form id="f-login" onsubmit="handleLogin(event)" class="space-y-4">
                        <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl" required>
                        <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 bg-gray-50 rounded-2xl" required>
                        <button class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg">Ingresar</button>
                    </form>
                    <form id="f-reg" onsubmit="handleReg(event)" class="space-y-4 hidden">
                        <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl" required>
                        <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 bg-gray-50 rounded-2xl" required>
                        <input type="tel" name="telefono" pattern="[0-9]{8,15}" placeholder="WhatsApp (Ej: 2991234567)" class="w-full p-4 bg-gray-50 rounded-2xl" required>
                        <button class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg">Crear Cuenta</button>
                    </form>
                </div>
                <div id="user-info" class="hidden text-center space-y-4">
                    <p id="u-mail" class="font-bold text-gray-700 text-xl"></p>
                    <button onclick="logout()" class="text-red-500 font-bold">Cerrar Sesión</button>
                </div>
            </div>
        </section>
    </main>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 z-[2000] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[40px] overflow-hidden shadow-2xl">
            <div id="modal-content"></div>
            <div class="p-6 flex gap-3">
                <button onclick="closeAdminModal()" class="flex-1 py-4 bg-gray-100 rounded-2xl font-bold text-gray-500">Cerrar</button>
                <div id="modal-actions" class="flex-1 flex gap-2"></div>
            </div>
        </div>
    </div>

    <nav class="md:hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-lg border-t p-4 flex justify-around items-center z-[1000]">
        <button onclick="showSection('home')" class="text-orange-500 text-2xl"><i class="fas fa-home"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white w-16 h-16 rounded-full -mt-12 shadow-xl border-8 border-[#fdfbf7] flex items-center justify-center"><i class="fas fa-plus text-xl"></i></button>
        <button id="nav-admin" onclick="showAdmin()" class="hidden text-purple-500 text-2xl"><i class="fas fa-shield-cat"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, uploadMap, uploadMarker;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') setTimeout(initMainMap, 300);
            if (id === 'upload') setTimeout(initUploadMap, 300);
        }

        function initMainMap() {
            if (!mainMap) {
                mainMap = L.map('main-map', {zoomControl: false}).setView([-38.9517, -68.0611], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            }
            loadPets();
        }

        function initUploadMap() {
            if (!uploadMap) {
                uploadMap = L.map('map-upload').setView([-38.9517, -68.0611], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
                uploadMap.on('click', e => {
                    if (uploadMarker) uploadMarker.setLatLng(e.latlng);
                    else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                    document.getElementById('lat-input').value = e.latlng.lat;
                    document.getElementById('lng-input').value = e.latlng.lng;
                });
            }
        }

        async function loadPets() {
            const res = await fetch('/pets');
            const pets = await res.json();
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            mainMap.eachLayer(l => { if(l instanceof L.Marker) mainMap.removeLayer(l); });

            pets.forEach((p, idx) => {
                if(p.latitud) {
                    const color = p.status === 'perdido' ? '#ef4444' : '#22c55e';
                    const icon = L.divIcon({
                        className: 'custom',
                        html: `<div class="pet-marker" style="background-color:${color}"><i class="fas fa-paw"></i></div>`,
                        iconSize: [35,35], iconAnchor: [17,35]
                    });
                    L.marker([p.latitud, p.longitud], {icon}).addTo(mainMap);
                }

                const miniId = `mini-map-${idx}`;
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-[40px] shadow-sm border border-gray-50">
                        <div class="pet-img-container shadow-lg">
                            <img src="${p.image_url}">
                        </div>
                        <div class="py-4">
                            <h3 class="font-bold text-xl">${p.name}</h3>
                            <p class="text-sm text-gray-400 font-bold"><i class="fas fa-map-marker-alt text-orange-400"></i> ${p.barrio}</p>
                            <div id="${miniId}" class="mini-map"></div>
                            <a href="https://wa.me/${p.telefono}" class="block w-full bg-[#25D366] text-white text-center py-3 rounded-2xl font-bold mt-4 shadow-lg shadow-green-50">WhatsApp</a>
                        </div>
                    </div>`;

                setTimeout(() => {
                    if(p.latitud) {
                        const mini = L.map(miniId, {zoomControl: false, attributionControl: false}).setView([p.latitud, p.longitud], 15);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mini);
                        L.circle([p.latitud, p.longitud], {radius: 100, color: '#f97316'}).addTo(mini);
                    }
                }, 100);
            });
        }

        async function showAdmin() {
            showSection('admin');
            const resU = await fetch('/admin/users/pending');
            const users = await resU.json();
            document.getElementById('admin-user-list').innerHTML = users.map(u => `
                <div class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-purple-50">
                    <div><p class="font-bold text-sm">${u.email}</p><p class="text-xs text-purple-400">${u.telefono}</p></div>
                    <button onclick="approveUser(${u.id})" class="bg-purple-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-lg shadow-purple-100">ADMITIR</button>
                </div>`).join('');

            const resP = await fetch('/pets?all_pets=true');
            const pets = await resP.json();
            document.getElementById('admin-pet-management').innerHTML = pets.map(p => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex gap-4 items-center">
                    <img src="${p.image_url}" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-1"><p class="font-bold text-sm truncate">${p.name}</p><p class="text-[10px] font-bold ${p.is_approved?'text-green-500':'text-orange-500'}">${p.is_approved?'Visible':'Pendiente'}</p></div>
                    <button onclick='openPreview(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="bg-gray-100 p-3 rounded-2xl text-gray-400"><i class="fas fa-eye"></i></button>
                </div>`).join('');
        }

        function openPreview(p) {
            const modal = document.getElementById('admin-modal');
            document.getElementById('modal-content').innerHTML = `
                <img src="${p.image_url}" class="w-full h-72 object-cover">
                <div class="p-6 space-y-3">
                    <h3 class="text-2xl font-bold text-gray-800">${p.name}</h3>
                    <p class="text-sm text-gray-500 italic"><i class="fas fa-map-marker-alt text-orange-400"></i> ${p.barrio}</p>
                    <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100">
                        <p class="text-orange-700 font-bold text-xs"><i class="fab fa-whatsapp"></i> CONTACTO: ${p.telefono}</p>
                    </div>
                </div>`;
            document.getElementById('modal-actions').innerHTML = !p.is_approved ? 
                `<button onclick="approvePet(${p.id}); closeAdminModal();" class="w-full bg-green-500 text-white rounded-3xl font-bold py-4">APROBAR</button>` :
                `<button onclick="deletePet(${p.id}); closeAdminModal();" class="w-full bg-red-500 text-white rounded-3xl font-bold py-4">ELIMINAR</button>`;
            modal.classList.remove('hidden');
        }

        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        async function approvePet(id) { await fetch('/pets/approve/'+id, {method:'POST'}); showAdmin(); }
        async function deletePet(id) { if(confirm("¿Eliminar?")) { await fetch('/admin/pets/delete/'+id, {method:'DELETE'}); showAdmin(); } }
        async function approveUser(id) { await fetch('/admin/users/approve/'+id, {method:'POST'}); showAdmin(); }
        async function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = 'Subiendo...'; btn.disabled = true;
            const res = await fetch('/pets/upload', {method: 'POST', body: new FormData(e.target)});
            if (res.ok) { alert("¡Enviado! Esperá la aprobación."); showSection('home'); }
            btn.innerText = "Publicar Ahora"; btn.disabled = false;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method: 'POST', body: new FormData(e.target)});
            if (res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
            else { alert("Credenciales incorrectas o cuenta no aprobada."); }
        }

        async function handleReg(e) {
            e.preventDefault();
            const res = await fetch('/register', {method: 'POST', body: new FormData(e.target)});
            if (res.ok) { alert("¡Registro enviado! El admin debe aprobarte."); toggleAuth('login'); }
            else { alert("Error en el registro."); }
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function toggleAuth(t) {
            document.getElementById('f-login').classList.toggle('hidden', t==='reg');
            document.getElementById('f-reg').classList.toggle('hidden', t==='login');
            document.getElementById('t-login').className = t==='login' ? 'flex-1 pb-2 border-b-4 border-orange-500 font-bold' : 'flex-1 pb-2 text-gray-400 font-bold';
            document.getElementById('t-reg').className = t==='reg' ? 'flex-1 pb-2 border-b-4 border-orange-500 font-bold' : 'flex-1 pb-2 text-gray-400 font-bold';
        }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('u-mail').innerText = user.email;
                if(user.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
