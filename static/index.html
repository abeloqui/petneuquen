<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --logo-coral: #E07A5F; --logo-celeste: #81B29A; --logo-crema: #F4F1DE; --logo-rojo: #C94C4C; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--logo-crema); padding-bottom: 120px; }
        #main-map { height: 350px; width: 100%; border-radius: 2rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .glass { background: rgba(244, 241, 222, 0.8); backdrop-filter: blur(10px); }
        .btn-filter { padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; background: white; color: var(--logo-celeste); border: 1px solid #eee; transition: 0.3s; }
        .btn-filter.active { background: var(--logo-coral); color: white; border-color: var(--logo-coral); }
        .card-pet { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.04); position: relative; }
        .status-badge { position: absolute; top: 10px; left: 10px; padding: 4px 12px; border-radius: 15px; font-size: 7px; font-weight: 900; color: white; text-transform: uppercase; z-index: 10; }
        .paw-marker { display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <nav class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white">
        <div onclick="location.reload()" class="flex items-center gap-2 cursor-pointer">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm"><i class="fas fa-paw text-coral" style="color: var(--logo-coral)"></i></div>
            <h1 class="font-black text-xl tracking-tighter">Huellitas<span style="color: var(--logo-coral)">NQN</span></h1>
        </div>
        <div class="flex items-center gap-2 relative">
            <span id="admin-badge" class="hidden bg-red-500 text-white text-[7px] font-black px-2 py-1 rounded">ADMIN</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-10 h-10 rounded-full bg-white text-slate-300 flex items-center justify-center shadow-sm"><i class="fas fa-user"></i></button>
            <div id="user-menu" class="hidden absolute top-12 right-0 w-48 bg-white rounded-3xl shadow-xl border border-slate-50 overflow-hidden z-[2001]">
                <div class="p-4 bg-slate-50"><p id="menu-email" class="text-[8px] font-black text-slate-400 truncate uppercase"></p></div>
                <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-4 text-xs font-bold hover:bg-orange-50"><i class="fas fa-th-large mr-2"></i> Mi Panel</button>
                <button onclick="logout()" class="w-full text-left p-4 text-xs font-bold border-t border-slate-50 text-red-400"><i class="fas fa-sign-out-alt mr-2"></i> Salir</button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <section id="sec-home">
            <div id="main-map" class="mb-6"></div>
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <div class="flex gap-2 mb-6">
                <input type="text" id="search" oninput="renderPets()" placeholder="Buscar barrio..." class="flex-1 p-4 rounded-2xl bg-white outline-none text-xs font-bold">
                <select id="filter-status" onchange="renderPets()" class="p-4 rounded-2xl bg-white outline-none text-xs font-bold text-coral">
                    <option value="todos">Todos</option><option value="perdido">Perdidos</option><option value="adopcion">Adopción</option>
                </select>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-upload" class="hidden bg-white p-6 rounded-[2.5rem] shadow-sm space-y-4">
            <h2 class="font-black text-xl text-center uppercase">Reportar Mascota</h2>
            <form onsubmit="handleUpload(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <select name="especie" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold"><option value="perro">Perro</option><option value="gato">Gato</option></select>
                    <select name="status" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold"><option value="perdido">Perdido</option><option value="adopcion">Adopción</option></select>
                </div>
                <input type="text" name="name" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold" required>
                <input type="text" name="barrio" placeholder="Barrio" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold" required>
                <div id="map-upload" style="height: 180px;" class="rounded-2xl border-4 border-slate-50"></div>
                <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                <input type="file" name="file" accept="image/*" class="text-[10px]" required>
                <button type="submit" id="btn-up" class="w-full py-4 bg-coral rounded-2xl font-black text-white uppercase shadow-lg" style="background: var(--logo-coral)">Publicar</button>
            </form>
        </section>

        <section id="sec-auth" class="hidden bg-white p-8 rounded-[2.5rem] text-center">
            <h2 class="font-black text-2xl mb-6">INGRESAR</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold" required>
                <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold" required>
                <button class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black uppercase">Entrar</button>
            </form>
        </section>

        <section id="sec-admin" class="hidden bg-white p-6 rounded-[2.5rem]">
            <h2 class="font-black text-xl mb-6 uppercase">Panel Admin</h2>
            <div class="grid grid-cols-3 gap-2 mb-6 text-center">
                <div class="bg-orange-50 p-3 rounded-2xl"><p id="stat-perdidos" class="font-black">0</p><p class="text-[6px] uppercase">Perdidos</p></div>
                <div class="bg-emerald-50 p-3 rounded-2xl"><p id="stat-adopcion" class="font-black">0</p><p class="text-[6px] uppercase">Adopción</p></div>
                <div class="bg-slate-50 p-3 rounded-2xl"><p id="stat-pendientes" class="font-black">0</p><p class="text-[6px] uppercase">Espera</p></div>
            </div>
            <div id="admin-pets" class="space-y-2"></div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass shadow-2xl rounded-[3rem] p-2 flex justify-around items-center z-[2000] border border-white">
        <button onclick="showSection('home')" class="p-4 text-slate-300"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 rounded-full -mt-10 border-8 border-[var(--logo-crema)] bg-coral text-white flex items-center justify-center shadow-lg" style="background: var(--logo-coral)"><i class="fas fa-plus"></i></button>
        <button onclick="location.reload()" class="p-4 text-slate-300"><i class="fas fa-sync-alt text-xl"></i></button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], currentSpecies = 'todos';
        let user = JSON.parse(localStorage.getItem('user'));
        let markersGroup = L.layerGroup();

        function updateAuthUI() {
            if (user) {
                document.getElementById('user-anchor').classList.replace('text-slate-300', 'text-white');
                document.getElementById('user-anchor').style.backgroundColor = 'var(--logo-coral)';
                if (user.role === 'admin' || user.id === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            }
        }

        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') { if(!mainMap) initMainMap(); setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 400); }
            if(id === 'upload') { if(!uploadMap) initUploadMap(); setTimeout(() => uploadMap.invalidateSize(), 400); }
        }

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            markersGroup.addTo(mainMap);
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        function flyToPet(lat, lng) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            mainMap.flyTo([lat, lng], 16, { duration: 1.5 });
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            list.innerHTML = ""; markersGroup.clearLayers();

            allPets.filter(p => (p.barrio.toLowerCase().includes(term)) && (status === 'todos' || p.status === status) && (currentSpecies === 'todos' || p.especie === currentSpecies))
            .forEach(p => {
                const color = p.status === 'perdido' ? 'var(--logo-rojo)' : '#10b981';
                const tel = p.users ? p.users.telefono : '';
                const waLink = tel ? `https://wa.me/549${tel}?text=Hola! Te contacto por ${p.name} que vi en Huellitas NQN` : '#';

                list.innerHTML += `
                    <div class="card-pet">
                        <span class="status-badge" style="background:${color}">${p.status}</span>
                        <img src="${p.image_url}" class="w-full h-32 object-cover" onclick="flyToPet(${p.latitud}, ${p.longitud})">
                        <div class="p-3 space-y-2">
                            <div class="text-center"><p class="font-black text-[10px] uppercase">${p.name}</p><p class="text-[7px] font-bold text-slate-400 uppercase">${p.barrio}</p></div>
                            <div class="flex gap-1">
                                <button onclick="flyToPet(${p.latitud}, ${p.longitud})" class="flex-1 py-2 bg-slate-50 rounded-lg text-[7px] font-black uppercase text-slate-400"><i class="fas fa-location-arrow mr-1"></i> Mapa</button>
                                ${tel ? `<a href="${waLink}" target="_blank" class="flex-1 py-2 bg-emerald-500 rounded-lg text-[7px] font-black uppercase text-white text-center"><i class="fab fa-whatsapp mr-1"></i> WA</a>` : ''}
                            </div>
                        </div>
                    </div>`;

                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="paw-marker" style="color: ${color}; font-size: 20px;"><i class="fas fa-paw"></i></div>`,
                    iconSize: [20, 20], iconAnchor: [10, 10]
                });
                L.marker([p.latitud, p.longitud], {icon: icon}).addTo(markersGroup);
            });
        }

        async function handleUpload(e) {
            e.preventDefault();
            if(!document.getElementById('lat-in').value) return alert("Marca la ubicación");
            const btn = document.getElementById('btn-up'); btn.disabled = true; btn.innerText = "SUBIENDO...";
            const fd = new FormData(e.target); fd.append('user_id', user.id); fd.append('user_email', user.email);
            const res = await fetch('/pets/upload', { method: 'POST', body: fd });
            if(res.ok) { alert("¡Publicado! En espera de aprobación."); location.reload(); }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
            else alert("Error o cuenta pendiente.");
        }

        async function loadAdminData() {
            const res = await fetch('/admin/data'); const data = await res.json();
            document.getElementById('stat-perdidos').innerText = data.stats.perdidos;
            document.getElementById('stat-adopcion').innerText = data.stats.adopcion;
            document.getElementById('stat-pendientes').innerText = data.stats.pendientes;
            document.getElementById('admin-pets').innerHTML = data.pets.map(p => `
                <div class="bg-slate-50 p-2 rounded-2xl flex items-center gap-3">
                    <img src="${p.image_url}" class="w-8 h-8 rounded-lg object-cover">
                    <div class="flex-1"><p class="text-[8px] font-black uppercase">${p.name}</p><p class="text-[6px] uppercase ${p.is_approved ? 'text-emerald-500':'text-orange-400'}">${p.is_approved ? 'Aprobado':'Espera'}</p></div>
                    <div class="flex gap-1">
                        ${!p.is_approved ? `<button onclick="approve('pet', ${p.id})" class="bg-emerald-500 text-white text-[7px] px-2 py-1 rounded-lg">OK</button>` : ''}
                        <button onclick="adminDeletePet(${p.id})" class="bg-red-100 text-red-500 px-2 py-1 rounded-lg"><i class="fas fa-trash text-[8px]"></i></button>
                    </div>
                </div>`).join('');
        }

        async function adminDeletePet(id) { if(confirm("¿Borrar?")) { await fetch(`/admin/delete-pet/${id}`, {method:'DELETE'}); loadAdminData(); } }
        async function approve(t, id) { await fetch(`/admin/approve/${t}/${id}`, {method:'POST'}); loadAdminData(); }
        function toggleUserMenu() { if(user) document.getElementById('user-menu').classList.toggle('hidden'); else showSection('auth'); }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function checkUserPanel() { if(user && (user.role === 'admin' || user.id === 'admin')) { showSection('admin'); loadAdminData(); } }
        function logout() { localStorage.removeItem('user'); location.reload(); }
        function setSpecies(sp, btn) { currentSpecies = sp; document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderPets(); }
        window.onload = () => { updateAuthUI(); showSection('home'); };
    </script>
</body>
    </html>
