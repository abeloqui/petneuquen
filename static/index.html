<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root {
            --logo-coral: #E07A5F;
            --logo-celeste: #81B29A;
            --logo-rojo: #C94C4C;
            --logo-crema: #F4F1DE;
            --dark: #3D405B;
        }
        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: var(--logo-crema); 
            color: var(--dark);
            padding-bottom: 140px;
        }
        .glass { background: rgba(244, 241, 222, 0.95); backdrop-filter: blur(15px); }
        #main-map { height: 380px; width: 100%; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 20px 40px rgba(61, 64, 91, 0.15); }
        .btn-filter { padding: 12px 24px; border-radius: 9999px; font-weight: 700; transition: all 0.3s; white-space: nowrap; }
        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 4px 15px rgba(224, 122, 95, 0.4); }
        .custom-input, .custom-textarea { 
            background: white; border-radius: 1.75rem; padding: 16px 20px; border: 2px solid transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.03); width: 100%; 
        }
        .custom-textarea { resize: vertical; min-height: 120px; }
        .card-pet, .admin-card { background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 10px 30px rgba(61,64,91,0.08); }
        .status-badge { position: absolute; top: 16px; left: 16px; padding: 6px 16px; border-radius: 9999px; font-size: 10px; font-weight: 900; color: white; z-index: 10; }
        .toast { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <nav class="p-5 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/30">
        <div onclick="location.reload()" class="cursor-pointer flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md overflow-hidden border-2 border-white">
                <img src="/static/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194279.png'" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter" style="color: var(--dark);">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.2em]" style="color: var(--logo-celeste);">Neuquén Capital</p>
            </div>
        </div>
        <div class="flex items-center gap-3 relative">
            <span id="admin-badge" class="hidden bg-[#C94C4C] text-white text-xs font-black px-3 py-1 rounded-2xl">ADMIN</span>
            <button onclick="toggleUserMenu()" id="user-anchor" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-md text-slate-400 active:scale-95">
                <i class="fas fa-user text-2xl"></i>
            </button>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">

        <!-- HOME -->
        <section id="sec-home" class="section-container space-y-6">
            <div id="main-map"></div>
            <div class="space-y-4">
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                    <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                    <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
                    <button onclick="setSpecies('otro', this)" class="btn-filter">✨ Otros</button>
                </div>
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" id="search" list="lista-barrios" onchange="autoZoomMap(this.value, 'main')" oninput="renderPets()" 
                               placeholder="Buscar barrio o nombre..." class="custom-input pl-12">
                    </div>
                    <select id="filter-status" onchange="renderPets()" class="custom-input font-bold w-auto px-6" style="color: var(--logo-coral);">
                        <option value="todos">Todos</option>
                        <option value="perdido">Perdidos</option>
                        <option value="adopcion">Adopción</option>
                    </select>
                </div>
            </div>
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <!-- UPLOAD -->
        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <h2 class="font-black text-3xl mb-8 text-center tracking-tighter">Nueva Publicación 🐾</h2>
                <form id="upload-form" onsubmit="handleUpload(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="especie" class="custom-input font-bold">
                            <option value="perro">🐶 Perro</option>
                            <option value="gato">🐱 Gato</option>
                            <option value="otro">✨ Otro</option>
                        </select>
                        <select name="status" class="custom-input font-bold" style="color: var(--logo-coral);">
                            <option value="perdido">Perdido</option>
                            <option value="adopcion">En Adopción</option>
                        </select>
                    </div>
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="custom-input" required>
                    <input type="text" name="raza" placeholder="Raza o características" class="custom-input">
                    <input type="text" name="edad" placeholder="Edad aproximada" class="custom-input">
                    <input type="text" name="color" placeholder="Color principal" class="custom-input">
                    <input type="text" name="barrio" list="lista-barrios" onchange="autoZoomMap(this.value, 'upload')" placeholder="Barrio" class="custom-input" required>

                    <div class="space-y-3">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest text-center">Ubicación exacta</p>
                        <div id="map-upload" class="h-64 rounded-3xl border-4 border-slate-100"></div>
                        <input type="hidden" name="latitud" id="lat-in">
                        <input type="hidden" name="longitud" id="lng-in">
                    </div>

                    <textarea name="descripcion" placeholder="Descripción detallada..." class="custom-textarea"></textarea>

                    <div class="flex items-center gap-3">
                        <input type="checkbox" name="microchip" id="microchip" class="w-5 h-5">
                        <label for="microchip" class="text-sm font-medium">Tiene microchip</label>
                    </div>

                    <input type="date" name="fecha" class="custom-input">

                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase mb-3">Fotos (máx 3)</p>
                        <input type="file" id="file-input" accept="image/*" multiple class="hidden">
                        <div onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-slate-300 rounded-3xl p-12 text-center cursor-pointer hover:border-[var(--logo-coral)]">
                            <i class="fas fa-cloud-upload-alt text-5xl text-slate-300 mb-4"></i>
                            <p class="font-semibold text-slate-500">Seleccionar fotos</p>
                        </div>
                        <div id="preview-container" class="grid grid-cols-3 gap-3 mt-6"></div>
                    </div>

                    <button type="submit" id="btn-upload" class="w-full py-6 rounded-[2.5rem] font-black text-lg text-white shadow-xl" 
                            style="background: linear-gradient(to right, var(--logo-coral), #e06b4a);">Publicar Reporte</button>
                </form>
            </div>
        </section>

        <!-- AUTH -->
        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <h2 class="font-black text-3xl tracking-tighter text-center mb-10">Ingresar</h2>
                <form onsubmit="handleLogin(event)" class="space-y-5">
                    <input type="email" name="email" placeholder="Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input" required>
                    <button class="w-full py-5 rounded-[2rem] font-black text-white shadow-xl" style="background: var(--dark);">Entrar</button>
                </form>
                <div class="mt-12 pt-8 border-t border-dashed border-slate-200">
                    <p class="text-xs font-black text-slate-400 mb-6 uppercase text-center">¿Nuevo vecino?</p>
                    <form onsubmit="handleRegister(event)" class="space-y-5">
                        <input type="email" name="email" placeholder="Email" class="custom-input" required>
                        <input type="password" name="password" placeholder="Contraseña" class="custom-input" required>
                        <input type="tel" name="telefono" placeholder="WhatsApp" class="custom-input" required>
                        <button class="w-full py-5 border-2 border-slate-300 text-slate-500 font-black rounded-[2rem]">Solicitar Acceso</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- PROFILE -->
        <section id="sec-profile" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <h2 class="font-black text-3xl tracking-tighter mb-8">Mis Reportes 🐾</h2>
                <div id="user-pet-list" class="space-y-6"></div>
            </div>
        </section>

        <!-- ADMIN -->
        <section id="sec-admin" class="section-container hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl">
                <h2 class="font-black text-3xl tracking-tighter mb-8">Panel de Administración</h2>
                <div class="grid grid-cols-3 gap-4 mb-10">
                    <div class="admin-card p-6 text-center"><p class="text-4xl font-black text-red-500" id="stat-perdidos">0</p><p class="text-xs uppercase tracking-widest">Perdidos</p></div>
                    <div class="admin-card p-6 text-center"><p class="text-4xl font-black text-emerald-500" id="stat-adopcion">0</p><p class="text-xs uppercase tracking-widest">Adopción</p></div>
                    <div class="admin-card p-6 text-center"><p class="text-4xl font-black text-amber-500" id="stat-pendientes">0</p><p class="text-xs uppercase tracking-widest">Pendientes</p></div>
                </div>
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-users"></i> Usuarios Pendientes</h3>
                <div id="admin-users" class="space-y-4 mb-12"></div>
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-paw"></i> Publicaciones Pendientes</h3>
                <div id="admin-pets" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[3rem] p-3 flex justify-around items-center z-[2000] border-2 border-white">
        <button onclick="showSection('home')" class="w-14 h-14 text-slate-400"><i class="fas fa-map-marked-alt text-3xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 rounded-full -mt-14 border-[8px] border-[var(--logo-crema)] shadow-2xl flex items-center justify-center text-white" style="background: var(--logo-coral);">
            <i class="fas fa-plus text-3xl"></i>
        </button>
        <button onclick="location.reload()" class="w-14 h-14 text-slate-400"><i class="fas fa-sync-alt text-3xl"></i></button>
    </nav>

    <!-- User Menu -->
    <div id="user-menu" class="hidden absolute top-20 right-6 w-56 bg-white rounded-3xl shadow-2xl border border-slate-100 z-[3000]">
        <div class="p-5 border-b"><p id="menu-email" class="text-xs font-black text-slate-400 truncate"></p></div>
        <button onclick="checkUserPanel(); toggleUserMenu()" class="w-full text-left p-5 hover:bg-orange-50 flex items-center gap-3 text-sm font-semibold" style="color: var(--logo-coral);">
            <i class="fas fa-th-large"></i> Mi Panel
        </button>
        <button onclick="logout()" class="w-full text-left p-5 hover:bg-red-50 flex items-center gap-3 text-sm font-semibold border-t" style="color: var(--logo-rojo);">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </div>

    <!-- Toast -->
    <div id="toast-container" class="fixed bottom-28 left-1/2 -translate-x-1/2 z-[4000] space-y-3"></div>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Altos del Limay"><option value="Área Centro">
        <!-- Agrega aquí todos tus barrios -->
    </datalist>

    <script>
        // ==================== JAVASCRIPT COMPLETO ====================
        let mainMap, uploadMap, uploadMarker;
        let allPets = [];
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let currentSpecies = 'todos';
        let selectedFiles = [];
        let editingPetId = null;

        const coordsBarrios = {
            "Alta Barda": [-38.932, -68.077],
            "Altos del Limay": [-38.981, -68.083],
            "Área Centro": [-38.951, -68.059],
            "Belgrano": [-38.961, -68.046],
            "Canal V": [-38.957, -68.125],
            "Confluencia": [-38.974, -68.028],
            "Cuenca XV": [-38.936, -68.136],
            "Don Bosco": [-38.971, -68.068],
            "Huilliches": [-38.959, -68.106],
            "Islas Malvinas": [-38.942, -68.069],
            "La Sirena": [-38.974, -68.093],
            "Mariano Moreno": [-38.958, -68.032],
            "Melipal": [-38.937, -68.097],
            "Parque Industrial": [-38.905, -68.069],
            "Progreso": [-38.954, -68.088],
            "Provinciales Unidas": [-38.943, -68.046],
            "Rincón de Emilio": [-38.919, -68.048],
            "Río Grande": [-38.975, -68.054],
            "San Lorenzo": [-38.948, -68.118],
            "Santa Genoveva": [-38.946, -68.041],
            "Sapere": [-38.951, -68.025],
            "Terrazas del Neuquén": [-38.911, -68.079],
            "Unión de Mayo": [-38.944, -68.101],
            "Valentina Norte": [-38.941, -68.163],
            "Valentina Sur": [-38.988, -68.137],
            "Villa Ceferino": [-38.936, -68.088],
            "Villa Florencia": [-38.966, -68.076],
            "Villa María": [-38.966, -68.056]
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast px-6 py-4 rounded-3xl shadow-2xl text-white flex items-center gap-3 ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            toast.innerHTML = `<i class="fas \( {type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span class="font-medium"> \){message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        function initMainMap() {
            if (mainMap) return;
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            if (uploadMap) return;
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if (uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        function autoZoomMap(barrio, destino) {
            if (coordsBarrios[barrio]) {
                const latlng = coordsBarrios[barrio];
                if (destino === 'main' && mainMap) mainMap.flyTo(latlng, 15);
                if (destino === 'upload' && uploadMap) {
                    uploadMap.flyTo(latlng, 15);
                    if (!uploadMarker) uploadMarker = L.marker(latlng).addTo(uploadMap);
                    else uploadMarker.setLatLng(latlng);
                    document.getElementById('lat-in').value = latlng[0];
                    document.getElementById('lng-in').value = latlng[1];
                }
            }
        }

        async function loadPets() {
            try {
                const res = await fetch('/pets');
                allPets = await res.json();
                renderPets();
            } catch (e) { console.error(e); }
        }

        function renderPets() {
            const container = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;

            container.innerHTML = '';
            if (mainMap) mainMap.eachLayer(l => { if (l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            const filtered = allPets.filter(p => 
                (p.name.toLowerCase().includes(term) || p.barrio.toLowerCase().includes(term)) &&
                (statusFilter === 'todos' || p.status === statusFilter) &&
                (currentSpecies === 'todos' || p.especie === currentSpecies)
            );

            filtered.forEach(p => {
                const color = p.status === 'perdido' ? 'var(--logo-rojo)' : 'var(--logo-celeste)';
                const img = (p.image_urls && p.image_urls[0]) || p.image_url || 'https://via.placeholder.com/400x300?text=Sin+foto';

                container.innerHTML += `
                    <div class="card-pet relative">
                        <span class="status-badge" style="background:\( {color}"> \){p.status}</span>
                        <img src="\( {img}" onclick="focusOnPet( \){p.latitud}, ${p.longitud})" class="w-full h-44 object-cover cursor-pointer">
                        <div class="p-5 text-center">
                            <p class="font-black">${p.name}</p>
                            <p class="text-xs text-slate-400">${p.barrio}</p>
                        </div>
                    </div>`;
            });
        }

        function focusOnPet(lat, lng) {
            if (mainMap) mainMap.flyTo([lat, lng], 17);
        }

        function updateAuthUI() {
            if (!currentUser) return;
            document.getElementById('user-anchor').style.backgroundColor = 'var(--logo-coral)';
            document.getElementById('user-anchor').style.color = 'white';
            if (currentUser.role === 'admin' || currentUser.id === 'admin') 
                document.getElementById('admin-badge').classList.remove('hidden');
        }

        function toggleUserMenu() {
            if (!currentUser) return showSection('auth');
            document.getElementById('user-menu').classList.toggle('hidden');
            document.getElementById('menu-email').textContent = currentUser.email;
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');

            if (id === 'home') {
                if (!mainMap) initMainMap();
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 300);
            }
            if (id === 'upload') {
                if (!uploadMap) initUploadMap();
                setTimeout(() => uploadMap.invalidateSize(), 300);
            }
            if (id === 'admin') loadAdminData();
            if (id === 'profile') loadUserPets();
        }

        function checkAuth() { currentUser ? showSection('upload') : showSection('auth'); }

        function checkUserPanel() {
            if (!currentUser) showSection('auth');
            else if (currentUser.role === 'admin' || currentUser.id === 'admin') showSection('admin');
            else showSection('profile');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('user', JSON.stringify(data));
                currentUser = data;
                updateAuthUI();
                showToast('¡Bienvenido!', 'success');
                location.reload();
            } else {
                showToast(data.msg || 'Error al iniciar sesión', 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', { method: 'POST', body: new FormData(e.target) });
            const data = await res.json();
            showToast(data.msg || 'Registro enviado', res.ok ? 'success' : 'error');
            if (res.ok) setTimeout(() => showSection('auth'), 1500);
        }

        async function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-upload');
            btn.disabled = true;
            btn.innerHTML = 'Subiendo...';

            const formData = new FormData(e.target);
            selectedFiles.forEach(file => formData.append('file', file));
            if (currentUser) formData.append('user_id', currentUser.id || currentUser.email);

            try {
                const res = await fetch('/pets/upload', { method: 'POST', body: formData });
                const data = await res.json();
                showToast(data.msg || 'Reporte enviado', res.ok ? 'success' : 'error');
                if (res.ok) setTimeout(() => location.reload(), 1600);
            } catch (err) {
                showToast('Error de conexión', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Publicar Reporte';
            }
        }

        // Preview de fotos
        document.getElementById('file-input').addEventListener('change', (e) => {
            const container = document.getElementById('preview-container');
            container.innerHTML = '';
            selectedFiles = Array.from(e.target.files).slice(0, 3);
            selectedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const div = document.createElement('div');
                    div.className = "rounded-2xl overflow-hidden aspect-square border border-slate-200";
                    div.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        // ====================== MIS REPORTES (con fecha y modal editar) ======================
        async function loadUserPets() {
            if (!currentUser) return;
            const container = document.getElementById('user-pet-list');
            container.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl text-slate-300"></i></div>`;

            try {
                const res = await fetch(`/my-pets/${currentUser.id}`);
                const pets = await res.json();
                container.innerHTML = '';

                if (pets.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white p-12 rounded-[2.5rem] text-center border border-dashed border-slate-200">
                            <i class="fas fa-paw text-6xl text-slate-300 mb-4"></i>
                            <p class="font-bold text-xl text-slate-400">Aún no tienes publicaciones</p>
                            <button onclick="showSection('upload')" class="mt-6 px-8 py-4 bg-[var(--logo-coral)] text-white font-black rounded-3xl">Crear primera publicación</button>
                        </div>`;
                    return;
                }

                pets.forEach(pet => container.innerHTML += renderUserPetCard(pet));
            } catch (e) {
                console.error(e);
                container.innerHTML = `<p class="text-red-500 text-center py-8">Error al cargar tus publicaciones</p>`;
            }
        }

        function renderUserPetCard(pet) {
            const mainImg = (pet.image_urls && pet.image_urls[0]) || pet.image_url || 'https://via.placeholder.com/600x400?text=Sin+foto';
            const date = pet.created_at ? new Date(pet.created_at).toLocaleDateString('es-AR', {day:'numeric', month:'short'}) : '';

            const statusHTML = pet.is_approved 
                ? `<span class="px-4 py-1 text-xs font-black bg-emerald-100 text-emerald-700 rounded-2xl">✓ Aprobado</span>`
                : `<span class="px-4 py-1 text-xs font-black bg-amber-100 text-amber-700 rounded-2xl">⏳ En revisión</span>`;

            return `
                <div class="admin-card p-6">
                    <div class="flex gap-5">
                        <img src="\( {mainImg}" onclick="focusOnPet( \){pet.latitud}, ${pet.longitud})" class="w-28 h-28 object-cover rounded-3xl cursor-pointer border-4 border-white shadow-md">
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-black text-xl">${pet.name}</p>
                                    <p class="text-slate-400 text-sm">${pet.barrio} ${date ? '• ' + date : ''}</p>
                                </div>
                                ${statusHTML}
                            </div>
                            <div class="mt-4 text-xs space-y-1">
                                <div><span class="text-slate-400">Estado:</span> ${pet.status === 'perdido' ? 'Perdido' : 'Adopción'}</div>
                                ${pet.raza ? `<div><span class="text-slate-400">Raza:</span> ${pet.raza}</div>` : ''}
                            </div>
                            <div class="flex gap-3 mt-6">
                                <button onclick="deletePet(${pet.id})" class="flex-1 py-3.5 bg-red-50 text-red-600 font-semibold rounded-2xl text-sm">Eliminar</button>
                                <button onclick="openEditModal(${pet.id})" class="flex-1 py-3.5 bg-slate-100 text-slate-700 font-semibold rounded-2xl text-sm">Editar</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // Modal Edición Real
        async function openEditModal(petId) {
            editingPetId = petId;
            try {
                const res = await fetch(`/my-pets/${currentUser.id}`);
                const pets = await res.json();
                const pet = pets.find(p => p.id === petId);
                if (!pet) return;

                const html = `
                    <div id="edit-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[5000]">
                        <div class="bg-white rounded-[2.5rem] w-full max-w-lg mx-4 p-8">
                            <h3 class="font-black text-2xl mb-6">Editar Publicación</h3>
                            <div class="space-y-5">
                                <input id="edit-name" value="${pet.name || ''}" class="custom-input" placeholder="Nombre">
                                <input id="edit-raza" value="${pet.raza || ''}" class="custom-input" placeholder="Raza">
                                <input id="edit-edad" value="${pet.edad || ''}" class="custom-input" placeholder="Edad">
                                <textarea id="edit-descripcion" class="custom-textarea">${pet.descripcion || ''}</textarea>
                                <button onclick="saveEdit()" class="w-full py-5 bg-[var(--logo-coral)] text-white font-black rounded-3xl">Guardar Cambios</button>
                                <button onclick="closeEditModal()" class="w-full py-4 text-slate-500 font-medium">Cancelar</button>
                            </div>
                        </div>
                    </div>`;
                document.body.insertAdjacentHTML('beforeend', html);
            } catch (e) {
                showToast("Error al abrir el editor", "error");
            }
        }

        async function saveEdit() {
            const data = {
                name: document.getElementById('edit-name').value,
                raza: document.getElementById('edit-raza').value,
                edad: document.getElementById('edit-edad').value,
                descripcion: document.getElementById('edit-descripcion').value
            };

            try {
                const res = await fetch(`/pets/update/${editingPetId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                showToast(result.msg || "Actualizado", res.ok ? 'success' : 'error');
                if (res.ok) {
                    closeEditModal();
                    loadUserPets();
                }
            } catch (e) {
                showToast("Error al guardar cambios", "error");
            }
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-modal');
            if (modal) modal.remove();
        }

        async function deletePet(id) {
            if (!confirm("¿Eliminar esta publicación permanentemente?")) return;
            try {
                await fetch(`/pets/user-delete/${id}`, { method: 'DELETE' });
                showToast("Publicación eliminada", "success");
                loadUserPets();
            } catch (e) {
                showToast("Error al eliminar", "error");
            }
        }

        // ====================== ADMIN ======================
        async function loadAdminData() {
            const usersDiv = document.getElementById('admin-users');
            const petsDiv = document.getElementById('admin-pets');
            usersDiv.innerHTML = petsDiv.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl text-slate-300"></i></div>`;

            try {
                const res = await fetch('/admin/data');
                const data = await res.json();

                document.getElementById('stat-perdidos').textContent = data.stats.perdidos || 0;
                document.getElementById('stat-adopcion').textContent = data.stats.adopcion || 0;
                document.getElementById('stat-pendientes').textContent = data.stats.pendientes_pets || 0;

                // Usuarios pendientes
                let uHTML = data.users_pending?.length ? data.users_pending.map(u => `
                    <div class="admin-card p-5 flex justify-between items-center">
                        <div><p class="font-semibold">\( {u.email}</p><p class="text-xs text-slate-400"> \){u.telefono || ''}</p></div>
                        <div class="flex gap-2">
                            <button onclick="approveItem('user', ${u.id})" class="px-6 py-2 bg-emerald-500 text-white text-xs font-black rounded-2xl">Aprobar</button>
                            <button onclick="rejectItem('user', ${u.id})" class="px-6 py-2 bg-red-500 text-white text-xs font-black rounded-2xl">Rechazar</button>
                        </div>
                    </div>`).join('') : '<p class="text-slate-400 text-center py-10">No hay usuarios pendientes</p>';
                usersDiv.innerHTML = uHTML;

                // Pets pendientes
                let pHTML = '';
                const pending = data.pets.filter(p => !p.is_approved);
                if (pending.length) {
                    pHTML = pending.map(p => {
                        const img = (p.image_urls && p.image_urls[0]) || p.image_url || '';
                        return `
                            <div class="admin-card p-5 flex gap-4">
                                \( {img ? `<img src=" \){img}" class="w-20 h-20 object-cover rounded-3xl">` : ''}
                                <div class="flex-1">
                                    <p class="font-bold">${p.name}</p>
                                    <p class="text-xs text-slate-400">${p.barrio}</p>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="approveItem('pet', ${p.id})" class="px-6 py-2 bg-emerald-500 text-white text-xs font-black rounded-2xl">Aprobar</button>
                                    <button onclick="rejectItem('pet', ${p.id})" class="px-6 py-2 bg-red-500 text-white text-xs font-black rounded-2xl">Rechazar</button>
                                </div>
                            </div>`;
                    }).join('');
                } else {
                    pHTML = '<p class="text-slate-400 text-center py-10">No hay publicaciones pendientes</p>';
                }
                petsDiv.innerHTML = pHTML;
            } catch (e) {
                console.error(e);
                showToast("Error cargando panel admin", "error");
            }
        }

        async function approveItem(type, id) {
            await fetch(`/admin/approve/\( {type}/ \){id}`, {method: 'POST'});
            showToast("Aprobado ✓", "success");
            loadAdminData();
        }

        async function rejectItem(type, id) {
            if (!confirm("¿Rechazar este elemento?")) return;
            await fetch(`/admin/reject/\( {type}/ \){id}`, {method: 'POST'});
            showToast("Rechazado", "error");
            loadAdminData();
        }

        function setSpecies(sp, btn) {
            currentSpecies = sp;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPets();
        }

        // Exponer funciones globales
        window.showSection = showSection;
        window.checkAuth = checkAuth;
        window.checkUserPanel = checkUserPanel;
        window.toggleUserMenu = toggleUserMenu;
        window.logout = logout;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleUpload = handleUpload;
        window.autoZoomMap = autoZoomMap;
        window.focusOnPet = focusOnPet;
        window.setSpecies = setSpecies;
        window.openEditModal = openEditModal;
        window.saveEdit = saveEdit;
        window.closeEditModal = closeEditModal;
        window.deletePet = deletePet;
        window.approveItem = approveItem;
        window.rejectItem = rejectItem;

        window.onload = () => {
            updateAuthUI();
            showSection('home');
        };
    </script>
</body>
</html>
