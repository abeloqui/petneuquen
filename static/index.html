<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f8fafc; padding-bottom: 100px; }
        .hidden { display: none !important; }
        #main-map { height: 300px; width: 100%; border-radius: 2rem; border: 4px solid white; z-index: 10; }
    </style>
</head>
<body>

    <nav class="p-5 bg-white shadow-sm flex justify-between items-center sticky top-0 z-[1000]">
        <h1 class="font-extrabold text-xl" onclick="location.reload()">Huellitas<span class="text-orange-500">NQN</span></h1>
        <button onclick="showSection('auth')" class="text-slate-300 text-3xl"><i class="fas fa-user-circle"></i></button>
    </nav>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <section id="sec-home">
            <div id="main-map"></div>
            <div id="pet-list" class="grid grid-cols-2 gap-4 mt-6"></div>
        </section>

        <section id="sec-upload" class="hidden">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="text" name="barrio" placeholder="Barrio" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <div id="map-upload" style="height: 200px; width: 100%;" class="rounded-2xl"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="w-full" required>
                    <button class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold">PUBLICAR</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="hidden space-y-4">
            <h2 class="font-bold">Panel Admin</h2>
            <div id="admin-content" class="space-y-2"></div>
        </section>

        <section id="sec-auth" class="hidden">
            <div id="auth-forms" class="bg-white p-8 rounded-[2rem] space-y-6 border">
                <form onsubmit="handleLogin(event)" class="space-y-3">
                    <input type="email" name="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <input type="password" name="password" placeholder="Clave" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                    <button class="w-full bg-slate-900 text-white py-4 rounded-2xl">Entrar</button>
                </form>
            </div>
            <div id="user-info" class="hidden text-center p-10 bg-white rounded-[2rem]">
                <p id="u-mail" class="font-bold mb-4"></p>
                <button onclick="logout()" class="text-red-500">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[80%] bg-white shadow-2xl rounded-full p-3 flex justify-around border z-[2000]">
        <button onclick="showSection('home')"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="bg-orange-500 text-white p-4 rounded-full -mt-10 border-4 border-white"><i class="fas fa-plus"></i></button>
        <button id="nav-admin-btn" onclick="showAdmin()" class="hidden"><i class="fas fa-shield-halved text-xl"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('user'));
        let mainMap, allPets = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'home') {
                if(!mainMap) {
                    mainMap = L.map('main-map').setView([-38.951, -68.061], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
                }
                setTimeout(() => { mainMap.invalidateSize(); loadPets(); }, 400);
            }
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            mainMap.eachLayer(l => { if(l instanceof L.Marker || l instanceof L.CircleMarker) mainMap.removeLayer(l); });

            allPets.forEach(p => {
                L.marker([p.latitud, p.longitud]).addTo(mainMap).bindPopup(p.name);
                list.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-[10px] text-slate-400">${p.barrio}</p>
                        </div>
                    </div>`;
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', body:new FormData(e.target)});
            if(res.ok) { user = await res.json(); localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
        }

        async function handleUpload(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append('user_id', user.id);
            await fetch('/pets/upload', {method:'POST', body:fd});
            location.reload();
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(user) {
                document.getElementById('u-mail').innerText = user.email;
                document.getElementById('auth-forms').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                if(user.role === 'admin') document.getElementById('nav-admin-btn').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
