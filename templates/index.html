<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --coral: #E07A5F; --mint: #81B29A; --cream: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--cream); color: var(--dark); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .section-container { animation: slideUp 0.4s ease-out; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #main-map { height: 380px; width: 100%; border-radius: 2.5rem; border: 5px solid white; box-shadow: 0 15px 35px rgba(61, 64, 91, 0.1); }
        #map-upload { height: 220px; width: 100%; border-radius: 1.5rem; margin-bottom: 15px; }
        .custom-input { background: white; border-radius: 1.2rem; padding: 14px 18px; border: 2px solid transparent; width: 100%; outline: none; transition: 0.3s; }
        .custom-input:focus { border-color: var(--mint); }
        .btn-primary { background: var(--coral); color: white; padding: 16px; border-radius: 1.2rem; font-weight: 900; width: 100%; text-transform: uppercase; }
        .glass { background: rgba(244, 241, 222, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body>

    <datalist id="lista-barrios">
        <option value="Alta Barda"><option value="Altos del Limay"><option value="Área Centro">
        <option value="Belgrano"><option value="Canal V"><option value="Confluencia">
        <option value="Don Bosco"><option value="Huilliches"><option value="Islas Malvinas">
        <option value="La Sirena"><option value="Mariano Moreno"><option value="Melipal">
        <option value="Parque Industrial"><option value="Progreso"><option value="Río Grande">
        <option value="San Lorenzo"><option value="Santa Genoveva"><option value="Sapere">
        <option value="Terrazas del Neuquén"><option value="Valentina Norte"><option value="Valentina Sur">
    </datalist>

    <nav class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="showSection('home')" class="flex items-center gap-2 cursor-pointer">
            <h1 class="font-black text-xl tracking-tighter">Huellitas<span style="color: var(--coral);">NQN</span></h1>
        </div>
    </nav>

    <main>
        <section id="sec-home" class="section-container">
            <div id="main-map" class="mb-6"></div>
            <input type="text" id="search" oninput="renderPets()" placeholder="Buscar barrio o nombre..." class="custom-input mb-6" list="lista-barrios">
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <h2 class="text-2xl font-black mb-6 italic">¡Viajar Volando! 🚀</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input" required>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <h2 class="text-2xl font-black mb-6 uppercase">Panel Admin</h2>
            <div id="admin-metrics" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div id="admin-pets-list" class="space-y-3 mb-8"></div>
            <div id="admin-users-list" class="space-y-3"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl">
                <h2 class="text-xl font-black mb-4">Reportar Mascota</h2>
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre" class="custom-input" required>
                    <select name="status" class="custom-input">
                        <option value="perdido">Perdido</option>
                        <option value="encontrado">Encontrado</option>
                        <option value="adopcion">En adopción</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio" class="custom-input" onchange="autoVuelo(this.value, 'upload')" list="lista-barrios" required>
                    <div id="map-upload"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="text-xs" required>
                    <button type="submit" id="btn-up" class="btn-primary">Publicar</button>
                </form>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-[2.5rem] p-3 flex justify-around items-center z-[2000] border-2 border-white shadow-2xl">
        <button onclick="showSection('home')" class="p-3 text-slate-400"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 bg-[#E07A5F] text-white rounded-full flex items-center justify-center shadow-lg -mt-12 border-[6px] border-[#F4F1DE]"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="accessAdmin()" id="admin-btn" class="p-3 text-slate-400 relative">
            <i class="fas fa-user-shield text-xl"></i>
            <span id="admin-badge" class="hidden absolute top-2 right-2 w-3 h-3 bg-orange-500 border-2 border-white rounded-full"></span>
        </button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], user = JSON.parse(localStorage.getItem('user'));

        // Coordenadas para la función de "Vuelo"
        const coordsBarrios = {
            "Alta Barda": [-38.932, -68.077], "Altos del Limay": [-38.981, -68.083], "Área Centro": [-38.951, -68.059], "Belgrano": [-38.961, -68.046], "Canal V": [-38.957, -68.125], "Confluencia": [-38.974, -68.028], "Don Bosco": [-38.971, -68.068], "Huilliches": [-38.959, -68.106], "Islas Malvinas": [-38.942, -68.069], "La Sirena": [-38.974, -68.093], "Mariano Moreno": [-38.958, -68.032], "Melipal": [-38.937, -68.097], "Parque Industrial": [-38.905, -68.069], "Progreso": [-38.954, -68.088], "Río Grande": [-38.975, -68.054], "San Lorenzo": [-38.948, -68.118], "Santa Genoveva": [-38.946, -68.041], "Sapere": [-38.951, -68.025], "Terrazas del Neuquén": [-38.911, -68.079], "Valentina Norte": [-38.941, -68.163], "Valentina Sur": [-38.988, -68.137]
        };

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') { if(!mainMap) initMainMap(); loadPets(); }
            if (id === 'upload') { if(!uploadMap) initUploadMap(); }
            if (id === 'admin') loadAdminData();
        }

        // --- SISTEMA DE VUELO ---
        function autoVuelo(barrio, mapa) {
            if (coordsBarrios[barrio]) {
                const target = (mapa === 'main') ? mainMap : uploadMap;
                target.flyTo(coordsBarrios[barrio], 15, { duration: 2 });
                if(mapa === 'upload') {
                    if (uploadMarker) uploadMarker.setLatLng(coordsBarrios[barrio]);
                    else uploadMarker = L.marker(coordsBarrios[barrio]).addTo(uploadMap);
                    document.getElementById('lat-in').value = coordsBarrios[barrio][0];
                    document.getElementById('lng-in').value = coordsBarrios[barrio][1];
                }
            }
        }

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            allPets.filter(p => p.is_approved && (p.name.toLowerCase().includes(term) || p.barrio.toLowerCase().includes(term))).forEach(p => {
                list.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm" onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-black text-[10px] uppercase">${p.name}</p>
                            <p class="text-[8px] text-slate-400">${p.barrio}</p>
                        </div>
                    </div>`;
            });
        }

        async function loadAdminData() {
            if (!user || user.role !== 'admin') return;
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('admin-metrics').innerHTML = `<div class="bg-white p-4 rounded-3xl text-center">Pets: ${data.pets.length}</div><div class="bg-white p-4 rounded-3xl text-center">Users: ${data.users.length}</div>`;
            document.getElementById('admin-pets-list').innerHTML = data.pets.map(p => `
                <div class="bg-white p-3 rounded-2xl flex justify-between items-center ${p.is_approved ? '' : 'border-2 border-coral bg-orange-50'}">
                    <span class="text-xs font-black uppercase">${p.name}</span>
                    <div class="flex gap-2">
                        ${!p.is_approved ? `<button onclick="adminAction('pet', 'approve', ${p.id})" class="text-emerald-500"><i class="fas fa-check-circle text-xl"></i></button>` : ''}
                        <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-300"><i class="fas fa-trash text-xl"></i></button>
                    </div>
                </div>`).join('');
        }

        async function adminAction(type, action, id) {
            const url = action === 'delete' ? `/admin/delete/${type}/${id}` : `/admin/approve/${type}/${id}`;
            await fetch(url, { method: action === 'delete' ? 'DELETE' : 'POST' });
            loadAdminData();
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function accessAdmin() { user?.role === 'admin' ? showSection('admin') : showSection('auth'); }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
            else alert("Error");
        }

        async function handleUpload(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append('user_id', user.id);
            await fetch('/pets/upload', { method: 'POST', body: fd });
            alert("Enviado para aprobación!");
            location.reload();
        }

        window.onload = () => {
            if(user?.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            showSection('home');
        };
    </script>
</body>
</html>
