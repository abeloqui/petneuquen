<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Gestión Comunitaria</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --coral: #E07A5F; --mint: #81B29A; --yellow: #F2CC8F; --cream: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--cream); color: var(--dark); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .section-container { animation: slideUp 0.4s ease-out; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #main-map { height: 380px; width: 100%; border-radius: 2.5rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #map-upload { height: 240px; width: 100%; border-radius: 1.5rem; border: 2px solid white; margin-top: 10px; }
        .custom-input { background: white; border-radius: 1.2rem; padding: 14px; width: 100%; border: 2px solid transparent; outline: none; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .custom-input:focus { border-color: var(--coral); }
        .btn-primary { background: var(--coral); color: white; padding: 16px; border-radius: 1.2rem; font-weight: 900; width: 100%; text-transform: uppercase; box-shadow: 0 8px 20px rgba(224,122,95,0.25); border: none; cursor: pointer; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.96); }
        .marker-pin { display: flex; justify-content: center; align-items: center; width: 38px; height: 38px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .marker-pin i { transform: rotate(45deg); font-size: 16px; color: white; }
        #img-modal { background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); z-index: 9999; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.5); }
        .nav-active { color: var(--coral) !important; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="img-modal" class="hidden fixed inset-0 flex flex-col items-center justify-center p-4" onclick="closeImg()">
        <button class="absolute top-10 right-6 text-white text-4xl"><i class="fas fa-times"></i></button>
        <img id="modal-img-src" class="max-w-full max-h-[75vh] rounded-3xl shadow-2xl object-contain border-4 border-white/10">
        <p id="modal-img-caption" class="text-white mt-6 font-black uppercase tracking-widest text-xl text-center"></p>
    </div>

    <nav class="p-4 glass-nav sticky top-0 z-[1000] flex justify-between items-center px-6">
        <div onclick="showSection('home')" class="cursor-pointer">
            <h1 class="font-black text-xl italic tracking-tighter">Huellitas<span style="color: var(--coral);">NQN</span></h1>
        </div>
        <div id="user-info" class="text-[9px] font-black uppercase text-slate-500 bg-white/60 px-3 py-1.5 rounded-full border border-white">Invitado</div>
    </nav>

    <main>
        <section id="sec-home" class="section-container">
            <div id="main-map" class="mb-6"></div>
            <div class="flex gap-4 mb-5 px-2">
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background: var(--coral)"></div><span class="text-[9px] font-black uppercase text-slate-500">Perdidos</span></div>
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background: var(--yellow)"></div><span class="text-[9px] font-black uppercase text-slate-500">Adopción</span></div>
            </div>
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" id="search" oninput="renderPets()" placeholder="Buscar por barrio o nombre..." class="custom-input pl-12 shadow-sm">
            </div>
            <div id="pet-list" class="space-y-5"></div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Control Central</h2>
                <button onclick="logout()" class="text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-2xl border border-red-100">SALIR</button>
            </div>
            <div id="admin-metrics" class="grid grid-cols-2 gap-3 mb-8 text-center"></div>
            <div class="space-y-8">
                <div><h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2 border-l-4 border-coral pl-2">Mascotas Pendientes</h3><div id="admin-pets-list" class="space-y-3"></div></div>
                <div><h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2 border-l-4 border-mint pl-2">Usuarios Pendientes</h3><div id="admin-users-list" class="space-y-3"></div></div>
            </div>
        </section>

        <section id="sec-user-panel" class="section-container hidden">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Mis Huellitas</h2>
                <button onclick="logout()" class="text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-2xl border border-red-100">CERRAR SESIÓN</button>
            </div>
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-6 ml-2 italic">Gestioná tus reportes aquí:</p>
            <div id="user-pets-list" class="space-y-4"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white">
                <h2 class="text-xl font-black mb-6 uppercase text-center italic tracking-tighter">Reportar Mascota</h2>
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <div id="preview-box" class="hidden w-full h-52 rounded-3xl overflow-hidden mb-2 relative border-4 border-slate-50 shadow-inner">
                        <img id="img-preview" class="w-full h-full object-cover">
                        <button type="button" class="absolute top-3 right-3 bg-white/90 p-3 rounded-full text-coral shadow-lg" onclick="resetImg()"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <div id="drop-zone" class="p-10 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-center relative transition-colors hover:bg-slate-100">
                        <input type="file" id="file-input" name="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)" required>
                        <i class="fas fa-camera text-slate-300 text-4xl mb-3"></i>
                        <p class="text-[11px] font-black text-slate-400 uppercase">Toca para cargar la foto</p>
                    </div>
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="custom-input shadow-sm" required>
                    <div class="grid grid-cols-2 gap-3">
                        <select name="status" class="custom-input shadow-sm font-black text-[11px] uppercase">
                            <option value="perdido">PERDIDO</option>
                            <option value="adopcion">ADOPCIÓN</option>
                        </select>
                        <input type="text" name="barrio" placeholder="Barrio" class="custom-input shadow-sm text-xs" required>
                    </div>
                    <div class="relative"><div id="map-upload"></div><button type="button" onclick="getLocation()" class="absolute bottom-4 right-4 z-[1000] bg-white w-14 h-14 rounded-full shadow-2xl text-coral flex items-center justify-center border-2 border-coral/10"><i class="fas fa-location-crosshairs text-xl"></i></button></div>
                    <input type="hidden" name="latitud" id="lat-in"><input type="hidden" name="longitud" id="lng-in">
                    <button type="submit" id="btn-up" class="btn-primary flex items-center justify-center gap-3 mt-4"><i class="fas fa-check-circle"></i> Enviar Reporte</button>
                </form>
            </div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white">
                <div class="flex gap-4 mb-8">
                    <button id="tab-login" onclick="toggleAuth('login')" class="flex-1 pb-3 border-b-4 border-coral font-black uppercase italic transition-all">Ingresar</button>
                    <button id="tab-register" onclick="toggleAuth('register')" class="flex-1 pb-3 border-b-4 border-transparent text-slate-300 font-black uppercase italic transition-all">Crear Cuenta</button>
                </div>
                <form id="form-auth" onsubmit="handleAuth(event)" class="space-y-4">
                    <div class="space-y-4">
                        <div class="relative"><i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i><input type="email" name="email" placeholder="Email" class="custom-input pl-12 shadow-sm" required></div>
                        <div class="relative"><i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i><input type="password" name="password" placeholder="Contraseña" class="custom-input pl-12 shadow-sm" required></div>
                    </div>
                    <div id="reg-fields" class="hidden space-y-4 animate-fadeIn">
                        <div class="relative"><i class="fab fa-whatsapp absolute left-4 top-1/2 -translate-y-1/2 text-emerald-400"></i><input type="text" name="phone" placeholder="WhatsApp" class="custom-input pl-12 shadow-sm"></div>
                    </div>
                    <button type="submit" id="btn-auth-submit" class="btn-primary mt-6">Acceder</button>
                </form>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] bg-white/90 backdrop-blur-lg rounded-[2.5rem] p-3 flex justify-around items-center z-[2000] border-2 border-white shadow-2xl">
        <button onclick="showSection('home')" id="nav-home" class="p-3 text-slate-400 transition-all"><i class="fas fa-th-large text-2xl"></i></button>
        <button onclick="checkAuth()" class="w-16 h-16 bg-[#E07A5F] text-white rounded-full flex items-center justify-center shadow-lg -mt-14 border-[6px] border-[#F4F1DE] transition-transform active:scale-90"><i class="fas fa-plus text-2xl"></i></button>
        <button onclick="accessPanel()" id="nav-panel" class="p-3 text-slate-400 relative transition-all"><i class="fas fa-user-circle text-2xl"></i><span id="admin-badge" class="hidden absolute top-2 right-2 w-3 h-3 bg-orange-500 border-2 border-white rounded-full"></span></button>
                        </nav>

        <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], user = JSON.parse(localStorage.getItem('user'));
        let markersLayer = L.layerGroup();
        let authMode = 'login';
        const colors = { "perdido": "#E07A5F", "adopcion": "#F2CC8F" };

        window.onload = () => { updateUserDisplay(); showSection('home'); };

        function updateUserDisplay() {
            if(user) {
                document.getElementById('user-info').innerText = user.email.split('@')[0];
                if(user.role === 'admin') {
                    document.getElementById('admin-badge').classList.remove('hidden');
                    document.getElementById('nav-panel').innerHTML = '<i class="fas fa-shield-cat text-2xl"></i><span id="admin-badge" class="absolute top-2 right-2 w-3 h-3 bg-orange-500 border-2 border-white rounded-full"></span>';
                }
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            let navBtn = document.getElementById('nav-' + (id === 'user-panel' || id === 'admin' ? 'panel' : id));
            if(navBtn) navBtn.classList.add('nav-active');

            if (id === 'home') { if(!mainMap) initMainMap(); loadPets(); }
            if (id === 'upload') { if(!uploadMap) setTimeout(initUploadMap, 100); }
            if (id === 'admin') loadAdminData();
            if (id === 'user-panel') loadUserPets();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            markersLayer.addTo(mainMap);
        }
        function initUploadMap() {
            if(uploadMap) return;
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => setUploadMarker(e.latlng));
        }
        function setUploadMarker(latlng) {
            if(uploadMarker) uploadMarker.setLatLng(latlng);
            else uploadMarker = L.marker(latlng).addTo(uploadMap);
            document.getElementById('lat-in').value = latlng.lat;
            document.getElementById('lng-in').value = latlng.lng;
        }
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const latlng = {lat: pos.coords.latitude, lng: pos.coords.longitude};
                    uploadMap.flyTo(latlng, 17); setUploadMarker(latlng);
                });
            }
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets(); renderMarkers();
        }
        function renderMarkers() {
            markersLayer.clearLayers();
            allPets.filter(p => p.is_approved).forEach(p => {
                const icon = L.divIcon({ html: `<div class="marker-pin" style="background: ${colors[p.status]}"><i class="fas fa-paw"></i></div>`, className: 'custom-div-icon', iconSize: [38, 38], iconAnchor: [19, 38] });
                L.marker([p.latitud, p.longitud], { icon }).addTo(markersLayer).bindPopup(`<b>${p.name}</b>`);
            });
        }
        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            allPets.filter(p => p.is_approved && (p.name.toLowerCase().includes(term) || p.barrio.toLowerCase().includes(term))).forEach(p => {
                list.innerHTML += `<div class="bg-white rounded-[2.5rem] p-4 shadow-sm flex gap-5 items-center border border-white">
                    <img src="${p.image_url}" onclick="openImg('${p.image_url}', '${p.name}')" class="w-28 h-28 rounded-[2rem] object-cover shadow-md cursor-pointer">
                    <div class="flex-1">
                        <span class="text-[7px] font-black px-2 py-1 rounded-full text-white uppercase" style="background: ${colors[p.status]}">${p.status}</span>
                        <h3 class="font-black text-lg uppercase text-slate-700" onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)">${p.name}</h3>
                        <p class="text-[9px] text-slate-400 mb-4 italic">${p.barrio}</p>
                        <a href="https://wa.me/${p.user_phone}?text=Hola! Vi tu reporte de ${p.name}" target="_blank" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase"><i class="fab fa-whatsapp"></i> Contactar</a>
                    </div>
                </div>`;
            });
        }

        function loadUserPets() {
            const list = document.getElementById('user-pets-list'); list.innerHTML = "";
            const myPets = allPets.filter(p => p.user_id === user.id);
            if(myPets.length === 0) { list.innerHTML = `<p class="text-center text-slate-300 font-black py-10 uppercase text-[10px]">Sin publicaciones</p>`; return; }
            myPets.forEach(p => {
                list.innerHTML += `<div class="bg-white rounded-3xl p-3 flex justify-between items-center shadow-sm border border-white">
                    <div class="flex items-center gap-3"><img src="${p.image_url}" class="w-14 h-14 rounded-2xl object-cover">
                    <div><p class="text-[10px] font-black uppercase">${p.name}</p><span class="text-[7px] font-black uppercase ${p.is_approved ? 'text-emerald-400' : 'text-orange-400'}">${p.is_approved ? 'Publicado' : 'Pendiente'}</span></div></div>
                    <button onclick="deleteMyPet(${p.id})" class="text-red-400 w-10 h-10 rounded-2xl bg-red-50"><i class="fas fa-trash"></i></button></div>`;
            });
        }
        async function deleteMyPet(petId) { if(confirm("¿Borrar reporte?")) { await fetch(`/pets/delete/${petId}`, { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({user_id: user.id}) }); loadPets(); loadUserPets(); }}

        async function loadAdminData() {
            const res = await fetch('/admin/data'); const data = await res.json();
            document.getElementById('admin-metrics').innerHTML = `<div class="bg-white p-5 rounded-3xl"><p class="text-xs font-black">${data.pets.length}</p><p class="text-[8px] uppercase">Reportes</p></div><div class="bg-white p-5 rounded-3xl"><p class="text-xs font-black">${data.users.length}</p><p class="text-[8px] uppercase">Usuarios</p></div>`;
            document.getElementById('admin-pets-list').innerHTML = data.pets.map(p => `<div class="bg-white p-3 rounded-2xl flex justify-between items-center border ${p.is_approved ? '' : 'border-orange-200'}"><span>${p.name}</span><div>${!p.is_approved ? `<button onclick="adminAction('pet','approve',${p.id})" class="text-emerald-500 mr-2"><i class="fas fa-check"></i></button>` : ''}<button onclick="adminAction('pet','delete',${p.id})" class="text-red-300"><i class="fas fa-trash"></i></button></div></div>`).join('');
            document.getElementById('admin-users-list').innerHTML = data.users.map(u => `<div class="bg-white p-3 rounded-2xl flex justify-between items-center border ${u.is_approved ? '' : 'border-orange-200'}"><span>${u.email}</span><div>${!u.is_approved ? `<button onclick="adminAction('user','approve',${u.id})" class="text-emerald-500 mr-2"><i class="fas fa-user-check"></i></button>` : ''}<button onclick="adminAction('user','delete',${u.id})" class="text-red-100"><i class="fas fa-user-minus"></i></button></div></div>`).join('');
        }
        async function adminAction(type, action, id) { if(confirm("Confirmar?")) { await fetch(`/admin/${action}/${type}/${id}`, { method: action === 'delete' ? 'DELETE' : 'POST' }); loadAdminData(); loadPets(); }}

        async function handleAuth(e) { e.preventDefault(); const fd = new FormData(e.target); const res = await fetch(authMode === 'login' ? '/login' : '/register', { method: 'POST', body: fd }); const data = await res.json(); if(res.ok) { localStorage.setItem('user', JSON.stringify(data)); location.reload(); } else alert(data.error); }
        async function handleUpload(e) { e.preventDefault(); const fd = new FormData(e.target); if(!fd.get('latitud')) return alert("Marcá el mapa"); fd.append('user_id', user.id); const res = await fetch('/pets/upload', { method: 'POST', body: fd }); if(res.ok) { alert("Enviado para aprobación"); location.reload(); }}

        function toggleAuth(m) { authMode = m; document.getElementById('reg-fields').classList.toggle('hidden', m === 'login'); document.getElementById('tab-login').classList.toggle('border-coral', m === 'login'); document.getElementById('tab-register').classList.toggle('border-coral', m === 'register'); }
        function previewImage(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('img-preview').src = e.target.result; document.getElementById('preview-box').classList.remove('hidden'); document.getElementById('drop-zone').classList.add('hidden'); }; r.readAsDataURL(i.files[0]); }}
        function resetImg() { document.getElementById('file-input').value = ""; document.getElementById('preview-box').classList.add('hidden'); document.getElementById('drop-zone').classList.remove('hidden'); }
        function openImg(u, n) { document.getElementById('modal-img-src').src = u; document.getElementById('modal-img-caption').innerText = n; document.getElementById('img-modal').classList.remove('hidden'); }
        function closeImg() { document.getElementById('img-modal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('user'); location.reload(); }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function accessPanel() { if(!user) return showSection('auth'); user.role === 'admin' ? showSection('admin') : showSection('user-panel'); }
    </script>
</body>
</html>
