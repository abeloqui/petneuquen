<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad Activa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --coral: #E07A5F; --mint: #81B29A; --yellow: #F2CC8F; --cream: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--cream); color: var(--dark); margin: 0; padding-bottom: 110px; }
        .hidden { display: none !important; }
        .section-container { animation: slideUp 0.3s ease-out; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #main-map { height: 380px; width: 100%; border-radius: 2.5rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .custom-input { background: white; border-radius: 1.2rem; padding: 14px; width: 100%; border: 2px solid transparent; outline: none; }
        .btn-primary { background: var(--coral); color: white; padding: 16px; border-radius: 1.2rem; font-weight: 900; width: 100%; text-transform: uppercase; }
        
        /* Pins de Huella */
        .marker-pin { display: flex; justify-content: center; align-items: center; width: 36px; height: 36px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .marker-pin i { transform: rotate(45deg); font-size: 16px; color: white; }

        /* Modal de Imagen */
        #img-modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); transition: 0.3s; }
    </style>
</head>
<body>

    <div id="img-modal" class="hidden fixed inset-0 z-[5000] flex flex-col items-center justify-center p-4" onclick="closeImg()">
        <button class="absolute top-10 right-6 text-white text-3xl"><i class="fas fa-times"></i></button>
        <img id="modal-img-src" class="max-w-full max-h-[80vh] rounded-3xl shadow-2xl object-contain">
        <p id="modal-img-caption" class="text-white mt-4 font-black uppercase tracking-widest"></p>
    </div>

    <nav class="p-4 bg-white/80 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b border-white">
        <h1 onclick="showSection('home')" class="font-black text-xl italic cursor-pointer tracking-tighter">Huellitas<span style="color: var(--coral);">NQN</span></h1>
        <div id="user-info" class="text-[10px] font-black uppercase text-slate-400"></div>
    </nav>

    <main>
        <section id="sec-home" class="section-container">
            <div id="main-map" class="mb-6"></div>
            <div class="flex gap-4 mb-4 px-2">
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background: var(--coral)"></div><span class="text-[9px] font-bold tracking-tighter">PERDIDOS</span></div>
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background: var(--yellow)"></div><span class="text-[9px] font-bold tracking-tighter">ADOPCIÓN</span></div>
            </div>
            <input type="text" id="search" oninput="renderPets()" placeholder="Buscar barrio o mascota..." class="custom-input mb-6 shadow-sm">
            <div id="pet-list" class="space-y-4"></div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-2xl font-black uppercase tracking-tighter">Panel Central</h2>
                <button onclick="logout()" class="text-[10px] font-black text-red-400 border-b-2 border-red-100 pb-1">SALIR</button>
            </div>
            <div id="admin-metrics" class="grid grid-cols-2 gap-3 mb-8 text-center"></div>
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Moderación</h3>
            <div id="admin-pets-list" class="space-y-3 mb-8"></div>
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Usuarios</h3>
            <div id="admin-users-list" class="space-y-3"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white">
                <h2 class="text-xl font-black mb-4 uppercase text-center">Subir Reporte</h2>
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre" class="custom-input shadow-sm" required>
                    <select name="status" class="custom-input shadow-sm">
                        <option value="perdido">Perdido</option>
                        <option value="adopcion">En adopción</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio" class="custom-input shadow-sm" required>
                    <div id="map-upload" class="h-[180px] rounded-2xl mb-2"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <div class="p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                        <input type="file" name="file" accept="image/*" class="text-xs w-full" required>
                    </div>
                    <button type="submit" id="btn-up" class="btn-primary">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <h2 class="text-xl font-black mb-6 uppercase italic">Acceso Administrador</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="custom-input border-slate-50" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input border-slate-50" required>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] bg-white/90 backdrop-blur-lg rounded-[2.5rem] p-3 flex justify-around items-center z-[2000] border-2 border-white shadow-2xl">
        <button onclick="showSection('home')" class="p-3 text-slate-400"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 bg-[#E07A5F] text-white rounded-full flex items-center justify-center shadow-lg -mt-12 border-[6px] border-[#F4F1DE]"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="accessAdmin()" id="admin-btn" class="p-3 text-slate-400 relative">
            <i class="fas fa-user-shield text-xl"></i>
            <span id="admin-badge" class="hidden absolute top-2 right-2 w-3 h-3 bg-orange-500 border-2 border-white rounded-full"></span>
        </button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], user = JSON.parse(localStorage.getItem('user'));
        let markersLayer = L.layerGroup();
        const colors = { "perdido": "#E07A5F", "adopcion": "#F2CC8F" };

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            markersLayer.addTo(mainMap);
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
            renderMarkers();
        }

        // --- ZOOM DE IMAGEN ---
        function openImg(url, name) {
            document.getElementById('modal-img-src').src = url;
            document.getElementById('modal-img-caption').innerText = name;
            document.getElementById('img-modal').classList.remove('hidden');
        }
        function closeImg() { document.getElementById('img-modal').classList.add('hidden'); }

        function renderMarkers() {
            markersLayer.clearLayers();
            allPets.filter(p => p.is_approved).forEach(p => {
                const color = colors[p.status] || '#3D405B';
                const icon = L.divIcon({
                    html: `<div class="marker-pin" style="background: ${color}"><i class="fas fa-paw"></i></div>`,
                    className: 'custom-div-icon', iconSize: [36, 36], iconAnchor: [18, 36]
                });
                L.marker([p.latitud, p.longitud], { icon }).addTo(markersLayer)
                 .bindPopup(`<div class="text-center"><b>${p.name}</b><br><button onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)" class="text-[10px] text-coral font-bold uppercase">Ver aquí</button></div>`);
            });
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            allPets.filter(p => p.is_approved && (p.name.toLowerCase().includes(term) || p.barrio.toLowerCase().includes(term))).forEach(p => {
                const color = colors[p.status];
                list.innerHTML += `
                    <div class="bg-white rounded-[2.2rem] p-4 shadow-sm border border-slate-50 flex gap-4 items-center">
                        <img src="${p.image_url}" onclick="openImg('${p.image_url}', '${p.name}')" class="w-24 h-24 rounded-3xl object-cover shadow-inner cursor-pointer">
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <span class="text-[7px] font-black px-2 py-0.5 rounded-full text-white uppercase" style="background: ${color}">${p.status}</span>
                                <button onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)" class="text-slate-300"><i class="fas fa-map-marker-alt"></i></button>
                            </div>
                            <h3 class="font-black text-base uppercase mt-1 leading-tight">${p.name}</h3>
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-3">${p.barrio}</p>
                            <div class="flex gap-2">
                                <a href="https://wa.me/${p.user_phone}?text=Hola! Vi tu publicación de ${p.name} en Huellitas NQN" target="_blank" class="bg-emerald-500 text-white px-3 py-2 rounded-xl text-[9px] font-black uppercase flex items-center gap-2">
                                    <i class="fab fa-whatsapp text-xs"></i> Contactar
                                </a>
                                <a href="https://wa.me/?text=Ayudemos a encontrar a ${p.name} en ${p.barrio}! Mirá la foto acá: ${p.image_url}" target="_blank" class="bg-slate-100 text-slate-500 px-3 py-2 rounded-xl text-[9px] font-black uppercase">
                                    <i class="fas fa-share-alt"></i>
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function loadAdminData() {
            if (!user || user.role !== 'admin') return;
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('admin-metrics').innerHTML = `
                <div class="bg-white p-4 rounded-3xl shadow-sm"><p class="text-[8px] font-black text-slate-300">MASCOTAS</p><p class="text-xl font-black">${data.pets.length}</p></div>
                <div class="bg-white p-4 rounded-3xl shadow-sm"><p class="text-[8px] font-black text-slate-300">USERS</p><p class="text-xl font-black">${data.users.length}</p></div>`;
            
            document.getElementById('admin-pets-list').innerHTML = data.pets.map(p => `
                <div class="bg-white p-3 rounded-2xl flex items-center justify-between shadow-sm border ${p.is_approved ? '' : 'border-orange-200 bg-orange-50/50'}">
                    <img src="${p.image_url}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-1 px-3 text-left">
                        <p class="text-[10px] font-black uppercase">${p.name}</p>
                        <p class="text-[7px] font-bold text-slate-400">${p.barrio}</p>
                    </div>
                    <div class="flex gap-2">
                        ${!p.is_approved ? `<button onclick="adminAction('pet', 'approve', ${p.id})" class="text-emerald-500"><i class="fas fa-check-circle text-xl"></i></button>` : ''}
                        <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-300"><i class="fas fa-trash-alt text-xl"></i></button>
                    </div>
                </div>`).join('');
            
            document.getElementById('admin-users-list').innerHTML = data.users.map(u => `
                <div class="bg-white p-3 rounded-2xl flex justify-between items-center shadow-sm">
                    <span class="text-[10px] font-black px-2">${u.email}</span>
                    <button onclick="adminAction('user', 'delete', ${u.id})" class="text-red-200 p-2"><i class="fas fa-user-minus"></i></button>
                </div>`).join('');
        }

        async function adminAction(type, action, id) {
            if(!confirm("¿Confirmar?")) return;
            await fetch(`/admin/${action}/${type}/${id}`, { method: action === 'delete' ? 'DELETE' : 'POST' });
            loadAdminData(); loadPets();
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') { if(!mainMap) initMainMap(); loadPets(); }
            if (id === 'upload') { if(!uploadMap) initUploadMap(); }
            if (id === 'admin') loadAdminData();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
            else alert("Acceso denegado");
        }

        async function handleUpload(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            if(!fd.get('latitud')) return alert("Marca el mapa");
            fd.append('user_id', user.id);
            await fetch('/pets/upload', { method: 'POST', body: fd });
            alert("¡Listo! Esperando aprobación."); location.reload();
        }

        function logout() { localStorage.removeItem('user'); location.reload(); }
        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function accessAdmin() { user?.role === 'admin' ? showSection('admin') : showSection('auth'); }

        window.onload = () => {
            if(user) {
                document.getElementById('user-info').innerText = user.email.split('@')[0];
                if(user.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            }
            showSection('home');
        };
    </script>
</body>
</html>
