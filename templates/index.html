<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #F4F1DE; }
        .glass { background: rgba(244, 241, 222, 0.9); backdrop-filter: blur(8px); }
        #map { height: 38vh; width: 100%; border-bottom: 5px solid white; }
        .active-filter { background: #E07A5F !important; color: white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">

    <div id="map" class="z-10"></div>

    <nav class="absolute top-4 w-full px-4 z-[1000]">
        <div class="glass p-3 rounded-2xl flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#E07A5F] rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-paw text-sm"></i>
                </div>
                <h1 class="font-black text-lg tracking-tight">Huellitas<span class="text-[#E07A5F]">NQN</span></h1>
            </div>
            <button onclick="location.reload()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-300">
                <i class="fas fa-redo-alt"></i>
            </button>
        </div>
    </nav>

    <main class="p-4 space-y-5">
        <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
            <button onclick="setFilter('todos', this)" class="active-filter px-6 py-3 bg-white rounded-full font-black text-[10px] uppercase shadow-sm">Todos</button>
            <button onclick="setFilter('perro', this)" class="px-6 py-3 bg-white rounded-full font-black text-[10px] uppercase shadow-sm">Perros</button>
            <button onclick="setFilter('gato', this)" class="px-6 py-3 bg-white rounded-full font-black text-[10px] uppercase shadow-sm">Gatos</button>
        </div>

        <div class="relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" id="search" oninput="render()" placeholder="Buscar barrio..." 
                   class="w-full p-4 pl-12 rounded-2xl bg-white shadow-sm outline-none focus:ring-2 ring-[#E07A5F]">
        </div>

        <div id="grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[1000]">
        <div class="glass p-4 rounded-[2.5rem] flex justify-around items-center border-2 border-white shadow-2xl">
            <button class="text-slate-400"><i class="fas fa-map-marked-alt text-xl"></i></button>
            <button onclick="alert('Módulo de subida: Próximamente')" class="w-16 h-16 bg-[#E07A5F] text-white rounded-full -mt-14 border-[6px] border-[#F4F1DE] shadow-xl flex items-center justify-center">
                <i class="fas fa-plus text-2xl"></i>
            </button>
            <button class="text-slate-400"><i class="fas fa-info-circle text-xl"></i></button>
        </div>
    </div>

    <script>
        let allPets = [];
        let map;
        let currentFilter = 'todos';

        async function init() {
            const res = await fetch('/pets');
            allPets = await res.json();
            
            map = L.map('map', {zoomControl: false}).setView([-38.95, -68.06], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = "";
            
            const filtered = allPets.filter(p => {
                const matchType = currentFilter === 'todos' || p.especie === currentFilter;
                const matchBarrio = p.barrio.toLowerCase().includes(search);
                return matchType && matchBarrio;
            });

            filtered.forEach(p => {
                const color = p.status === 'perdido' ? '#ef4444' : '#10b981';
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm relative">
                        <div class="h-32 relative">
                            <img src="${p.image_url}" class="w-full h-full object-cover" onclick="map.flyTo([${p.lat}, ${p.lng}], 16)">
                            <div class="absolute top-2 left-2 px-2 py-1 rounded-lg text-[7px] font-black text-white uppercase" style="background:${color}">
                                ${p.status}
                            </div>
                        </div>
                        <div class="p-3">
                            <h3 class="font-black text-[10px] uppercase truncate">${p.name}</h3>
                            <p class="text-[8px] text-slate-400 mb-2">${p.barrio}</p>
                            <div class="flex gap-1">
                                <a href="/generate_plate/${p.id}" class="flex-1 bg-slate-50 text-slate-400 py-2 rounded-xl text-[8px] font-black text-center">PLACA</a>
                                <a href="https://wa.me/2996894360" class="w-8 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center">
                                    <i class="fab fa-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </div>`;
                
                L.circleMarker([p.lat, p.lng], {radius: 6, color: color, fillOpacity: 1}).addTo(map);
            });
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-filter'));
            btn.classList.add('active-filter');
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
