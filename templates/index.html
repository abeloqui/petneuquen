<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad Activa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --coral: #E07A5F; --mint: #81B29A; --yellow: #F2CC8F; --cream: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--cream); color: var(--dark); margin: 0; padding-bottom: 110px; }
        .hidden { display: none !important; }
        .section-container { animation: slideUp 0.4s ease-out; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #main-map { height: 400px; width: 100%; border-radius: 2.5rem; border: 5px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        .custom-input { background: white; border-radius: 1.2rem; padding: 14px; width: 100%; border: 2px solid transparent; outline: none; }
        .btn-primary { background: var(--coral); color: white; padding: 16px; border-radius: 1.2rem; font-weight: 900; width: 100%; text-transform: uppercase; }
        
        /* Estilos de los pines de huella */
        .marker-pin { display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .marker-pin i { transform: rotate(45deg); font-size: 18px; color: white; }
    </style>
</head>
<body>

    <nav class="p-4 bg-white/70 backdrop-blur-md sticky top-0 z-[1000] flex justify-between items-center border-b border-white/50">
        <h1 onclick="showSection('home')" class="font-black text-xl italic cursor-pointer">Huellitas<span style="color: var(--coral);">NQN</span></h1>
    </nav>

    <main>
        <section id="sec-home" class="section-container">
            <div id="main-map" class="mb-6"></div>
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                <span class="text-[9px] bg-white px-3 py-1 rounded-full font-bold border border-orange-100">🐾 PERDIDOS (CORAL)</span>
                <span class="text-[9px] bg-white px-3 py-1 rounded-full font-bold border border-green-100">🐾 ENCONTRADOS (VERDE)</span>
                <span class="text-[9px] bg-white px-3 py-1 rounded-full font-bold border border-yellow-100">🐾 ADOPCIÓN (AMARILLO)</span>
            </div>
            <input type="text" id="search" oninput="renderPets()" placeholder="Buscar barrio o mascota..." class="custom-input mb-6 shadow-sm">
            <div id="pet-list" class="grid grid-cols-1 gap-4"></div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <h2 class="text-2xl font-black mb-6 uppercase">Panel de Control</h2>
            <div id="admin-pets-list" class="space-y-4"></div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <h2 class="text-xl font-black mb-4 uppercase italic">Ingreso Comunidad</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="custom-input border-slate-100" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input border-slate-100" required>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] bg-white/90 backdrop-blur-lg rounded-[2.5rem] p-3 flex justify-around items-center z-[2000] border-2 border-white shadow-2xl">
        <button onclick="showSection('home')" class="p-3 text-slate-400"><i class="fas fa-paw text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 bg-[#E07A5F] text-white rounded-full flex items-center justify-center shadow-lg -mt-12 border-[6px] border-[#F4F1DE]"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="accessAdmin()" id="admin-btn" class="p-3 text-slate-400"><i class="fas fa-user-shield text-xl"></i></button>
    </nav>

    <script>
        let mainMap, allPets = [], user = JSON.parse(localStorage.getItem('user'));
        let markersLayer = L.layerGroup();

        const colors = { "perdido": "#E07A5F", "encontrado": "#81B29A", "adopcion": "#F2CC8F" };

        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            markersLayer.addTo(mainMap);
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
            renderMarkers();
        }

        function renderMarkers() {
            markersLayer.clearLayers();
            allPets.filter(p => p.is_approved).forEach(p => {
                const color = colors[p.status] || '#3D405B';
                const icon = L.divIcon({
                    html: `<div class="marker-pin" style="background: ${color}"><i class="fas fa-paw"></i></div>`,
                    className: 'custom-div-icon',
                    iconSize: [40, 40],
                    iconAnchor: [20, 40]
                });
                L.marker([p.latitud, p.longitud], { icon }).addTo(markersLayer)
                 .bindPopup(`<b class="uppercase">${p.name}</b><br>${p.status}`);
            });
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            allPets.filter(p => p.is_approved && (p.name.toLowerCase().includes(term) || p.barrio.toLowerCase().includes(term))).forEach(p => {
                const color = colors[p.status];
                list.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] p-4 shadow-sm border border-slate-100">
                        <div class="flex gap-4 items-center">
                            <img src="${p.image_url}" class="w-24 h-24 rounded-[1.5rem] object-cover shadow-md" onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)">
                            <div class="flex-1">
                                <span class="text-[8px] font-black px-2 py-0.5 rounded-full text-white uppercase" style="background: ${color}">${p.status}</span>
                                <h3 class="font-black text-lg uppercase leading-tight mt-1">${p.name}</h3>
                                <p class="text-[10px] text-slate-400 font-bold uppercase"><i class="fas fa-map-marker-alt"></i> ${p.barrio}</p>
                                <div class="flex gap-2 mt-3">
                                    <a href="https://wa.me/?text=¡Ayudemos a encontrar a ${p.name}! Visto en ${p.barrio}. Ver aquí: ${window.location.href}" target="_blank" class="bg-emerald-50 text-emerald-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2">
                                        <i class="fab fa-whatsapp"></i> Compartir
                                    </a>
                                    <a href="https://wa.me/${p.user_phone || '299'}" target="_blank" class="bg-slate-50 text-slate-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2">
                                        <i class="fas fa-comment"></i> Contactar
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function loadAdminData() {
            if (!user || user.role !== 'admin') return;
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('admin-pets-list').innerHTML = data.pets.map(p => `
                <div class="bg-white p-4 rounded-3xl flex items-center justify-between shadow-sm border ${p.is_approved ? '' : 'border-orange-300 bg-orange-50/50'}">
                    <div class="flex items-center gap-3">
                        <img src="${p.image_url}" class="w-12 h-12 rounded-xl object-cover">
                        <div>
                            <p class="text-xs font-black uppercase">${p.name}</p>
                            <p class="text-[9px] font-bold text-slate-400">${p.status}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        ${!p.is_approved ? `<button onclick="adminAction('pet', 'approve', ${p.id})" class="text-emerald-500"><i class="fas fa-check-circle text-2xl"></i></button>` : ''}
                        <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-300"><i class="fas fa-trash-alt text-xl"></i></button>
                    </div>
                </div>`).join('');
        }

        // --- Funciones de navegación y acciones iguales a las anteriores ---
        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') { if(!mainMap) initMainMap(); loadPets(); }
            if (id === 'admin') loadAdminData();
        }

        async function adminAction(type, action, id) {
            const url = action === 'delete' ? `/admin/delete/${type}/${id}` : `/admin/approve/${type}/${id}`;
            await fetch(url, { method: action === 'delete' ? 'DELETE' : 'POST' });
            loadAdminData();
            loadPets();
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function accessAdmin() { user?.role === 'admin' ? showSection('admin') : showSection('auth'); }
        
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
        }

        window.onload = () => showSection('home');
    </script>
</body>
</html>
