<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Mapa Interactivo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');
        :root { --coral: #E07A5F; --mint: #81B29A; --cream: #F4F1DE; --dark: #3D405B; }
        body { font-family: 'Lexend', sans-serif; background-color: var(--cream); color: var(--dark); margin: 0; padding-bottom: 110px; }
        .hidden { display: none !important; }
        .section-container { animation: slideUp 0.4s ease-out; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #main-map { height: 400px; width: 100%; border-radius: 2.5rem; border: 5px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.06); z-index: 10; }
        #map-upload { height: 200px; width: 100%; border-radius: 1.5rem; margin-bottom: 10px; }
        .custom-input { background: white; border-radius: 1.2rem; padding: 14px; width: 100%; border: 2px solid transparent; outline: none; transition: 0.3s; shadow: sm; }
        .btn-primary { background: var(--coral); color: white; padding: 16px; border-radius: 1.2rem; font-weight: 900; width: 100%; text-transform: uppercase; box-shadow: 0 10px 20px rgba(224,122,95,0.2); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        /* Estilo para el PIN personalizado */
        .pet-marker { filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <nav class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/50">
        <div onclick="showSection('home')" class="flex items-center gap-2 cursor-pointer">
            <h1 class="font-black text-xl tracking-tighter italic">Huellitas<span style="color: var(--coral);">NQN</span></h1>
        </div>
    </nav>

    <main>
        <section id="sec-home" class="section-container">
            <div id="main-map" class="mb-6"></div>
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest">Cerca tuyo</h2>
                <span class="text-[10px] bg-white px-3 py-1 rounded-full font-bold shadow-sm">Neuquén Capital</span>
            </div>
            <input type="text" id="search" oninput="renderPets()" placeholder="Buscar barrio o nombre..." class="custom-input mb-6 shadow-sm">
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <h2 class="text-2xl font-black mb-6 uppercase">Administración</h2>
            <div id="admin-metrics" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div id="admin-pets-list" class="space-y-3"></div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white">
                <h2 class="text-xl font-black mb-4 uppercase">Nuevo Reporte</h2>
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre de la mascota" class="custom-input shadow-sm" required>
                    <select name="status" class="custom-input shadow-sm">
                        <option value="perdido">Perdido</option>
                        <option value="encontrado">Encontrado</option>
                        <option value="adopcion">En adopción</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio" class="custom-input shadow-sm" required>
                    <p class="text-[10px] font-bold text-slate-400 ml-2">Toca el mapa para marcar ubicación exacta:</p>
                    <div id="map-upload"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <div class="p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                        <input type="file" name="file" accept="image/*" class="text-xs" required>
                    </div>
                    <button type="submit" id="btn-up" class="btn-primary">Publicar Ahora</button>
                </form>
            </div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <h2 class="text-2xl font-black mb-6 italic">Acceso Volador 🚀</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" name="email" placeholder="Email" class="custom-input border-slate-100" required>
                    <input type="password" name="password" placeholder="Contraseña" class="custom-input border-slate-100" required>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass rounded-[2.5rem] p-3 flex justify-around items-center z-[2000] border-2 border-white shadow-2xl">
        <button onclick="showSection('home')" class="p-3 text-slate-400"><i class="fas fa-map-marked-alt text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 bg-[#E07A5F] text-white rounded-full flex items-center justify-center shadow-lg -mt-12 border-[6px] border-[#F4F1DE]"><i class="fas fa-paw text-xl"></i></button>
        <button onclick="accessAdmin()" id="admin-btn" class="p-3 text-slate-400 relative">
            <i class="fas fa-user-shield text-xl"></i>
            <span id="admin-badge" class="hidden absolute top-2 right-2 w-3 h-3 bg-orange-500 border-2 border-white rounded-full"></span>
        </button>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], user = JSON.parse(localStorage.getItem('user'));
        let markersLayer = L.layerGroup(); // Grupo para limpiar y poner pines

        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') { if(!mainMap) initMainMap(); loadPets(); }
            if (id === 'upload') { if(!uploadMap) initUploadMap(); }
            if (id === 'admin') loadAdminData();
        }

        // --- MAPA PRINCIPAL CON PINES ---
        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            markersLayer.addTo(mainMap);
        }

        function renderMarkers() {
            markersLayer.clearLayers();
            allPets.filter(p => p.is_approved).forEach(p => {
                // Pin personalizado con el color de Huellitas
                const icon = L.divIcon({
                    html: `<i class="fas fa-map-marker-alt text-3xl pet-marker" style="color: ${p.status === 'perdido' ? '#E07A5F' : '#81B29A'}"></i>`,
                    className: 'custom-div-icon',
                    iconSize: [30, 42],
                    iconAnchor: [15, 42]
                });

                L.marker([p.latitud, p.longitud], { icon })
                    .bindPopup(`<div class="text-center font-bold"><b>${p.name}</b><br><span class="text-[10px] uppercase">${p.status}</span></div>`)
                    .addTo(markersLayer);
            });
        }

        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
            renderMarkers(); // Dibujar los pines al cargar
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            allPets.filter(p => p.is_approved && (p.name.toLowerCase().includes(term) || p.barrio.toLowerCase().includes(term))).forEach(p => {
                list.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-50" onclick="mainMap.flyTo([${p.latitud}, ${p.longitud}], 16)">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-black text-[11px] uppercase tracking-tighter">${p.name}</p>
                            <p class="text-[8px] text-slate-400 font-bold uppercase">${p.barrio}</p>
                        </div>
                    </div>`;
            });
        }

        // --- MAPA DE SUBIDA ---
        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        // --- ADMIN Y ACCIONES ---
        async function loadAdminData() {
            if (!user || user.role !== 'admin') return;
            const res = await fetch('/admin/data');
            const data = await res.json();
            document.getElementById('admin-metrics').innerHTML = `
                <div class="bg-white p-5 rounded-3xl text-center shadow-sm"><p class="text-[9px] font-black text-slate-300">MASCOTAS</p><p class="text-xl font-black">${data.pets.length}</p></div>
                <div class="bg-white p-5 rounded-3xl text-center shadow-sm"><p class="text-[9px] font-black text-slate-300">USERS</p><p class="text-xl font-black">${data.users.length}</p></div>`;
            
            document.getElementById('admin-pets-list').innerHTML = data.pets.map(p => `
                <div class="bg-white p-3 rounded-2xl flex items-center justify-between shadow-sm border ${p.is_approved ? '' : 'border-orange-300 bg-orange-50/50'}">
                    <div class="flex items-center gap-3">
                        <img src="${p.image_url}" class="w-10 h-10 rounded-xl object-cover">
                        <span class="text-xs font-black uppercase">${p.name}</span>
                    </div>
                    <div class="flex gap-2">
                        ${!p.is_approved ? `<button onclick="adminAction('pet', 'approve', ${p.id})" class="text-emerald-500"><i class="fas fa-check-circle text-2xl"></i></button>` : ''}
                        <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-300"><i class="fas fa-trash-alt text-xl"></i></button>
                    </div>
                </div>`).join('');
        }

        async function adminAction(type, action, id) {
            const url = action === 'delete' ? `/admin/delete/${type}/${id}` : `/admin/approve/${type}/${id}`;
            await fetch(url, { method: action === 'delete' ? 'DELETE' : 'POST' });
            loadAdminData();
            loadPets();
        }

        // --- LOGIN Y AUTH ---
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
            else alert("Error de acceso");
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function accessAdmin() { user?.role === 'admin' ? showSection('admin') : showSection('auth'); }

        async function handleUpload(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            if(!fd.get('latitud')) { alert("Toca el mapa para marcar la ubicación"); return; }
            fd.append('user_id', user.id);
            const res = await fetch('/pets/upload', { method: 'POST', body: fd });
            if(res.ok) { alert("¡Publicado! Pendiente de aprobación."); location.reload(); }
        }

        window.onload = () => {
            if(user?.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            showSection('home');
        };
    </script>
</body>
</html>
