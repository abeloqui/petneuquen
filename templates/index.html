<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huellitas NQN | Comunidad de Mascotas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&display=swap');

        :root {
            --logo-coral: #E07A5F;
            --logo-celeste: #81B29A;
            --logo-crema: #F4F1DE;
            --dark: #3D405B;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--logo-crema);
            color: var(--dark);
            margin: 0;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Utilidades */
        .hidden { display: none !important; }
        .glass { background: rgba(244, 241, 222, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        .section-container {
            animation: slideUp 0.4s ease-out;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mapas */
        #main-map { 
            height: 380px; width: 100%; border-radius: 2.5rem; 
            border: 5px solid white; box-shadow: 0 15px 35px rgba(61, 64, 91, 0.1);
        }

        #map-upload { height: 220px; width: 100%; border-radius: 1.5rem; margin-bottom: 15px; }

        /* Inputs y Botones */
        .custom-input {
            background: white; border-radius: 1.2rem; padding: 14px 18px;
            border: 2px solid transparent; width: 100%; outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--logo-celeste); }

        .btn-filter {
            padding: 10px 20px; border-radius: 25px; font-size: 12px; font-weight: 700;
            background: white; color: var(--logo-celeste); border: 1px solid rgba(129, 178, 154, 0.2);
            white-space: nowrap; transition: 0.3s;
        }
        .btn-filter.active { background: var(--logo-coral); color: white; box-shadow: 0 5px 15px rgba(224, 122, 95, 0.3); }

        .card-pet { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
    </style>
</head>
<body>

    <nav class="p-4 glass sticky top-0 z-[1000] flex justify-between items-center border-b border-white/20">
        <div onclick="showSection('home')" class="flex items-center gap-2 cursor-pointer">
            <h1 class="font-black text-xl tracking-tighter">Huellitas<span style="color: var(--logo-coral);">NQN</span></h1>
        </div>
    </nav>

    <main>
        <section id="sec-home" class="section-container">
            <div id="main-map" class="mb-6"></div>
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="setSpecies('todos', this)" class="btn-filter active">🔍 Todos</button>
                <button onclick="setSpecies('perro', this)" class="btn-filter">🐶 Perros</button>
                <button onclick="setSpecies('gato', this)" class="btn-filter">🐱 Gatos</button>
            </div>
            <input type="text" id="search" oninput="renderPets()" placeholder="Buscar barrio o nombre..." class="custom-input mb-6">
            <div id="pet-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-auth" class="section-container hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <h2 class="text-2xl font-black mb-6">¡Hola! 👋</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4 mb-8">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ingresar</p>
                    <input type="email" name="email" placeholder="Tu Email" class="custom-input" required>
                    <input type="password" name="password" placeholder="Tu Contraseña" class="custom-input" required>
                    <button type="submit" class="w-full py-4 bg-[#E07A5F] text-white rounded-2xl font-black uppercase">Entrar</button>
                </form>
                <div class="relative py-4"><hr><span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-[10px] font-bold text-slate-300 uppercase">Ó</span></div>
                <form onsubmit="handleRegister(event)" class="space-y-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Registrarse</p>
                    <input type="email" name="email" placeholder="Email para registro" class="custom-input" required>
                    <input type="password" name="password" placeholder="Crear Contraseña" class="custom-input" required>
                    <input type="text" name="telefono" placeholder="WhatsApp (Ej: 2996894360)" class="custom-input" required>
                    <button type="submit" class="w-full py-4 bg-white border-2 border-[#81B29A] text-[#81B29A] rounded-2xl font-black uppercase">Solicitar Acceso</button>
                </form>
            </div>
        </section>

        <section id="sec-upload" class="section-container hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl">
                <h2 class="text-xl font-black mb-4">Reportar Mascota</h2>
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="text" name="name" placeholder="Nombre (o 'Sin nombre')" class="custom-input" required>
                    <select name="status" class="custom-input">
                        <option value="perdido">Lo perdí 🔍</option>
                        <option value="encontrado">Lo encontré 📍</option>
                        <option value="adopcion">En adopción 🏠</option>
                    </select>
                    <input type="text" name="barrio" placeholder="Barrio" class="custom-input" required>
                    <div id="map-upload"></div>
                    <input type="hidden" name="latitud" id="lat-in">
                    <input type="hidden" name="longitud" id="lng-in">
                    <input type="file" name="file" accept="image/*" class="text-xs" required>
                    <button type="submit" id="btn-up" class="w-full py-5 bg-[#E07A5F] text-white rounded-[1.5rem] font-black uppercase shadow-lg shadow-coral-100">Publicar</button>
                </form>
            </div>
        </section>

        <section id="sec-admin" class="section-container hidden">
            <h2 class="text-2xl font-black mb-6">Panel Admin</h2>
            <div id="admin-metrics"></div>
            <div id="admin-users" class="space-y-3 mb-8"></div>
            <div id="admin-pets" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-[2.5rem] p-3 flex justify-around items-center z-[2000] border-2 border-white shadow-2xl">
        <button onclick="showSection('home')" class="p-3 text-slate-400 hover:text-coral-500"><i class="fas fa-home text-xl"></i></button>
        <button onclick="checkAuth()" class="w-14 h-14 bg-[#E07A5F] text-white rounded-full flex items-center justify-center shadow-lg -mt-12 border-[6px] border-[#F4F1DE]"><i class="fas fa-plus text-xl"></i></button>
        <div class="relative">
            <button onclick="toggleUserMenu()" id="user-anchor" class="p-3 text-slate-400 transition-all">
                <i class="fas fa-user text-xl"></i>
                <span id="admin-badge" class="hidden absolute top-2 right-2 w-3 h-3 bg-orange-500 border-2 border-white rounded-full"></span>
            </button>
            <div id="user-menu" class="hidden absolute bottom-16 right-0 w-48 bg-white rounded-3xl shadow-2xl border border-slate-100 p-2">
                <p id="menu-email" class="text-[9px] font-black text-slate-300 p-3 truncate uppercase border-b border-slate-50 mb-1"></p>
                <button onclick="showSection('admin'); toggleUserMenu()" class="w-full text-left p-3 text-xs font-bold hover:bg-slate-50 rounded-2xl flex items-center gap-3">
                    <i class="fas fa-chart-pie text-coral-400"></i> Mi Panel
                </button>
                <button onclick="logout()" class="w-full text-left p-3 text-xs font-bold text-red-400 hover:bg-red-50 rounded-2xl flex items-center gap-3">
                    <i class="fas fa-power-off"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <script>
        let mainMap, uploadMap, uploadMarker, allPets = [], user = JSON.parse(localStorage.getItem('user'));
        let currentSpecies = 'todos';

        // --- NAVEGACIÓN ---
        function showSection(id) {
            document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if (id === 'home') { if(!mainMap) initMainMap(); loadPets(); }
            if (id === 'upload') { if(!uploadMap) initUploadMap(); }
            if (id === 'admin') loadAdminData();
            window.scrollTo(0,0);
        }

        function checkAuth() { user ? showSection('upload') : showSection('auth'); }
        function toggleUserMenu() { 
            if(!user) { showSection('auth'); return; }
            document.getElementById('user-menu').classList.toggle('hidden');
            document.getElementById('menu-email').innerText = user.email;
        }

        // --- LÓGICA DE MAPAS ---
        function initMainMap() {
            mainMap = L.map('main-map', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        }

        function initUploadMap() {
            uploadMap = L.map('map-upload', { zoomControl: false }).setView([-38.951, -68.061], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(uploadMap);
            uploadMap.on('click', e => {
                if(uploadMarker) uploadMarker.setLatLng(e.latlng);
                else uploadMarker = L.marker(e.latlng).addTo(uploadMap);
                document.getElementById('lat-in').value = e.latlng.lat;
                document.getElementById('lng-in').value = e.latlng.lng;
            });
        }

        // --- MASCOTAS ---
        async function loadPets() {
            const res = await fetch('/pets');
            allPets = await res.json();
            renderPets();
        }

        function renderPets() {
            const list = document.getElementById('pet-list');
            const term = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            allPets.filter(p => p.name.toLowerCase().includes(term) || p.barrio.toLowerCase().includes(term))
            .forEach(p => {
                list.innerHTML += `
                    <div class="card-pet">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 text-center">
                            <p class="font-black text-xs uppercase">${p.name}</p>
                            <p class="text-[9px] text-slate-400">${p.barrio}</p>
                        </div>
                    </div>`;
            });
        }

        function setSpecies(sp, btn) {
            currentSpecies = sp;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPets();
        }

        // --- ADMIN ---
        async function loadAdminData() {
            if (!user || user.role !== 'admin') return;
            const res = await fetch('/admin/data');
            const data = await res.json();
            
            document.getElementById('admin-metrics').innerHTML = `
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-white p-4 rounded-3xl text-center"><p class="text-[9px] font-bold">Mascotas</p><p class="text-xl font-black">${data.pets.length}</p></div>
                    <div class="bg-white p-4 rounded-3xl text-center"><p class="text-[9px] font-bold">Usuarios</p><p class="text-xl font-black">${data.users.length}</p></div>
                </div>`;

            document.getElementById('admin-users').innerHTML = '<h3 class="text-xs font-black mb-2 uppercase">Usuarios</h3>' + 
                data.users.map(u => `<div class="bg-white p-3 rounded-2xl flex justify-between items-center mb-2">
                    <span class="text-xs">${u.email}</span>
                    <button onclick="adminAction('user', 'delete', ${u.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>`).join('');

            document.getElementById('admin-pets').innerHTML = '<h3 class="text-xs font-black mb-2 uppercase">Mascotas</h3>' + 
                data.pets.map(p => `<div class="bg-white p-2 rounded-2xl flex items-center gap-3 mb-2">
                    <img src="${p.image_url}" class="w-8 h-8 rounded-lg object-cover">
                    <span class="text-xs flex-1">${p.name}</span>
                    <button onclick="adminAction('pet', 'delete', ${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function adminAction(type, action, id) {
            if(!confirm("¿Seguro?")) return;
            await fetch(`/admin/delete/${type}/${id}`, { method: 'DELETE' });
            loadAdminData();
        }

        // --- AUTH & SUBIDA ---
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) { localStorage.setItem('user', JSON.stringify(await res.json())); location.reload(); }
            else alert("Error al ingresar");
        }

        async function handleRegister(e) {
            e.preventDefault();
            const res = await fetch('/register', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) alert("Solicitud enviada");
            else alert("Error al registrar");
        }

        async function handleUpload(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append('user_id', user.id);
            await fetch('/pets/upload', { method: 'POST', body: fd });
            location.reload();
        }

        function logout() { localStorage.removeItem('user'); location.reload(); }

        window.onload = () => {
            if(user?.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            showSection('home');
        };
    </script>
</body>
</html>
